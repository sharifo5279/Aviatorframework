cing:0.08em;text-transform:uppercase;color:#0066FF;margin-bottom:10px\">Gate 0 · Month 0<\/div><div style=\"font:700 17px/1.3 'Inter',sans-serif;color:#101c2f;margin-bottom:6px\">Launch approval<\/div><div style=\"font:300 15px/1.55 'Inter',sans-serif;color:#3f4d62\">Stage 2 governance complete: DPA confirmed, scope set, baselines defined, owners named<\/div><\/div>\n        <div style=\"background:#fff;border:1px solid #e7eaef;border-radius:12px;padding:24px 26px\"><div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#0066FF;margin-bottom:10px\">Gate 1 · Month 3<\/div><div style=\"font:700 17px/1.3 'Inter',sans-serif;color:#101c2f;margin-bottom:6px\">Phase 2 entry<\/div><div style=\"font:300 15px/1.55 'Inter',sans-serif;color:#3f4d62\">Phase 1 exit criteria met: adoption, MTTR improvement, clean audit sample<\/div><\/div>\n        <div style=\"background:#fff;border:1px solid #e7eaef;border-radius:12px;padding:24px 26px\"><div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#0066FF;margin-bottom:10px\">Gate 2 · Month 6 to 8<\/div><div style=\"font:700 17px/1.3 'Inter',sans-serif;color:#101c2f;margin-bottom:6px\">Phase 3 entry<\/div><div style=\"font:300 15px/1.55 'Inter',sans-serif;color:#3f4d62\">Recommendation accuracy at threshold, approval history clean, policy sets board-approved, rollback drilled<\/div><\/div>\n        <div style=\"background:#fff;border:1px solid #e7eaef;border-radius:12px;padding:24px 26px\"><div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#0066FF;margin-bottom:10px\">Gate 3 · Month 12<\/div><div style=\"font:700 17px/1.3 'Inter',sans-serif;color:#101c2f;margin-bottom:6px\">Steady-state attestation<\/div><div style=\"font:300 15px/1.55 'Inter',sans-serif;color:#3f4d62\">Annual governance attestation; CoE charter activated; L4 candidacy review for qualifying workflows<\/div><\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Controlled AI Rollout, Confidential<\/span><span>7 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 08 MEASUREMENT -->\n<section data-label=\"08 Measurement Framework\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Measurement Framework<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:44px\">Each phase is judged on numbers captured before it began<\/div>\n    <div style=\"border:1px solid #e7eaef;border-radius:16px;overflow:hidden;max-width:1728px;margin-bottom:30px\">\n      <div style=\"display:grid;grid-template-columns:280px 1fr 1fr 1fr;background:#101c2f;padding:16px 32px\">\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Metric<\/div>\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Phase 1 target<\/div>\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Phase 2 target<\/div>\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Phase 3 target<\/div>\n      <\/div>\n      <div style=\"display:grid;grid-template-columns:280px 1fr 1fr 1fr;padding:16px 32px;border-bottom:1px solid #f6f7f7;font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\"><div style=\"font-weight:700;color:#101c2f\">Investigation MTTR<\/div><div>Measurable reduction vs. baseline<\/div><div>Sustained reduction at scale<\/div><div>Reduction holds incl. automated flows<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:280px 1fr 1fr 1fr;padding:16px 32px;border-bottom:1px solid #f6f7f7;font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\"><div style=\"font-weight:700;color:#101c2f\">Specialist escalation rate<\/div><div>Directional improvement<\/div><div>Significant reduction vs. baseline<\/div><div>Stable at improved level<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:280px 1fr 1fr 1fr;padding:16px 32px;border-bottom:1px solid #f6f7f7;font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\"><div style=\"font-weight:700;color:#101c2f\">Active adoption<\/div><div>≥ 60% of pilot users weekly<\/div><div>≥ 70% of target population<\/div><div>Sustained; tracked per capability<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:280px 1fr 1fr 1fr;padding:16px 32px;border-bottom:1px solid #f6f7f7;font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\"><div style=\"font-weight:700;color:#101c2f\">Recommendation accuracy<\/div><div>, (no recommendations yet)<\/div><div>≥ governance-set threshold on samples<\/div><div>Maintained; drift-monitored<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:280px 1fr 1fr 1fr;padding:16px 32px;border-bottom:1px solid #f6f7f7;font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\"><div style=\"font-weight:700;color:#101c2f\">Policy exception rate<\/div><div>, <\/div><div>, (L2 approvals tracked instead)<\/div><div>Stable or declining; alerts on rise<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:280px 1fr 1fr 1fr;padding:16px 32px;font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\"><div style=\"font-weight:700;color:#101c2f\">Audit findings<\/div><div>Zero unauthorized access<\/div><div>Zero unauthorized actions<\/div><div>Zero out-of-policy executions<\/div><\/div>\n    <\/div>\n    <div style=\"font:300 18px/1.5 'Inter',sans-serif;color:#3f4d62;max-width:1700px\">Baselines are captured before enablement and frozen at Gate 0; all targets are expressed relative to that baseline.<\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Controlled AI Rollout, Confidential<\/span><span>8 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 09 REVERSIBILITY -->\n<section data-label=\"09 Reversibility in Practice\">\n<div style=\"position:absolute;inset:0;background:#f6f7f7;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Reversibility in Practice<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:48px\">What \"we can stop this\" means, concretely<\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:28px;max-width:1700px;margin-bottom:36px\">\n      <div class=\"card\" style=\"padding:36px 32px\">\n        <div class=\"kl\">Scenario: Accuracy Dips<\/div>\n        <div class=\"kt\">Step down one level<\/div>\n        <div class=\"kb\">Recommendation quality drifts in one workflow → workflow owner steps L2 back to L1 immediately. Recommendations continue, approvals pause, governance investigates with full audit history. Service continues unaffected.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:36px 32px\">\n        <div class=\"kl\">Scenario: Audit Concern<\/div>\n        <div class=\"kt\">Freeze the capability<\/div>\n        <div class=\"kb\">A governance review flags an access pattern → the capability is disabled for the affected roles while investigation proceeds. The remaining capabilities and all manual paths continue operating.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:36px 32px\">\n        <div class=\"kl\">Scenario: Strategic Pause<\/div>\n        <div class=\"kt\">Suspend the program<\/div>\n        <div class=\"kb\">Leadership pauses AI adoption entirely → all capabilities disable tenant-wide. The Business Network operation continues exactly as it ran before Phase 1, no dependency was allowed to form without a manual fallback.<\/div>\n      <\/div>\n    <\/div>\n    <div style=\"background:#101c2f;border-radius:16px;padding:36px 44px;max-width:1700px;display:flex;align-items:center;gap:44px\">\n      <div style=\"flex:1.2\">\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0066FF;margin-bottom:12px\">Drilled, not just documented<\/div>\n        <div style=\"font:800 26px/1.3 'Inter','Inter',sans-serif;color:#fff\">Each phase includes one deliberate rollback exercise.<\/div>\n      <\/div>\n      <div style=\"flex:1;font:300 18px/1.6 'Inter',sans-serif;color:rgba(255,255,255,0.72)\">Reversion is rehearsed during calm conditions so it is a practiced motion during stressed ones, the same discipline you apply to disaster recovery.<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Controlled AI Rollout, Confidential<\/span><span>9 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 10 ROLES -->\n<section data-label=\"10 Roles & Responsibilities\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Roles &amp; Responsibilities<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:44px\">Who does what across the rollout<\/div>\n    <div style=\"border:1px solid #e7eaef;border-radius:16px;overflow:hidden;max-width:1728px\">\n      <div style=\"display:grid;grid-template-columns:300px 1fr 1fr;background:#101c2f;padding:16px 32px\">\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Role<\/div>\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Customer side<\/div>\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">OpenText side<\/div>\n      <\/div>\n      <div style=\"display:grid;grid-template-columns:300px 1fr 1fr;padding:17px 32px;border-bottom:1px solid #f6f7f7\"><div style=\"font:700 18px/1.4 'Inter',sans-serif;color:#101c2f\">Executive sponsor<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\">Owns the adoption case; chairs phase-gate decisions<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\">Account executive: escalation path, roadmap alignment<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:300px 1fr 1fr;padding:17px 32px;border-bottom:1px solid #f6f7f7\"><div style=\"font:700 18px/1.4 'Inter',sans-serif;color:#101c2f\">Workflow owner(s)<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\">Per-workflow autonomy level, KPI review, step-down authority<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\">Solution consultant: configuration, tuning, usage analytics<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:300px 1fr 1fr;padding:17px 32px;border-bottom:1px solid #f6f7f7\"><div style=\"font:700 18px/1.4 'Inter',sans-serif;color:#101c2f\">Policy owner<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\">Maintains policy sets; runs version control and board review<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\">Field architect: policy capability mapping, guardrail design<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:300px 1fr 1fr;padding:17px 32px;border-bottom:1px solid #f6f7f7\"><div style=\"font:700 18px/1.4 'Inter',sans-serif;color:#101c2f\">Audit owner<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\">Reviews audit samples; runs accuracy spot-checks; SIEM integration<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\">Support &amp; product: audit extracts, reporting surfaces<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:300px 1fr 1fr;padding:17px 32px\"><div style=\"font:700 18px/1.4 'Inter',sans-serif;color:#101c2f\">Governance board<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\">Phase-gate approvals; quarterly reviews; annual attestation<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\">Provides evidence packages for each gate review<\/div><\/div>\n    <\/div>\n    <div style=\"margin-top:28px;font:300 18px/1.5 'Inter',sans-serif;color:#3f4d62;max-width:1700px\">The full organizational design, escalation paths, oversight cadence, and the AI Center of Excellence, is covered in the AI Operating Model deck and CoE Framework in this stage.<\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Controlled AI Rollout, Confidential<\/span><span>10 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 11 FIRST 30 DAYS -->\n<section data-label=\"11 First 30 Days\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Getting Started<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:48px\">The first 30 days, week by week<\/div>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:24px;max-width:1728px\">\n      <div class=\"card\" style=\"padding:32px 28px\">\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#0066FF;margin-bottom:16px\">Week 1<\/div>\n        <div class=\"kt\" style=\"font-size:20px\">Confirm &amp; instrument<\/div>\n        <div class=\"kb\" style=\"font-size:16px\">Confirm scope and owners from the governance workshop. Stand up baseline instrumentation: MTTR, escalation, volume metrics flowing to the measurement workbook.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:32px 28px\">\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#0066FF;margin-bottom:16px\">Week 2<\/div>\n        <div class=\"kt\" style=\"font-size:20px\">Configure &amp; verify<\/div>\n        <div class=\"kb\" style=\"font-size:16px\">Apply role scopes, masking rules, and metadata-only flags per the data classification. Security verifies audit events landing in SIEM. Dry-run the rollback procedure.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:32px 28px\">\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#0066FF;margin-bottom:16px\">Week 3<\/div>\n        <div class=\"kt\" style=\"font-size:20px\">Enable pilot group<\/div>\n        <div class=\"kb\" style=\"font-size:16px\">Pilot users onboarded with a 90-minute working session on real investigations, not demo data. First wins captured and socialized to stakeholders.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:32px 28px\">\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#0066FF;margin-bottom:16px\">Week 4<\/div>\n        <div class=\"kt\" style=\"font-size:20px\">First review<\/div>\n        <div class=\"kb\" style=\"font-size:16px\">Usage and accuracy review with workflow owners. Tune scope and configuration. Publish the first weekly metrics digest against baseline, the rhythm the rest of the rollout runs on.<\/div>\n      <\/div>\n    <\/div>\n    <div style=\"margin-top:36px;padding:22px 30px;background:#f0f4ff;border-radius:12px;border-left:4px solid #0066FF;max-width:1700px\">\n      <div style=\"font:300 19px/1.6 'Inter',sans-serif;color:#3f4d62\">Operational detail for every step, approval gates, checklists, readiness criteria, lives in the companion documents: <strong style=\"color:#101c2f;font-weight:700\">AI Operationalization Framework<\/strong> and <strong style=\"color:#101c2f;font-weight:700\">AI Deployment Checklist<\/strong>.<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Controlled AI Rollout, Confidential<\/span><span>11 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 12 CLOSE -->\n<section data-label=\"12 Close\">\n<div style=\"position:absolute;inset:0;background:#101c2f;overflow:hidden\">\n  <div style=\"position:absolute;right:-280px;top:-280px;width:900px;height:900px;border-radius:50%;border:1px solid rgba(0,102,255,0.1)\"><\/div>\n  <img class=\"logo\" src=\"__LOGO_NEG__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;max-width:1450px;padding:0 96px\">\n    <div style=\"width:72px;height:5px;background:#0066FF;border-radius:3px;margin:0 auto 44px\"><\/div>\n    <div style=\"font:900 58px/1.12 'Inter','Inter',sans-serif;color:#fff;letter-spacing:-0.025em;margin-bottom:36px\">Rolled out like infrastructure.<br>Not launched like a feature.<\/div>\n    <div style=\"font:300 24px/1.6 'Inter',sans-serif;color:rgba(255,255,255,0.68);max-width:1100px;margin:0 auto 56px\">Phased authority. Numeric gates. Rehearsed rollback. Named owners. This is how enterprises deploy systems they intend to trust for a decade, and how operational AI earns that standing.<\/div>\n    <div style=\"font:800 26px/1.4 'Inter','Inter',sans-serif;color:#0066FF\">Governed operational intelligence, deployed at the speed of trust.<\/div>\n  <\/div>\n  <div class=\"foot d\"><span>CONFIDENTIAL, DELIVERY &amp; OPERATIONS TEAMS<\/span><span>12 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<\/deck-stage>\n<script>window.addEventListener(\"error\",function(e){if(e.message&&e.message.indexOf(\"ResizeObserver loop\")!==-1){e.stopImmediatePropagation();e.preventDefault();}},true);<\/script>\n__DECKSTAGE__\n<\/body>\n<\/html>\n","s3/AI-Operationalization-Framework":"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n__FONTS__\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>AI Operationalization Framework, OpenText Trading Grid with Aviator<\/title>\n__DOCCSS__\n<style>\n.step{display:grid;grid-template-columns:56px 1fr;gap:20px;margin-bottom:22px;break-inside:avoid}\n.step .n{width:48px;height:48px;border-radius:50%;background:var(--dk);color:#fff;display:flex;align-items:center;justify-content:center;font:900 19px/1 'Inter','Inter',sans-serif;flex-shrink:0}\n.step .t{font:800 19px/1.3 'Inter','Inter',sans-serif;color:var(--dk);margin-bottom:8px;padding-top:11px}\n.step .b{font:300 15px/1.7 'Inter',sans-serif;color:var(--sl)}\n.gate-box{border:2px solid var(--bl);background:#f0f4ff;border-radius:12px;padding:20px 26px;margin:24px 0;break-inside:avoid}\n.gate-box .gh{font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0033CF;margin-bottom:10px}\n.gate-box ul{margin:0;padding-left:0;list-style:none}\n.gate-box li{font:400 15px/1.7 'Inter',sans-serif;color:var(--dk);padding-left:26px;position:relative;margin-bottom:6px}\n.gate-box li::before{content:'☐';position:absolute;left:0;color:var(--bl);font-weight:700}\n<\/style>\n<\/head>\n<body>\n<div class=\"page\">\n\n  <div class=\"doc-header\">\n    <div>\n      <div class=\"kicker\">OpenText Business Network · Trading Grid with Aviator<\/div>\n      <h1>AI Operationalization Framework<\/h1>\n      <div class=\"sub\">The operating manual for running governed AI in production, lifecycle, sequencing, KPI tracking, approval gates, rollback, and audit cadence.<\/div>\n    <\/div>\n    <div style=\"flex-shrink:0\">\n      <img src=\"__LOGO_NEG__\" alt=\"opentext\">\n      <div style=\"display:flex;gap:8px;justify-content:flex-end\">\n        <span class=\"tag tag-b\">Stage 3, Execution<\/span>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"doc-body\">\n\n    <p class=\"lead\">Stage 1 built understanding; Stage 2 secured approval. This framework covers what happens next: <strong>the disciplines that keep governed AI governed once it is live.<\/strong> It is written for delivery teams, operations leaders, and the governance functions that oversee them.<\/p>\n\n    <div class=\"section-label\">1 · Governance Lifecycle<\/div>\n    <div class=\"ar\"><\/div>\n    <h2 style=\"margin-top:0\">The standing cycle: monitor → review → adjust → attest<\/h2>\n    <table>\n      <thead><tr><th style=\"width:140px\">Cadence<\/th><th style=\"width:200px\">Activity<\/th><th>Content<\/th><th style=\"width:180px\">Owner<\/th><\/tr><\/thead>\n      <tbody>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">Continuous<\/td><td>Monitor<\/td><td>KPI dashboards vs. baseline; exception-rate alerts; drift monitoring on recommendation acceptance; audit events to SIEM<\/td><td>Workflow owner<\/td><\/tr>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">Weekly<\/td><td>Operational review<\/td><td>Metrics digest; notable AI interactions; user feedback themes; tuning actions<\/td><td>Workflow owner<\/td><\/tr>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">Monthly<\/td><td>Accuracy sampling<\/td><td>Random sample of AI outputs reviewed against outcomes; approval-quality audit at L2; findings logged<\/td><td>Audit owner<\/td><\/tr>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">Quarterly<\/td><td>Governance review<\/td><td>Board reviews accuracy trends, exceptions, incidents, policy currency; approves/denies level advancement requests<\/td><td>Governance board<\/td><\/tr>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">Annually<\/td><td>Attestation<\/td><td>Control-effectiveness review; DPA and policy re-validation; re-approval of standing autonomy levels; CoE charter review<\/td><td>Governance board + executive sponsor<\/td><\/tr>\n      <\/tbody>\n    <\/table>\n\n    <div class=\"divider\"><\/div>\n\n    <div class=\"section-label\">2 · Rollout Sequencing<\/div>\n    <div class=\"ar\"><\/div>\n    <h2 style=\"margin-top:0\">Sequencing rules that prevent self-inflicted failures<\/h2>\n    <div class=\"step\"><div class=\"n\">1<\/div><div><div class=\"t\">Baseline before enablement, always<\/div><div class=\"b\">No capability is enabled for a workflow until its baseline metrics (MTTR, escalation rate, volume) have been captured for at least two representative weeks. Without a baseline, success is undemonstrable and the Phase 2 gate cannot be passed honestly.<\/div><\/div><\/div>\n    <div class=\"step\"><div class=\"n\">2<\/div><div><div class=\"t\">One workflow cluster at a time<\/div><div class=\"b\">Enable capabilities for one operational cluster (e.g., order-to-ship investigation) and stabilize before adding the next. Parallel enablement multiplies tuning effort and muddies attribution of results.<\/div><\/div><\/div>\n    <div class=\"step\"><div class=\"n\">3<\/div><div><div class=\"t\">Visibility before recommendations, everywhere<\/div><div class=\"b\">A workflow must run at L0 long enough for analysts to trust retrieval quality before L1 recommendations switch on for it. Trust transfers upward; it cannot be skipped.<\/div><\/div><\/div>\n    <div class=\"step\"><div class=\"n\">4<\/div><div><div class=\"t\">Policy drafted while evidence accumulates<\/div><div class=\"b\">L3 policy sets (volume caps, partner lists, change windows) are written and board-reviewed during Phase 2, so the Phase 3 gate is a decision on evidence, not a drafting exercise under deadline pressure.<\/div><\/div><\/div>\n    <div class=\"step\"><div class=\"n\">5<\/div><div><div class=\"t\">No silent dependencies<\/div><div class=\"b\">Every AI-assisted workflow retains a documented manual path, exercised at least quarterly. The operation must always be able to run with AI disabled, this is what makes the strategic-pause rollback real.<\/div><\/div><\/div>\n\n    <div class=\"divider\"><\/div>\n\n    <div class=\"section-label\">3 · KPI Tracking<\/div>\n    <div class=\"ar\"><\/div>\n    <h2 style=\"margin-top:0\">Instrumentation discipline<\/h2>\n    <ul class=\"fl\">\n      <li><strong>Source of truth:<\/strong> KPIs compute from platform telemetry and audit logs, not from manually reported numbers.<\/li>\n      <li><strong>Baseline freeze:<\/strong> baselines are recorded, dated, and frozen at Gate 0. Mid-rollout baseline revisions require governance board approval and are logged as such.<\/li>\n      <li><strong>Weekly digest:<\/strong> a one-page metrics digest goes to the workflow owner and sponsor every week, same format, same metrics, so trends are legible.<\/li>\n      <li><strong>Gate packages:<\/strong> each phase-gate review receives a standard evidence package: KPI trends vs. baseline, accuracy samples, audit summary, incident log, and rollback drill results.<\/li>\n    <\/ul>\n\n    <div class=\"divider\"><\/div>\n\n    <div class=\"section-label\">4 · Operational Readiness<\/div>\n    <div class=\"ar\"><\/div>\n    <h2 style=\"margin-top:0\">Readiness checks before each phase<\/h2>\n    <div class=\"gate-box\">\n      <div class=\"gh\">Gate 0, Launch readiness (before Phase 1)<\/div>\n      <ul>\n        <li>Governance workshop complete; concerns mapped; open items closed or accepted<\/li>\n        <li>DPA review complete, including subprocessor and training-prohibition confirmation<\/li>\n        <li>Data classification applied: masking rules and metadata-only flags configured<\/li>\n        <li>Role scopes verified by security; audit events confirmed flowing to SIEM<\/li>\n        <li>Baselines captured and frozen; measurement workbook live<\/li>\n        <li>Named owners: workflow, policy, audit; rollback procedure documented and dry-run<\/li>\n      <\/ul>\n    <\/div>\n    <div class=\"gate-box\">\n      <div class=\"gh\">Gate 1, Phase 2 readiness (recommendations)<\/div>\n      <ul>\n        <li>Phase 1 exit criteria met: adoption ≥ target, MTTR improvement evident, clean audit sample<\/li>\n        <li>Accuracy measurement plan defined: sample size, cadence, threshold, reviewer<\/li>\n        <li>L2 approval workflow integrated with change control (for selected workflows)<\/li>\n        <li>Analyst training on evidence-verification habits delivered<\/li>\n      <\/ul>\n    <\/div>\n    <div class=\"gate-box\">\n      <div class=\"gh\">Gate 2, Phase 3 readiness (policy automation)<\/div>\n      <ul>\n        <li>Recommendation accuracy at or above board threshold for two consecutive months<\/li>\n        <li>L2 approval history: high approval rate, low post-approval reversals<\/li>\n        <li>Policy sets versioned, board-approved, and loaded; exception path tested<\/li>\n        <li>Rollback drill passed for each automation candidate; kill-switch owner named<\/li>\n        <li>Exception-rate dashboard live with alerting thresholds set<\/li>\n      <\/ul>\n    <\/div>\n\n    <div class=\"divider\"><\/div>\n\n    <div class=\"section-label\">5 · Approval Gates<\/div>\n    <div class=\"ar\"><\/div>\n    <h2 style=\"margin-top:0\">How a gate decision works<\/h2>\n    <p>Each gate is a governance board decision made on the standard evidence package. Three outcomes are possible:<\/p>\n    <table>\n      <thead><tr><th style=\"width:160px\">Outcome<\/th><th>Meaning<\/th><th>Follow-up<\/th><\/tr><\/thead>\n      <tbody>\n        <tr><td style=\"font-weight:700;color:#156615\">Advance<\/td><td>Criteria met; next phase authorized for the reviewed workflows<\/td><td>Enablement scheduled; next gate criteria confirmed<\/td><\/tr>\n        <tr><td style=\"font-weight:700;color:#8a5c00\">Hold<\/td><td>Evidence incomplete or borderline; current phase continues<\/td><td>Specific evidence gaps named; review re-scheduled (typically 30 to 60 days)<\/td><\/tr>\n        <tr><td style=\"font-weight:700;color:#b11206\">Step down<\/td><td>Criteria failing or risk finding; workflow reverts one level<\/td><td>Root-cause review; re-advancement path defined; incident logged if applicable<\/td><\/tr>\n      <\/tbody>\n    <\/table>\n    <div class=\"callout\"><p><strong>Partial advancement is normal and healthy.<\/strong> Gates are evaluated per workflow, advancing transaction investigation while holding partner insights is the framework working as designed, not a failure.<\/p><\/div>\n\n    <div class=\"divider\"><\/div>\n\n    <div class=\"section-label\">6 · Rollback Procedures<\/div>\n    <div class=\"ar\"><\/div>\n    <h2 style=\"margin-top:0\">The three rollback tiers<\/h2>\n    <table>\n      <thead><tr><th style=\"width:200px\">Tier<\/th><th>Trigger examples<\/th><th>Procedure<\/th><th style=\"width:150px\">Authority<\/th><\/tr><\/thead>\n      <tbody>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">Level step-down<\/td><td>Accuracy drift; rising exceptions; approval-quality concern<\/td><td>Workflow reverts one autonomy level via configuration. In-flight actions complete or cancel per safe-stop setting. Logged with reason.<\/td><td>Workflow owner<\/td><\/tr>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">Capability freeze<\/td><td>Audit finding; security investigation; data-classification change<\/td><td>Capability disabled for affected roles or tenant-wide. Manual path activates. Investigation proceeds on audit history.<\/td><td>Audit owner / CISO delegate<\/td><\/tr>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">Program suspension<\/td><td>Strategic pause; major incident; regulatory development<\/td><td>All AI capabilities disabled tenant-wide. Operation continues on manual paths (maintained per sequencing rule 5). Restart requires Gate 0 re-review.<\/td><td>Executive sponsor<\/td><\/tr>\n      <\/tbody>\n    <\/table>\n    <ul class=\"fl\">\n      <li><strong>Action-level rollback:<\/strong> independent of tiers, individual automated actions reverse via prior-state snapshots, cancel queued retries, restore configuration versions, with the reversal logged alongside the action.<\/li>\n      <li><strong>Drill cadence:<\/strong> one rollback exercise per phase, on a real workflow, during calm conditions. Results go in the gate evidence package.<\/li>\n    <\/ul>\n\n    <div class=\"divider\"><\/div>\n\n    <div class=\"section-label\">7 · Ongoing Audit Reviews<\/div>\n    <div class=\"ar\"><\/div>\n    <h2 style=\"margin-top:0\">What audit reviews, and what it looks for<\/h2>\n    <table>\n      <thead><tr><th style=\"width:240px\">Review<\/th><th>Sample<\/th><th>Looking for<\/th><\/tr><\/thead>\n      <tbody>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">Access review<\/td><td>AI query and retrieval logs<\/td><td>Retrieval matching user permission scope; no out-of-tenant access; masking flags honored<\/td><\/tr>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">Output quality review<\/td><td>Random AI responses + evidence links<\/td><td>Conclusions supported by cited records; confidence honestly scored; low-confidence cases escalated, not answered<\/td><\/tr>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">Action review<\/td><td>L2 approvals + L3 executions<\/td><td>Approvals substantive; policy checks executed and passed; snapshots present; exceptions escalated with reasons<\/td><\/tr>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">Configuration review<\/td><td>Autonomy and policy change log<\/td><td>Changes authorized by the right owner; versions consistent with board approvals; no unauthorized scope expansion<\/td><\/tr>\n      <\/tbody>\n    <\/table>\n\n    <div class=\"dark-block\">\n      <div class=\"db-k\">The Operating Principle<\/div>\n      <div class=\"db-t\">Run AI with the same discipline as the network it serves.<\/div>\n      <div class=\"db-b\">Baselines, gates, drills, owners, audits, none of this is new management science. It is the enterprise operations playbook, applied to a new class of capability. That familiarity is what makes the framework executable.<\/div>\n    <\/div>\n\n  <\/div>\n\n  <div class=\"doc-footer\">\n    <div>OpenText Business Network · Trading Grid with Aviator, Confidential<\/div>\n    <div>Stage 3, Execution · AI Operationalization Framework · 2026<\/div>\n  <\/div>\n\n<\/div>\n<\/body>\n<\/html>\n","s3/AI-Deployment-Checklist":"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n__FONTS__\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>AI Deployment Checklist, OpenText Trading Grid with Aviator<\/title>\n__DOCCSS__\n<style>\n.cl{border:1px solid var(--ln);border-radius:14px;margin-bottom:24px;overflow:hidden;break-inside:avoid}\n.cl-h{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 28px;background:var(--dk)}\n.cl-h .t{font:800 20px/1.25 'Inter','Inter',sans-serif;color:#fff}\n.cl-h .o{font:700 12px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#7eb3ff}\n.cl-b{padding:10px 28px 16px}\n.ci{display:grid;grid-template-columns:34px 1fr 230px;gap:12px;align-items:start;padding:13px 0;border-bottom:1px solid var(--lt)}\n.ci:last-child{border-bottom:none}\n.ci .box{width:22px;height:22px;border:2px solid var(--bl);border-radius:6px;margin-top:1px}\n.ci .what{font:400 15px/1.55 'Inter',sans-serif;color:var(--dk)}\n.ci .what small{display:block;font:300 13.5px/1.5 'Inter',sans-serif;color:var(--sl);margin-top:3px}\n.ci .who{font:300 13.5px/1.5 'Inter',sans-serif;color:var(--sl);text-align:right;padding-top:2px}\n@media print{.ci .box{-webkit-print-color-adjust:exact;print-color-adjust:exact}}\n<\/style>\n<\/head>\n<body>\n<div class=\"page\">\n\n  <div class=\"doc-header\">\n    <div>\n      <div class=\"kicker\">OpenText Business Network · Trading Grid with Aviator<\/div>\n      <h1>AI Deployment Checklist<\/h1>\n      <div class=\"sub\">The signoff sequence for go-live, governance, privacy, security, pilot, operations, rollback, and audit readiness in one document.<\/div>\n    <\/div>\n    <div style=\"flex-shrink:0\">\n      <img src=\"__LOGO_NEG__\" alt=\"opentext\">\n      <div style=\"display:flex;gap:8px;justify-content:flex-end\">\n        <span class=\"tag tag-b\">Stage 3, Execution<\/span>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"doc-body\">\n\n    <p class=\"lead\">Each section below is a signoff domain with a named accountable owner. <strong>Go-live requires every section signed<\/strong>, a checklist with unsigned sections is a risk register, not a deployment plan. Print this document for gate reviews; each item carries its verification note.<\/p>\n\n    <div class=\"section-label\">Signoff Domains<\/div>\n    <div class=\"ar\"><\/div>\n\n    <div class=\"cl\">\n      <div class=\"cl-h\"><span class=\"t\">1 · Governance approvals<\/span><span class=\"o\">Owner: Governance board chair<\/span><\/div>\n      <div class=\"cl-b\">\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Governance workshop completed; concern inventory mapped to controls<small>Evidence: workshop record with concern-to-control mapping and closed open-items list<\/small><\/div><div class=\"who\">Governance board<\/div><\/div>\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Initial capability scope and autonomy ceiling approved per workflow<small>Evidence: signed scope document referencing the Autonomy Maturity Model levels<\/small><\/div><div class=\"who\">Governance board<\/div><\/div>\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Phase-gate criteria agreed and recorded (Gates 1 to 3 with numeric thresholds)<small>Evidence: gate criteria appendix in the rollout plan<\/small><\/div><div class=\"who\">Governance board + sponsor<\/div><\/div>\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Named owners appointed: workflow, policy, audit, kill-switch<small>Evidence: ownership register with contact and delegation paths<\/small><\/div><div class=\"who\">Executive sponsor<\/div><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"cl\">\n      <div class=\"cl-h\"><span class=\"t\">2 · Privacy validation<\/span><span class=\"o\">Owner: Privacy / DPO<\/span><\/div>\n      <div class=\"cl-b\">\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">DPA review complete, subprocessor listing, training prohibition, processing purposes confirmed<small>Evidence: legal review memo referencing Legal &amp; Privacy Brief §1, §2, §8<\/small><\/div><div class=\"who\">Legal / Privacy<\/div><\/div>\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Data classification applied: sensitive flows identified; masking and metadata-only modes configured<small>Evidence: classification worksheet + configuration export<\/small><\/div><div class=\"who\">Privacy + Data owner<\/div><\/div>\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Residency requirements validated per operating region<small>Evidence: residency matrix signed against DPA annexes<\/small><\/div><div class=\"who\">Privacy<\/div><\/div>\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Retention alignment confirmed for AI artifacts (interaction logs, audit records)<small>Evidence: retention schedule updated to include AI event classes<\/small><\/div><div class=\"who\">Privacy + Records<\/div><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"cl\">\n      <div class=\"cl-h\"><span class=\"t\">3 · Security reviews<\/span><span class=\"o\">Owner: CISO delegate<\/span><\/div>\n      <div class=\"cl-b\">\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Role scopes verified, AI retrieval bounded by existing RBAC; test cases executed for in-scope and out-of-scope queries<small>Evidence: access test results (Scenario A/B pattern, Security deck slide 4)<\/small><\/div><div class=\"who\">Security<\/div><\/div>\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Audit events flowing to SIEM; all six event classes parsing correctly<small>Evidence: SIEM ingestion validation for query, retrieval, inference, response, action, config classes<\/small><\/div><div class=\"who\">Security operations<\/div><\/div>\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Capability-to-API map reviewed for each enabled agent<small>Evidence: threat-model note appended to the capability map<\/small><\/div><div class=\"who\">Security architecture<\/div><\/div>\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Incident-response playbook updated with AI-assisted workflow category<small>Evidence: playbook revision + tabletop walkthrough record<\/small><\/div><div class=\"who\">Security operations<\/div><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"cl\">\n      <div class=\"cl-h\"><span class=\"t\">4 · Pilot validation<\/span><span class=\"o\">Owner: Workflow owner<\/span><\/div>\n      <div class=\"cl-b\">\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Baselines captured and frozen, MTTR, escalation rate, volume for pilot scope (≥2 representative weeks)<small>Evidence: baseline workbook, dated and signed at Gate 0<\/small><\/div><div class=\"who\">Workflow owner<\/div><\/div>\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Pilot group enabled (10 to 25 users) and trained on real investigations<small>Evidence: enablement roster + working-session record<\/small><\/div><div class=\"who\">Workflow owner + OpenText SC<\/div><\/div>\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Accuracy spot-checks passed on pilot output sample<small>Evidence: sample review sheet, conclusions verified against cited records<\/small><\/div><div class=\"who\">Audit owner<\/div><\/div>\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Pilot exit criteria met: adoption ≥ 60%, MTTR improvement evident, no unresolved accuracy concerns<small>Evidence: Gate 1 evidence package<\/small><\/div><div class=\"who\">Workflow owner<\/div><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"cl\">\n      <div class=\"cl-h\"><span class=\"t\">5 · Operational signoff<\/span><span class=\"o\">Owner: Operations leadership<\/span><\/div>\n      <div class=\"cl-b\">\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Manual fallback path documented and exercised for every AI-assisted workflow<small>Evidence: fallback runbook + quarterly exercise schedule<\/small><\/div><div class=\"who\">Operations<\/div><\/div>\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Weekly metrics digest format agreed; first digest published against baseline<small>Evidence: digest #1 distributed to owner and sponsor<\/small><\/div><div class=\"who\">Workflow owner<\/div><\/div>\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Escalation paths configured, confidence-based handoff routing to named support queues<small>Evidence: handoff test with context-preservation check<\/small><\/div><div class=\"who\">Operations + Support<\/div><\/div>\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Team communication delivered: what's changing, what isn't, where decision rights remain<small>Evidence: enablement comms + FAQ distributed<\/small><\/div><div class=\"who\">Operations leadership<\/div><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"cl\">\n      <div class=\"cl-h\"><span class=\"t\">6 · Rollback readiness<\/span><span class=\"o\">Owner: Workflow owner + kill-switch owner<\/span><\/div>\n      <div class=\"cl-b\">\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Rollback procedure documented for each tier: level step-down, capability freeze, program suspension<small>Evidence: rollback runbook referencing Operationalization Framework §6<\/small><\/div><div class=\"who\">Workflow owner<\/div><\/div>\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Rollback dry-run executed during calm conditions; time-to-revert recorded<small>Evidence: drill log with timings and findings<\/small><\/div><div class=\"who\">Workflow + audit owners<\/div><\/div>\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Kill-switch authority named, including out-of-hours delegation<small>Evidence: ownership register entry with delegation chain<\/small><\/div><div class=\"who\">Executive sponsor<\/div><\/div>\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Safe-stop behavior configured for in-flight actions (complete vs. cancel per workflow)<small>Evidence: configuration export + test record<\/small><\/div><div class=\"who\">Workflow owner + OpenText SC<\/div><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"cl\">\n      <div class=\"cl-h\"><span class=\"t\">7 · Audit readiness<\/span><span class=\"o\">Owner: Audit owner<\/span><\/div>\n      <div class=\"cl-b\">\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Audit review program scheduled: monthly accuracy sampling, quarterly governance review, annual attestation<small>Evidence: governance calendar entries with named reviewers<\/small><\/div><div class=\"who\">Audit owner<\/div><\/div>\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Audit log query access verified for customer audit team, reconstruction works without vendor assistance<small>Evidence: end-to-end reconstruction exercise on a test interaction<\/small><\/div><div class=\"who\">Audit owner<\/div><\/div>\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Evidence-package template agreed for gate reviews<small>Evidence: template covering KPIs, samples, incidents, drill results<\/small><\/div><div class=\"who\">Audit owner + board<\/div><\/div>\n        <div class=\"ci\"><div class=\"box\"><\/div><div class=\"what\">Regulatory mapping noted where applicable (SOX change evidence, GDPR records of processing)<small>Evidence: compliance memo appended to audit program<\/small><\/div><div class=\"who\">Audit + Compliance<\/div><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"dark-block\">\n      <div class=\"db-k\">Go-Live Rule<\/div>\n      <div class=\"db-t\">Seven sections. Seven signatures. Then enable.<\/div>\n      <div class=\"db-b\">A deployment that can produce this checklist signed is a deployment any governance function can defend, on day one and at every audit after.<\/div>\n    <\/div>\n\n  <\/div>\n\n  <div class=\"doc-footer\">\n    <div>OpenText Business Network · Trading Grid with Aviator, Confidential<\/div>\n    <div>Stage 3, Execution · AI Deployment Checklist · 2026<\/div>\n  <\/div>\n\n<\/div>\n<\/body>\n<\/html>\n","s3/AI-Operating-Model":"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n__FONTS__\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>AI Operating Model, OpenText Trading Grid with Aviator<\/title>\n<style>\n__COLORSCSS__\ndeck-stage:not(:defined){visibility:hidden}\n*{box-sizing:border-box;margin:0;padding:0}\nsection{font-family:'Inter','Helvetica Neue',sans-serif;overflow:hidden}\n.logo{position:absolute;top:52px;right:96px;height:44px;width:auto}\n.foot{position:absolute;bottom:44px;left:96px;right:96px;display:flex;justify-content:space-between;font:400 14px/1 'Inter',sans-serif;letter-spacing:0.04em;color:#3f4d62}\n.foot.d{color:rgba(255,255,255,0.35)}\n.foot span{white-space:nowrap}\n.ew{font:700 14px/1 'Inter',sans-serif;letter-spacing:0.14em;text-transform:uppercase;color:#0066FF;margin-bottom:16px}\n.ar{width:64px;height:5px;background:#0066FF;border-radius:3px;margin-bottom:28px}\n.h2{font:800 52px/1.06 'Inter','Inter',sans-serif;color:#101c2f;letter-spacing:-0.022em}\n.card{background:#fff;border:1px solid #e7eaef;border-radius:16px;box-shadow:0 10px 30px rgba(16,28,47,0.08),0 5px 10px rgba(16,28,47,0.04)}\n.kl{font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0066FF;margin-bottom:12px}\n.kt{font:800 21px/1.25 'Inter','Inter',sans-serif;color:#101c2f;margin-bottom:10px}\n.kb{font:300 17px/1.6 'Inter',sans-serif;color:#3f4d62}\n.kb strong{color:#101c2f;font-weight:700}\n<\/style>\n<\/head>\n<body style=\"margin:0;background:#1a1a2e\">\n<deck-stage width=\"1920\" height=\"1080\">\n\n<!-- 01 TITLE -->\n<section data-label=\"01 Title\">\n<div style=\"position:absolute;inset:0;background:#101c2f;overflow:hidden\">\n  <div style=\"position:absolute;left:50%;bottom:-420px;width:1100px;height:1100px;border-radius:50%;border:1px solid rgba(0,102,255,0.09)\"><\/div>\n  <img class=\"logo\" src=\"__LOGO_NEG__\" alt=\"opentext\">\n  <div style=\"position:absolute;left:96px;top:240px;max-width:1350px\">\n    <div style=\"width:72px;height:5px;background:#0066FF;border-radius:3px;margin-bottom:36px\"><\/div>\n    <div style=\"font:700 15px/1 'Inter',sans-serif;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.52);margin-bottom:28px\">OpenText Business Network · Trading Grid with Aviator · Stage 3, Execution<\/div>\n    <div style=\"font:900 76px/1.04 'Inter','Inter',sans-serif;color:#fff;letter-spacing:-0.03em;margin-bottom:40px\">The AI<br>Operating Model<\/div>\n    <div style=\"font:300 26px/1.55 'Inter',sans-serif;color:rgba(255,255,255,0.72);max-width:940px\">Organizational ownership, governance structure, operational responsibilities, escalation paths, and the oversight model for governed AI in production.<\/div>\n  <\/div>\n  <div class=\"foot d\"><span>CONFIDENTIAL, OPERATIONS &amp; GOVERNANCE TEAMS<\/span><span>2026<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 02 OPERATING MODEL OVERVIEW -->\n<section data-label=\"02 Model Overview\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">The Model at a Glance<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:48px;max-width:1300px\">Three tiers of accountability,<br>one continuous flow of evidence<\/div>\n    <div style=\"display:flex;flex-direction:column;gap:16px;max-width:1700px\">\n      <div style=\"display:grid;grid-template-columns:340px 1fr 360px;background:#101c2f;border-radius:14px;overflow:hidden\">\n        <div style=\"padding:26px 32px;border-right:1px solid rgba(255,255,255,0.08)\"><div style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0066FF;margin-bottom:8px\">Tier 1, Direct<\/div><div style=\"font:800 24px/1.15 'Inter','Inter',sans-serif;color:#fff\">Operate<\/div><\/div>\n        <div style=\"padding:26px 32px;font:300 18px/1.55 'Inter',sans-serif;color:rgba(255,255,255,0.78)\">Analysts and workflow owners use AI daily, verify evidence, approve L2 actions, watch dashboards, and execute step-downs when signals warrant.<\/div>\n        <div style=\"padding:26px 32px;border-left:1px solid rgba(255,255,255,0.08);font:400 16px/1.55 'Inter',sans-serif;color:#7eb3ff\">Daily to weekly rhythm<br>Decision authority: per-action<\/div>\n      <\/div>\n      <div style=\"display:grid;grid-template-columns:340px 1fr 360px;background:#0066FF;border-radius:14px;overflow:hidden\">\n        <div style=\"padding:26px 32px;border-right:1px solid rgba(255,255,255,0.15)\"><div style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.7);margin-bottom:8px\">Tier 2, Oversight<\/div><div style=\"font:800 24px/1.15 'Inter','Inter',sans-serif;color:#fff\">Govern<\/div><\/div>\n        <div style=\"padding:26px 32px;font:300 18px/1.55 'Inter',sans-serif;color:rgba(255,255,255,0.88)\">The AI CoE and audit owner run sampling, reviews, policy versioning, and gate evidence, converting daily operation into governance-grade evidence.<\/div>\n        <div style=\"padding:26px 32px;border-left:1px solid rgba(255,255,255,0.15);font:400 16px/1.55 'Inter',sans-serif;color:rgba(255,255,255,0.85)\">Monthly to quarterly rhythm<br>Decision authority: policy &amp; level<\/div>\n      <\/div>\n      <div style=\"display:grid;grid-template-columns:340px 1fr 360px;background:#27364c;border-radius:14px;overflow:hidden\">\n        <div style=\"padding:26px 32px;border-right:1px solid rgba(255,255,255,0.08)\"><div style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0066FF;margin-bottom:8px\">Tier 3, Accountability<\/div><div style=\"font:800 24px/1.15 'Inter','Inter',sans-serif;color:#fff\">Attest<\/div><\/div>\n        <div style=\"padding:26px 32px;font:300 18px/1.55 'Inter',sans-serif;color:rgba(255,255,255,0.78)\">The governance board and executive sponsor make gate decisions, approve autonomy ceilings, and attest annually that controls remain effective.<\/div>\n        <div style=\"padding:26px 32px;border-left:1px solid rgba(255,255,255,0.08);font:400 16px/1.55 'Inter',sans-serif;color:#7eb3ff\">Quarterly to annual rhythm<br>Decision authority: program<\/div>\n      <\/div>\n    <\/div>\n    <div style=\"margin-top:28px;font:300 18px/1.5 'Inter',sans-serif;color:#3f4d62;max-width:1700px\">Evidence flows up; authority flows down. No tier can skip the one between.<\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · AI Operating Model, Confidential<\/span><span>2 / 10<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 03 ORGANIZATIONAL OWNERSHIP -->\n<section data-label=\"03 Organizational Ownership\">\n<div style=\"position:absolute;inset:0;background:#f6f7f7;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Organizational Ownership<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:44px\">Five named owners. No shared accountability.<\/div>\n    <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:22px;max-width:1728px;margin-bottom:32px\">\n      <div class=\"card\" style=\"padding:30px 26px\">\n        <div class=\"kl\">Executive Sponsor<\/div>\n        <div class=\"kb\" style=\"font-size:16px\">Owns the adoption case and program continuity. Chairs gate decisions. Holds program-suspension authority. Accountable to the enterprise for the AI program as a whole.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:30px 26px\">\n        <div class=\"kl\">Workflow Owner<\/div>\n        <div class=\"kb\" style=\"font-size:16px\">One per AI-assisted workflow. Owns its autonomy level, KPI review, tuning, and step-down authority. The person who can say \"this workflow stops\" without a meeting.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:30px 26px\">\n        <div class=\"kl\">Policy Owner<\/div>\n        <div class=\"kb\" style=\"font-size:16px\">Maintains the versioned policy library, caps, lists, windows, triggers. Runs policy change control and the annual currency review.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:30px 26px\">\n        <div class=\"kl\">Audit Owner<\/div>\n        <div class=\"kb\" style=\"font-size:16px\">Runs sampling and reviews. Reports to the governance board, independent of workflow owners. Holds capability-freeze authority on findings.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:30px 26px\">\n        <div class=\"kl\">Kill-Switch Owner<\/div>\n        <div class=\"kb\" style=\"font-size:16px\">Named authority, with out-of-hours delegation, to disable capabilities immediately. Tested in each phase's rollback drill.<\/div>\n      <\/div>\n    <\/div>\n    <div style=\"padding:22px 30px;background:#fff;border:1px solid #e7eaef;border-radius:12px;max-width:1728px\">\n      <div style=\"font:300 19px/1.6 'Inter',sans-serif;color:#3f4d62\"><strong style=\"color:#101c2f;font-weight:700\">Design rule: every authority in this model is held by a person, not a committee.<\/strong> Committees review and advise; named owners decide and act. This is what makes the model fast enough for operations and accountable enough for audit.<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · AI Operating Model, Confidential<\/span><span>3 / 10<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 04 GOVERNANCE STRUCTURE -->\n<section data-label=\"04 Governance Structure\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Governance Structure<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:44px\">Existing bodies, extended, not a parallel bureaucracy<\/div>\n    <div style=\"border:1px solid #e7eaef;border-radius:16px;overflow:hidden;max-width:1728px;margin-bottom:30px\">\n      <div style=\"display:grid;grid-template-columns:300px 1fr 1fr 280px;background:#101c2f;padding:16px 32px\">\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Body<\/div>\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">AI responsibility<\/div>\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Typically extends<\/div>\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Cadence<\/div>\n      <\/div>\n      <div style=\"display:grid;grid-template-columns:300px 1fr 1fr 280px;padding:18px 32px;border-bottom:1px solid #f6f7f7\"><div style=\"font:700 18px/1.4 'Inter',sans-serif;color:#101c2f\">Governance board<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\">Gate decisions, autonomy ceilings, annual attestation<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\">Existing risk / change advisory board<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#0033CF\">Quarterly + gates<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:300px 1fr 1fr 280px;padding:18px 32px;border-bottom:1px solid #f6f7f7\"><div style=\"font:700 18px/1.4 'Inter',sans-serif;color:#101c2f\">AI CoE<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\">Capability register, policy library, lifecycle management, knowledge stewardship<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\">New standing coordination body (&lt; 2 FTE aggregate)<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#0033CF\">Monthly<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:300px 1fr 1fr 280px;padding:18px 32px;border-bottom:1px solid #f6f7f7\"><div style=\"font:700 18px/1.4 'Inter',sans-serif;color:#101c2f\">Change control<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\">L2 approval workflows, policy change gates, automation windows<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\">Existing CAB process<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#0033CF\">Existing rhythm<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:300px 1fr 1fr 280px;padding:18px 32px\"><div style=\"font:700 18px/1.4 'Inter',sans-serif;color:#101c2f\">Audit program<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\">Accuracy sampling, access reviews, action reviews, configuration reviews<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\">Existing internal audit / compliance function<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#0033CF\">Monthly to quarterly<\/div><\/div>\n    <\/div>\n    <div style=\"padding:22px 30px;background:#f0f4ff;border-radius:12px;border-left:4px solid #0066FF;max-width:1728px\">\n      <div style=\"font:300 19px/1.6 'Inter',sans-serif;color:#3f4d62\">The only genuinely new structure is the CoE, and it is a coordination body, not a department. Everything else is your existing governance machinery absorbing a new evidence stream.<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · AI Operating Model, Confidential<\/span><span>4 / 10<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 05 OPERATIONAL RESPONSIBILITIES -->\n<section data-label=\"05 Operational Responsibilities\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Operational Responsibilities<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:44px\">A week in the operating model<\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:28px;max-width:1700px\">\n      <div class=\"card\" style=\"padding:36px 36px\">\n        <div class=\"kl\">Operations Team, Daily<\/div>\n        <div style=\"display:flex;flex-direction:column;gap:0\">\n          <div style=\"display:flex;gap:14px;padding:12px 0;border-bottom:1px solid #f6f7f7\"><div style=\"width:8px;height:8px;border-radius:50%;background:#0066FF;flex-shrink:0;margin-top:9px\"><\/div><div class=\"kb\" style=\"font-size:17px\">Use AI for investigation, explanation, and triage, verifying evidence links on consequential conclusions<\/div><\/div>\n          <div style=\"display:flex;gap:14px;padding:12px 0;border-bottom:1px solid #f6f7f7\"><div style=\"width:8px;height:8px;border-radius:50%;background:#0066FF;flex-shrink:0;margin-top:9px\"><\/div><div class=\"kb\" style=\"font-size:17px\">Review and decide L2 approval requests with substantive checks, not rubber stamps<\/div><\/div>\n          <div style=\"display:flex;gap:14px;padding:12px 0;border-bottom:1px solid #f6f7f7\"><div style=\"width:8px;height:8px;border-radius:50%;background:#0066FF;flex-shrink:0;margin-top:9px\"><\/div><div class=\"kb\" style=\"font-size:17px\">Handle exception escalations from L3 automation with the stated rejection reason as the starting point<\/div><\/div>\n          <div style=\"display:flex;gap:14px;padding:12px 0\"><div style=\"width:8px;height:8px;border-radius:50%;background:#0066FF;flex-shrink:0;margin-top:9px\"><\/div><div class=\"kb\" style=\"font-size:17px\">Flag inaccurate or unverifiable outputs through the feedback path, raw material for tuning<\/div><\/div>\n        <\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:36px 36px\">\n        <div class=\"kl\">Workflow Owner, Weekly<\/div>\n        <div style=\"display:flex;flex-direction:column;gap:0\">\n          <div style=\"display:flex;gap:14px;padding:12px 0;border-bottom:1px solid #f6f7f7\"><div style=\"width:8px;height:8px;border-radius:50%;background:#0066FF;flex-shrink:0;margin-top:9px\"><\/div><div class=\"kb\" style=\"font-size:17px\">Review the metrics digest: MTTR, adoption, escalation, acceptance, exceptions vs. baseline<\/div><\/div>\n          <div style=\"display:flex;gap:14px;padding:12px 0;border-bottom:1px solid #f6f7f7\"><div style=\"width:8px;height:8px;border-radius:50%;background:#0066FF;flex-shrink:0;margin-top:9px\"><\/div><div class=\"kb\" style=\"font-size:17px\">Triage feedback themes; commission configuration or scope tuning where warranted<\/div><\/div>\n          <div style=\"display:flex;gap:14px;padding:12px 0;border-bottom:1px solid #f6f7f7\"><div style=\"width:8px;height:8px;border-radius:50%;background:#0066FF;flex-shrink:0;margin-top:9px\"><\/div><div class=\"kb\" style=\"font-size:17px\">Watch the step-down signals: accuracy drift, rising exceptions, approval reversals<\/div><\/div>\n          <div style=\"display:flex;gap:14px;padding:12px 0\"><div style=\"width:8px;height:8px;border-radius:50%;background:#0066FF;flex-shrink:0;margin-top:9px\"><\/div><div class=\"kb\" style=\"font-size:17px\">Publish the digest to the sponsor, same format every week, so trends are legible<\/div><\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n    <div style=\"margin-top:30px;padding:22px 30px;background:#f6f7f7;border-radius:12px;max-width:1700px\">\n      <div style=\"font:300 18px/1.6 'Inter',sans-serif;color:#3f4d62\"><strong style=\"color:#101c2f;font-weight:700\">OpenText's standing role:<\/strong> solution consultant for configuration and tuning; support for escalated handoffs; evidence packages (usage analytics, accuracy data, audit extracts) delivered for every review cycle.<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · AI Operating Model, Confidential<\/span><span>5 / 10<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 06 ESCALATION PATHS -->\n<section data-label=\"06 Escalation Paths\">\n<div style=\"position:absolute;inset:0;background:#f6f7f7;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Escalation Paths<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:44px\">Four escalation lanes, each with a defined endpoint<\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:1728px\">\n      <div class=\"card\" style=\"padding:32px 34px\">\n        <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:16px\"><div style=\"width:44px;height:44px;border-radius:10px;background:#e8efff;display:flex;align-items:center;justify-content:center;font:900 18px/1 'Inter','Inter',sans-serif;color:#0033CF\">1<\/div><div class=\"kt\" style=\"margin:0\">AI-initiated: low confidence<\/div><\/div>\n        <div class=\"kb\">Aviator's confidence falls below threshold → conversation escalates to the support queue <strong>with full context preserved<\/strong> (question, data examined, analysis so far). Endpoint: human analyst resolves; case feeds the monthly accuracy review.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:32px 34px\">\n        <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:16px\"><div style=\"width:44px;height:44px;border-radius:10px;background:#e8efff;display:flex;align-items:center;justify-content:center;font:900 18px/1 'Inter','Inter',sans-serif;color:#0033CF\">2<\/div><div class=\"kt\" style=\"margin:0\">Policy-initiated: blocked action<\/div><\/div>\n        <div class=\"kb\">An L3 action fails policy validation → blocked, never executed, routed to the workflow owner with the failed check named. Endpoint: owner resolves manually or amends policy through change control. Rising block rates trigger step-down review.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:32px 34px\">\n        <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:16px\"><div style=\"width:44px;height:44px;border-radius:10px;background:#e8efff;display:flex;align-items:center;justify-content:center;font:900 18px/1 'Inter','Inter',sans-serif;color:#0033CF\">3<\/div><div class=\"kt\" style=\"margin:0\">Human-initiated: quality concern<\/div><\/div>\n        <div class=\"kb\">An analyst flags a wrong or unverifiable output → logged to the feedback path, visible to the workflow owner same-week. Endpoint: tuning action, scope correction, or, if a pattern, audit owner review and possible capability freeze.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:32px 34px\">\n        <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:16px\"><div style=\"width:44px;height:44px;border-radius:10px;background:#e8efff;display:flex;align-items:center;justify-content:center;font:900 18px/1 'Inter','Inter',sans-serif;color:#0033CF\">4<\/div><div class=\"kt\" style=\"margin:0\">Incident: operational impact<\/div><\/div>\n        <div class=\"kb\">An AI-assisted workflow contributes to an operational incident → standard incident process, plus the AI audit trail (request → retrieval → response → action) attached to the post-mortem. Endpoint: incident review decides step-down, freeze, or no-change, logged either way.<\/div>\n      <\/div>\n    <\/div>\n    <div style=\"margin-top:28px;font:300 18px/1.5 'Inter',sans-serif;color:#3f4d62;max-width:1700px\">Out-of-hours: lanes 2 and 4 route to the kill-switch owner's delegation chain. No escalation waits for business hours.<\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · AI Operating Model, Confidential<\/span><span>6 / 10<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 07 OVERSIGHT MODEL -->\n<section data-label=\"07 Oversight Model\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">AI Oversight Model<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:44px\">The oversight calendar, who watches what, when<\/div>\n    <div style=\"border:1px solid #e7eaef;border-radius:16px;overflow:hidden;max-width:1728px;margin-bottom:30px\">\n      <div style=\"display:grid;grid-template-columns:200px 1fr 320px;background:#101c2f;padding:16px 32px\">\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Cadence<\/div>\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Activity<\/div>\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Output<\/div>\n      <\/div>\n      <div style=\"display:grid;grid-template-columns:200px 1fr 320px;padding:17px 32px;border-bottom:1px solid #f6f7f7\"><div style=\"font:700 17px/1.4 'Inter',sans-serif;color:#0066FF\">Continuous<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\">KPI dashboards, exception alerts, drift monitoring, audit events to SIEM<\/div><div style=\"font:300 16px/1.5 'Inter',sans-serif;color:#3f4d62\">Alerts to workflow owner<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:200px 1fr 320px;padding:17px 32px;border-bottom:1px solid #f6f7f7\"><div style=\"font:700 17px/1.4 'Inter',sans-serif;color:#0066FF\">Weekly<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\">Metrics digest review; feedback triage; tuning decisions<\/div><div style=\"font:300 16px/1.5 'Inter',sans-serif;color:#3f4d62\">Digest to sponsor<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:200px 1fr 320px;padding:17px 32px;border-bottom:1px solid #f6f7f7\"><div style=\"font:700 17px/1.4 'Inter',sans-serif;color:#0066FF\">Monthly<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\">Accuracy sampling; approval-quality audit; CoE coordination meeting<\/div><div style=\"font:300 16px/1.5 'Inter',sans-serif;color:#3f4d62\">Findings log; capability register update<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:200px 1fr 320px;padding:17px 32px;border-bottom:1px solid #f6f7f7\"><div style=\"font:700 17px/1.4 'Inter',sans-serif;color:#0066FF\">Quarterly<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\">Governance board review: trends, exceptions, incidents, advancement requests; manual-fallback exercise<\/div><div style=\"font:300 16px/1.5 'Inter',sans-serif;color:#3f4d62\">Gate decisions; review minutes<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:200px 1fr 320px;padding:17px 32px\"><div style=\"font:700 17px/1.4 'Inter',sans-serif;color:#0066FF\">Annual<\/div><div style=\"font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\">Control attestation; DPA and policy currency; maturity re-assessment; rollback drill<\/div><div style=\"font:300 16px/1.5 'Inter',sans-serif;color:#3f4d62\">Attestation record; renewed autonomy approvals<\/div><\/div>\n    <\/div>\n    <div style=\"padding:22px 30px;background:#f0f4ff;border-radius:12px;border-left:4px solid #0066FF;max-width:1728px\">\n      <div style=\"font:300 19px/1.6 'Inter',sans-serif;color:#3f4d62\">Every row produces a written artifact. Oversight that doesn't write things down cannot attest to anything, <strong style=\"color:#101c2f;font-weight:700\">the calendar is also the evidence plan.<\/strong><\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · AI Operating Model, Confidential<\/span><span>7 / 10<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 08 DECISION RIGHTS -->\n<section data-label=\"08 Decision Rights\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Decision Rights<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:44px\">Who decides what, the one-look reference<\/div>\n    <div style=\"border:1px solid #e7eaef;border-radius:16px;overflow:hidden;max-width:1728px\">\n      <div style=\"display:grid;grid-template-columns:1fr 300px 360px;background:#101c2f;padding:16px 32px\">\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Decision<\/div>\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Decider<\/div>\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Consulted<\/div>\n      <\/div>\n      <div style=\"display:grid;grid-template-columns:1fr 300px 360px;padding:16px 32px;border-bottom:1px solid #f6f7f7;font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\"><div>Act on an L1 recommendation<\/div><div style=\"font-weight:700;color:#101c2f\">Analyst<\/div><div>Evidence links in the output<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:1fr 300px 360px;padding:16px 32px;border-bottom:1px solid #f6f7f7;font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\"><div>Approve an L2 proposed action<\/div><div style=\"font-weight:700;color:#101c2f\">Named approver (analyst+)<\/div><div>Change control where applicable<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:1fr 300px 360px;padding:16px 32px;border-bottom:1px solid #f6f7f7;font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\"><div>Step a workflow down a level<\/div><div style=\"font-weight:700;color:#101c2f\">Workflow owner<\/div><div>Audit owner; logged to board<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:1fr 300px 360px;padding:16px 32px;border-bottom:1px solid #f6f7f7;font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\"><div>Advance a workflow up a level<\/div><div style=\"font-weight:700;color:#101c2f\">Governance board<\/div><div>Workflow, policy, audit owners; evidence package<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:1fr 300px 360px;padding:16px 32px;border-bottom:1px solid #f6f7f7;font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\"><div>Change a policy set<\/div><div style=\"font-weight:700;color:#101c2f\">Policy owner via change control<\/div><div>Affected workflow owners<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:1fr 300px 360px;padding:16px 32px;border-bottom:1px solid #f6f7f7;font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\"><div>Freeze a capability on a finding<\/div><div style=\"font-weight:700;color:#101c2f\">Audit owner / CISO delegate<\/div><div>Workflow owner; sponsor notified<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:1fr 300px 360px;padding:16px 32px;border-bottom:1px solid #f6f7f7;font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\"><div>Enable a new AI capability<\/div><div style=\"font-weight:700;color:#101c2f\">Governance board (via CoE)<\/div><div>Security, privacy review; enters at \"evaluate\"<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:1fr 300px 360px;padding:16px 32px;font:300 17px/1.5 'Inter',sans-serif;color:#3f4d62\"><div>Suspend the program<\/div><div style=\"font-weight:700;color:#101c2f\">Executive sponsor<\/div><div>Board ratifies; restart requires Gate 0 re-review<\/div><\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · AI Operating Model, Confidential<\/span><span>8 / 10<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 09 MATURITY DESTINATION -->\n<section data-label=\"09 Steady State\">\n<div style=\"position:absolute;inset:0;background:#f6f7f7;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Steady State<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:44px\">What \"operationalized\" looks like, one year in<\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:26px;max-width:1700px;margin-bottom:34px\">\n      <div class=\"card\" style=\"padding:34px 32px\">\n        <div class=\"kl\">For the Operations Team<\/div>\n        <div class=\"kb\" style=\"font-size:17px\">Conversational investigation is the default motion. Specialists work on genuinely hard problems. The morning briefing arrives written. Nobody remembers building filters by hand, and nobody has stopped verifying evidence links.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:34px 32px\">\n        <div class=\"kl\">For Governance<\/div>\n        <div class=\"kb\" style=\"font-size:17px\">AI review is a standing agenda item with a familiar evidence package, not a special event. Findings stay at zero or get remediated within the quarter. The annual attestation takes a meeting, not a project.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:34px 32px\">\n        <div class=\"kl\">For the Enterprise<\/div>\n        <div class=\"kb\" style=\"font-size:17px\">MTTR, escalation, and SLA numbers hold at their improved levels. The CoE evaluates new capabilities on a managed path. Autonomy advances only where evidence is overwhelming, and the option to step back has never expired.<\/div>\n      <\/div>\n    <\/div>\n    <div style=\"background:#101c2f;border-radius:16px;padding:36px 44px;max-width:1700px;display:flex;align-items:center;gap:44px\">\n      <div style=\"flex:1.1\">\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0066FF;margin-bottom:12px\">The destination<\/div>\n        <div style=\"font:800 27px/1.3 'Inter','Inter',sans-serif;color:#fff\">AI as operational infrastructure, boring, measured, and trusted.<\/div>\n      <\/div>\n      <div style=\"flex:1;font:300 18px/1.6 'Inter',sans-serif;color:rgba(255,255,255,0.72)\">The operating model succeeds when AI stops being a program and becomes a property of how the Business Network is run, governed by the same calendar, owned by the same people, audited by the same standards.<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · AI Operating Model, Confidential<\/span><span>9 / 10<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 10 CLOSE -->\n<section data-label=\"10 Close\">\n<div style=\"position:absolute;inset:0;background:#101c2f;overflow:hidden\">\n  <div style=\"position:absolute;left:-280px;top:-280px;width:900px;height:900px;border-radius:50%;border:1px solid rgba(0,102,255,0.1)\"><\/div>\n  <img class=\"logo\" src=\"__LOGO_NEG__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;max-width:1450px;padding:0 96px\">\n    <div style=\"width:72px;height:5px;background:#0066FF;border-radius:3px;margin:0 auto 44px\"><\/div>\n    <div style=\"font:300 26px/1.55 'Inter',sans-serif;color:rgba(255,255,255,0.55);margin-bottom:20px\">The future of enterprise AI is not unconstrained autonomy.<\/div>\n    <div style=\"font:900 56px/1.1 'Inter','Inter',sans-serif;color:#fff;letter-spacing:-0.025em;margin-bottom:44px\">It is governed operational intelligence<br>operating within customer-defined boundaries.<\/div>\n    <div style=\"font:800 28px/1.4 'Inter','Inter',sans-serif;color:#0066FF\">Not just AI.<br>A governed reasoning layer for the modern enterprise business network.<\/div>\n  <\/div>\n  <div class=\"foot d\"><span>CONFIDENTIAL, OPERATIONS &amp; GOVERNANCE TEAMS<\/span><span>10 / 10<\/span><\/div>\n<\/div>\n<\/section>\n\n<\/deck-stage>\n<script>window.addEventListener(\"error\",function(e){if(e.message&&e.message.indexOf(\"ResizeObserver loop\")!==-1){e.stopImmediatePropagation();e.preventDefault();}},true);<\/script>\n__DECKSTAGE__\n<\/body>\n<\/html>\n","s3/Business-Network-AI-CoE":"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n__FONTS__\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Business Network AI Center of Excellence, OpenText Trading Grid with Aviator<\/title>\n__DOCCSS__\n<style>\n.pillar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:36px}\n.pillar>div{border:1px solid var(--ln);border-radius:14px;padding:26px 26px;box-shadow:0 8px 24px rgba(16,28,47,0.07)}\n.pillar .k{font:700 12px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:var(--bl);margin-bottom:10px}\n.pillar .t{font:800 19px/1.25 'Inter','Inter',sans-serif;color:var(--dk);margin-bottom:10px}\n.pillar .b{font:300 14.5px/1.65 'Inter',sans-serif;color:var(--sl)}\n<\/style>\n<\/head>
