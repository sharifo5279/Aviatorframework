t answer from generic internet knowledge. When it reports that 38 failed ASNs share a root cause, that conclusion is built from <strong>specific transaction records, envelope data, acknowledgment codes, and content signals<\/strong> you can inspect directly.<\/p>\n        <p>Root-cause analysis is multi-signal and evidence-linked: the response cites the data it correlated, and analysts can drill from any conclusion to the underlying transactions. Recommendations carry confidence indicators, and low-confidence cases are flagged rather than presented as certain.<\/p>\n      <\/div>\n    <\/div>\n\n    <div class=\"faq\" id=\"q7\">\n      <div class=\"faq-q\"><span class=\"qn\">07<\/span><span class=\"qt\">What data is retained, and for how long?<\/span><\/div>\n      <div class=\"faq-a\">\n        <div class=\"short\"><span class=\"sl\">Short answer<\/span><span class=\"st\">Retention follows your existing Trading Grid data agreements. AI adds audit logs, governed the same way.<\/span><\/div>\n        <p>AI capabilities do not change your underlying data retention terms. Transaction data continues to be retained per your Trading Grid agreement. AI-specific artifacts, interaction logs, audit records, are retained in line with your enterprise retention policy and are available for governance review.<\/p>\n        <p>Prompts and responses are <strong>not retained by the model provider for training<\/strong> (see questions 01 to 02). Residency and regional processing controls follow your existing Business Network data residency arrangements; specifics are documented in your data processing agreement.<\/p>\n      <\/div>\n    <\/div>\n\n    <div class=\"faq\" id=\"q8\">\n      <div class=\"faq-q\"><span class=\"qn\">08<\/span><span class=\"qt\">What are the autonomy levels?<\/span><\/div>\n      <div class=\"faq-a\">\n        <div class=\"short\"><span class=\"sl\">Short answer<\/span><span class=\"st\">Five graduated levels, from observe-only to bounded autonomy. You set the dial; you can turn it back.<\/span><\/div>\n        <table>\n          <thead><tr><th>Level<\/th><th>Posture<\/th><th>Example<\/th><\/tr><\/thead>\n          <tbody>\n            <tr><td>L0, Observe<\/td><td>Visibility and analysis only. No recommendations.<\/td><td>Conversational transaction search; payload explanation<\/td><\/tr>\n            <tr><td>L1, Recommend<\/td><td>Insights and recommendations with evidence. Humans decide.<\/td><td>Root-cause analysis with suggested fix<\/td><\/tr>\n            <tr><td>L2, Approve<\/td><td>AI proposes specific actions; each requires explicit human approval.<\/td><td>Proposed partner configuration update, approved by analyst<\/td><\/tr>\n            <tr><td>L3, Policy-automate<\/td><td>AI executes within customer-defined policy guardrails; exceptions escalate.<\/td><td>Automated transaction retry during a declared outage window<\/td><\/tr>\n            <tr><td>L4, Controlled autonomy<\/td><td>AI executes within pre-approved operational boundaries with override and rollback.<\/td><td>Continuous monitoring with bounded remediation<\/td><\/tr>\n          <\/tbody>\n        <\/table>\n        <p>Most customers begin at L0 to L1 and advance only as their governance review validates each level. Moving down a level is always available and immediate.<\/p>\n      <\/div>\n    <\/div>\n\n    <div class=\"faq\" id=\"q9\">\n      <div class=\"faq-q\"><span class=\"qn\">09<\/span><span class=\"qt\">What happens when the AI is uncertain?<\/span><\/div>\n      <div class=\"faq-a\">\n        <div class=\"short\"><span class=\"sl\">Short answer<\/span><span class=\"st\">It hands off to humans, with full context, instead of guessing.<\/span><\/div>\n        <p>Confidence-aware escalation is built into the platform. When Aviator's confidence in an answer or recommendation falls below threshold, the conversation is <strong>escalated to your support path with complete context preserved<\/strong>, the question asked, the data examined, and the analysis so far, so a human picks up exactly where the AI left off.<\/p>\n        <p>This is a deliberate design position: a wrong answer delivered confidently is the fastest way to destroy operational trust. The system is engineered to know what it doesn't know.<\/p>\n      <\/div>\n    <\/div>\n\n    <div class=\"faq\" id=\"q10\">\n      <div class=\"faq-q\"><span class=\"qn\">10<\/span><span class=\"qt\">How is this different from a chatbot?<\/span><\/div>\n      <div class=\"faq-a\">\n        <div class=\"short\"><span class=\"sl\">Short answer<\/span><span class=\"st\">A chatbot talks. Aviator reasons over your operational truth, under your governance.<\/span><\/div>\n        <p>Generic AI assistants answer from general knowledge. Aviator is an <strong>operational intelligence layer<\/strong> grounded in your Trading Grid transactions, your partner network, your integration telemetry, and your tenant's knowledge. It retrieves real records, correlates real signals, and produces conclusions you can verify against source data.<\/p>\n        <p>Equally important: it operates inside an enterprise governance frame, permission-aware access, tenant isolation, audit trails, configurable autonomy, and policy guardrails. That combination, operational grounding plus governance, is what makes it suitable for enterprise B2B operations where a conversational toy would not be.<\/p>\n      <\/div>\n    <\/div>\n\n  <\/div>\n\n  <div class=\"doc-footer\">\n    <div style=\"font:300 13px/1 'Inter',sans-serif;color:rgba(255,255,255,0.45)\">OpenText Business Network · Trading Grid with Aviator, Confidential<\/div>\n    <div style=\"font:300 13px/1 'Inter',sans-serif;color:rgba(255,255,255,0.35)\">Stage 1, Interest · Customer AI FAQ · 2026<\/div>\n  <\/div>\n\n<\/div>\n<\/body>\n<\/html>\n","s2/Enterprise-AI-Governance":"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n__FONTS__\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Enterprise AI Governance, OpenText Trading Grid with Aviator<\/title>\n<style>\n__COLORSCSS__\ndeck-stage:not(:defined){visibility:hidden}\n*{box-sizing:border-box;margin:0;padding:0}\nsection{font-family:'Inter','Helvetica Neue',sans-serif;overflow:hidden}\n.logo{position:absolute;top:52px;right:96px;height:44px;width:auto}\n.foot{position:absolute;bottom:44px;left:96px;right:96px;display:flex;justify-content:space-between;font:400 14px/1 'Inter',sans-serif;letter-spacing:0.04em;color:#3f4d62}\n.foot.d{color:rgba(255,255,255,0.35)}\n.foot span{white-space:nowrap}\n.ew{font:700 14px/1 'Inter',sans-serif;letter-spacing:0.14em;text-transform:uppercase;color:#0066FF;margin-bottom:16px}\n.ar{width:64px;height:5px;background:#0066FF;border-radius:3px;margin-bottom:28px}\n.h2{font:800 52px/1.06 'Inter','Inter',sans-serif;color:#101c2f;letter-spacing:-0.022em}\n.card{background:#fff;border:1px solid #e7eaef;border-radius:16px;box-shadow:0 10px 30px rgba(16,28,47,0.08),0 5px 10px rgba(16,28,47,0.04)}\n.kl{font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0066FF;margin-bottom:12px}\n.kt{font:800 21px/1.25 'Inter','Inter',sans-serif;color:#101c2f;margin-bottom:10px}\n.kb{font:300 17px/1.6 'Inter',sans-serif;color:#3f4d62}\n.kb strong{color:#101c2f;font-weight:700}\n<\/style>\n<\/head>\n<body style=\"margin:0;background:#1a1a2e\">\n<deck-stage width=\"1920\" height=\"1080\">\n\n<!-- 01 TITLE -->\n<section data-label=\"01 Title\">\n<div style=\"position:absolute;inset:0;background:#101c2f;overflow:hidden\">\n  <div style=\"position:absolute;left:50%;top:-400px;width:1100px;height:1100px;border-radius:50%;border:1px solid rgba(0,102,255,0.09)\"><\/div>\n  <img class=\"logo\" src=\"__LOGO_NEG__\" alt=\"opentext\">\n  <div style=\"position:absolute;left:96px;top:240px;max-width:1300px\">\n    <div style=\"width:72px;height:5px;background:#0066FF;border-radius:3px;margin-bottom:36px\"><\/div>\n    <div style=\"font:700 15px/1 'Inter',sans-serif;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.52);margin-bottom:28px\">OpenText Business Network · Trading Grid with Aviator · Stage 2, Decision<\/div>\n    <div style=\"font:900 76px/1.04 'Inter','Inter',sans-serif;color:#fff;letter-spacing:-0.03em;margin-bottom:40px\">Enterprise AI<br>Governance<\/div>\n    <div style=\"font:300 26px/1.55 'Inter',sans-serif;color:rgba(255,255,255,0.72);max-width:920px\">The governance model behind governed operational intelligence, how AI boundaries, explainability, auditability, and human oversight are engineered into the platform, not appended to it.<\/div>\n  <\/div>\n  <div class=\"foot d\"><span>CONFIDENTIAL, FOR LEGAL, SECURITY, PRIVACY &amp; GOVERNANCE REVIEW<\/span><span>2026<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 02 GOVERNANCE THESIS -->\n<section data-label=\"02 Governance Thesis\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">The Thesis<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:52px;max-width:1300px\">Governance is not a constraint on operational AI.<br>It is the mechanism that makes it adoptable.<\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:28px;max-width:1700px\">\n      <div class=\"card\" style=\"padding:40px 36px\">\n        <div style=\"font:900 52px/1 'Inter','Inter',sans-serif;color:#e7eaef;margin-bottom:20px\">01<\/div>\n        <div class=\"kt\">Ungoverned AI cannot pass enterprise review<\/div>\n        <div class=\"kb\">Legal, privacy, security, and architecture boards exist to stop unbounded risk. An AI capability that cannot demonstrate boundaries, evidence, and reversibility will, correctly, be rejected. Governance readiness is adoption readiness.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:40px 36px\">\n        <div style=\"font:900 52px/1 'Inter','Inter',sans-serif;color:#e7eaef;margin-bottom:20px\">02<\/div>\n        <div class=\"kt\">Governance must be architectural, not procedural<\/div>\n        <div class=\"kb\">Policies in a document are promises. Policies enforced at the platform layer, permission-aware retrieval, autonomy gates, policy validation before action, are controls. This deck describes controls.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:40px 36px\">\n        <div style=\"font:900 52px/1 'Inter','Inter',sans-serif;color:#e7eaef;margin-bottom:20px\">03<\/div>\n        <div class=\"kt\">Trust matures in stages, and the platform follows<\/div>\n        <div class=\"kb\">No enterprise should grant day-one automation authority to any system. The platform's graduated autonomy model is designed so governance maturity, not vendor enthusiasm, sets the pace.<\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Enterprise AI Governance, Confidential<\/span><span>2 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 03 GOVERNANCE MODEL OVERVIEW -->\n<section data-label=\"03 Governance Model\">\n<div style=\"position:absolute;inset:0;background:#f6f7f7;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">The Governance Model<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:48px\">Five layers of control, from data to decision<\/div>\n    <div style=\"display:flex;flex-direction:column;gap:14px;max-width:1700px\">\n      <div style=\"display:grid;grid-template-columns:300px 1fr 380px;gap:0;background:#fff;border:1px solid #e7eaef;border-radius:14px;overflow:hidden\">\n        <div style=\"background:#101c2f;padding:22px 30px\"><div style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0066FF;margin-bottom:6px\">Layer 1<\/div><div style=\"font:800 22px/1.15 'Inter','Inter',sans-serif;color:#fff\">Data Governance<\/div><\/div>\n        <div style=\"padding:22px 30px;font:300 18px/1.55 'Inter',sans-serif;color:#3f4d62\">What data AI can reason over: tenant isolation, permission-aware retrieval, metadata-only modes, masking, residency and regional controls.<\/div>\n        <div style=\"padding:22px 30px;border-left:1px solid #f6f7f7;font:400 16px/1.5 'Inter',sans-serif;color:#0033CF\">Owner: Customer data &amp; privacy teams, enforced by platform<\/div>\n      <\/div>\n      <div style=\"display:grid;grid-template-columns:300px 1fr 380px;gap:0;background:#fff;border:1px solid #e7eaef;border-radius:14px;overflow:hidden\">\n        <div style=\"background:#16243c;padding:22px 30px\"><div style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0066FF;margin-bottom:6px\">Layer 2<\/div><div style=\"font:800 22px/1.15 'Inter','Inter',sans-serif;color:#fff\">Access Governance<\/div><\/div>\n        <div style=\"padding:22px 30px;font:300 18px/1.55 'Inter',sans-serif;color:#3f4d62\">Who can use AI capabilities, and with what scope: role-based access, identity-aware retrieval, per-capability enablement, user-level audit identity.<\/div>\n        <div style=\"padding:22px 30px;border-left:1px solid #f6f7f7;font:400 16px/1.5 'Inter',sans-serif;color:#0033CF\">Owner: Customer IAM/security teams via existing identity model<\/div>\n      <\/div>\n      <div style=\"display:grid;grid-template-columns:300px 1fr 380px;gap:0;background:#fff;border:1px solid #e7eaef;border-radius:14px;overflow:hidden\">\n        <div style=\"background:#1f3050;padding:22px 30px\"><div style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0066FF;margin-bottom:6px\">Layer 3<\/div><div style=\"font:800 22px/1.15 'Inter','Inter',sans-serif;color:#fff\">Autonomy Governance<\/div><\/div>\n        <div style=\"padding:22px 30px;font:300 18px/1.55 'Inter',sans-serif;color:#3f4d62\">What AI may do: graduated autonomy levels (L0 to L4) set per workflow, human-in-the-loop gates, approval workflows, instant reversion to lower levels.<\/div>\n        <div style=\"padding:22px 30px;border-left:1px solid #f6f7f7;font:400 16px/1.5 'Inter',sans-serif;color:#0033CF\">Owner: Customer governance board, configured per workflow<\/div>\n      <\/div>\n      <div style=\"display:grid;grid-template-columns:300px 1fr 380px;gap:0;background:#fff;border:1px solid #e7eaef;border-radius:14px;overflow:hidden\">\n        <div style=\"background:#27406a;padding:22px 30px\"><div style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0066FF;margin-bottom:6px\">Layer 4<\/div><div style=\"font:800 22px/1.15 'Inter','Inter',sans-serif;color:#fff\">Policy Governance<\/div><\/div>\n        <div style=\"padding:22px 30px;font:300 18px/1.55 'Inter',sans-serif;color:#3f4d62\">The rules automated behavior must satisfy: transaction limits, partner restrictions, document constraints, escalation triggers, validated before any action executes.<\/div>\n        <div style=\"padding:22px 30px;border-left:1px solid #f6f7f7;font:400 16px/1.5 'Inter',sans-serif;color:#0033CF\">Owner: Customer-defined, versioned, auditable policy sets<\/div>\n      <\/div>\n      <div style=\"display:grid;grid-template-columns:300px 1fr 380px;gap:0;background:#fff;border:1px solid #e7eaef;border-radius:14px;overflow:hidden\">\n        <div style=\"background:#0066FF;padding:22px 30px\"><div style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.7);margin-bottom:6px\">Layer 5<\/div><div style=\"font:800 22px/1.15 'Inter','Inter',sans-serif;color:#fff\">Oversight Governance<\/div><\/div>\n        <div style=\"padding:22px 30px;font:300 18px/1.55 'Inter',sans-serif;color:#3f4d62\">How the enterprise watches the watcher: immutable audit trails, explainability of every output, periodic governance reviews, KPI and drift monitoring.<\/div>\n        <div style=\"padding:22px 30px;border-left:1px solid #f6f7f7;font:400 16px/1.5 'Inter',sans-serif;color:#0033CF\">Owner: Joint, customer audit/governance + OpenText reporting<\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Enterprise AI Governance, Confidential<\/span><span>3 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 04 EXPLAINABILITY -->\n<section data-label=\"04 Explainability\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Explainability<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:24px;max-width:1200px\">Every output carries its evidence<\/div>\n    <div style=\"font:300 22px/1.55 'Inter',sans-serif;color:#3f4d62;max-width:1300px;margin-bottom:44px\">We distinguish honestly between two kinds of explainability, and commit to the one that matters for governance.<\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;max-width:1700px\">\n      <div class=\"card\" style=\"padding:40px 36px;background:#f6f7f7;box-shadow:none\">\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#8a5c00;margin-bottom:16px\">What no vendor can offer<\/div>\n        <div class=\"kt\" style=\"font-size:24px\">Model-internal explainability<\/div>\n        <div class=\"kb\" style=\"font-size:18px\">Foundation models are probabilistic systems; their internal weights are not human-interpretable. Any vendor claiming to fully explain <em>why the model chose each word<\/em> is overstating. We do not claim this, and we encourage you to challenge vendors who do.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:40px 36px;border-color:#0066FF;border-width:2px\">\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0066FF;margin-bottom:16px\">What this platform delivers<\/div>\n        <div class=\"kt\" style=\"font-size:24px\">System-behavior explainability<\/div>\n        <div class=\"kb\" style=\"font-size:18px\">Every conclusion is traceable end to end: <strong>which transactions were retrieved, which signals were correlated, what reasoning was applied, what confidence was assigned, and what evidence supports the answer.<\/strong> Analysts drill from any conclusion to source records. Governance teams reconstruct any interaction from the audit trail.<\/div>\n      <\/div>\n    <\/div>\n    <div style=\"margin-top:36px;display:flex;gap:0;max-width:1700px;border:1px solid #e7eaef;border-radius:14px;overflow:hidden\">\n      <div style=\"flex:1;padding:24px 30px;border-right:1px solid #e7eaef\"><div style=\"font:700 14px/1 'Inter',sans-serif;color:#101c2f;margin-bottom:8px\">Evidence-linked answers<\/div><div style=\"font:300 16px/1.55 'Inter',sans-serif;color:#3f4d62\">Conclusions cite the specific records they rest on<\/div><\/div>\n      <div style=\"flex:1;padding:24px 30px;border-right:1px solid #e7eaef\"><div style=\"font:700 14px/1 'Inter',sans-serif;color:#101c2f;margin-bottom:8px\">Confidence scoring<\/div><div style=\"font:300 16px/1.55 'Inter',sans-serif;color:#3f4d62\">Uncertainty is surfaced, not hidden behind fluent prose<\/div><\/div>\n      <div style=\"flex:1;padding:24px 30px;border-right:1px solid #e7eaef\"><div style=\"font:700 14px/1 'Inter',sans-serif;color:#101c2f;margin-bottom:8px\">Human handoff<\/div><div style=\"font:300 16px/1.55 'Inter',sans-serif;color:#3f4d62\">Low-confidence cases escalate with full context<\/div><\/div>\n      <div style=\"flex:1;padding:24px 30px\"><div style=\"font:700 14px/1 'Inter',sans-serif;color:#101c2f;margin-bottom:8px\">Reconstructable history<\/div><div style=\"font:300 16px/1.55 'Inter',sans-serif;color:#3f4d62\">Any past interaction can be replayed from audit logs<\/div><\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Enterprise AI Governance, Confidential<\/span><span>4 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 05 AUDITABILITY -->\n<section data-label=\"05 Auditability\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Auditability<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:48px;max-width:1200px\">The audit trail covers the full AI lifecycle<\/div>\n    <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:0;max-width:1728px;position:relative\">\n      <div style=\"position:absolute;top:33px;left:10%;right:10%;height:2px;background:#e7eaef\"><\/div>\n      <div style=\"text-align:center;position:relative\">\n        <div style=\"width:66px;height:66px;border-radius:50%;background:#0066FF;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font:900 22px/1 'Inter','Inter',sans-serif;color:#fff;position:relative;z-index:1\">1<\/div>\n        <div style=\"font:800 19px/1.2 'Inter','Inter',sans-serif;color:#101c2f;margin-bottom:10px\">Request<\/div>\n        <div style=\"font:300 16px/1.55 'Inter',sans-serif;color:#3f4d62;padding:0 18px\">Who asked, what they asked, when, from which surface and role<\/div>\n      <\/div>\n      <div style=\"text-align:center;position:relative\">\n        <div style=\"width:66px;height:66px;border-radius:50%;background:#101c2f;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font:900 22px/1 'Inter','Inter',sans-serif;color:#fff;position:relative;z-index:1\">2<\/div>\n        <div style=\"font:800 19px/1.2 'Inter','Inter',sans-serif;color:#101c2f;margin-bottom:10px\">Retrieval<\/div>\n        <div style=\"font:300 16px/1.55 'Inter',sans-serif;color:#3f4d62;padding:0 18px\">What data was accessed, under which permissions, within which tenant scope<\/div>\n      <\/div>\n      <div style=\"text-align:center;position:relative\">\n        <div style=\"width:66px;height:66px;border-radius:50%;background:#101c2f;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font:900 22px/1 'Inter','Inter',sans-serif;color:#fff;position:relative;z-index:1\">3<\/div>\n        <div style=\"font:800 19px/1.2 'Inter','Inter',sans-serif;color:#101c2f;margin-bottom:10px\">Inference<\/div>\n        <div style=\"font:300 16px/1.55 'Inter',sans-serif;color:#3f4d62;padding:0 18px\">Which model processed the request, with what context and filters applied<\/div>\n      <\/div>\n      <div style=\"text-align:center;position:relative\">\n        <div style=\"width:66px;height:66px;border-radius:50%;background:#101c2f;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font:900 22px/1 'Inter','Inter',sans-serif;color:#fff;position:relative;z-index:1\">4<\/div>\n        <div style=\"font:800 19px/1.2 'Inter','Inter',sans-serif;color:#101c2f;margin-bottom:10px\">Response<\/div>\n        <div style=\"font:300 16px/1.55 'Inter',sans-serif;color:#3f4d62;padding:0 18px\">What was answered, with what evidence links and confidence level<\/div>\n      <\/div>\n      <div style=\"text-align:center;position:relative\">\n        <div style=\"width:66px;height:66px;border-radius:50%;background:#0066FF;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font:900 22px/1 'Inter','Inter',sans-serif;color:#fff;position:relative;z-index:1\">5<\/div>\n        <div style=\"font:800 19px/1.2 'Inter','Inter',sans-serif;color:#101c2f;margin-bottom:10px\">Action<\/div>\n        <div style=\"font:300 16px/1.55 'Inter',sans-serif;color:#3f4d62;padding:0 18px\">What was recommended, approved, rejected, executed, and by whom<\/div>\n      <\/div>\n    <\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;margin-top:52px;max-width:1700px\">\n      <div style=\"padding:24px 28px;background:#f6f7f7;border-radius:12px\"><div style=\"font:700 16px/1.3 'Inter',sans-serif;color:#101c2f;margin-bottom:8px\">Governed retention<\/div><div style=\"font:300 16px/1.55 'Inter',sans-serif;color:#3f4d62\">Audit records retained per your enterprise policy and available for compliance review<\/div><\/div>\n      <div style=\"padding:24px 28px;background:#f6f7f7;border-radius:12px\"><div style=\"font:700 16px/1.3 'Inter',sans-serif;color:#101c2f;margin-bottom:8px\">Query-able by your teams<\/div><div style=\"font:300 16px/1.55 'Inter',sans-serif;color:#3f4d62\">Reconstruction after the fact is a lookup, not a vendor support ticket<\/div><\/div>\n      <div style=\"padding:24px 28px;background:#f6f7f7;border-radius:12px\"><div style=\"font:700 16px/1.3 'Inter',sans-serif;color:#101c2f;margin-bottom:8px\">Supports regulatory response<\/div><div style=\"font:300 16px/1.55 'Inter',sans-serif;color:#3f4d62\">Decision traceability designed for SOX, GDPR, and sector audit expectations<\/div><\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Enterprise AI Governance, Confidential<\/span><span>5 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 06 HUMAN IN THE LOOP -->\n<section data-label=\"06 Human-in-the-Loop\">\n<div style=\"position:absolute;inset:0;background:#f6f7f7;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Human-in-the-Loop<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:48px;max-width:1300px\">Humans hold the decision rights, <br>by design, at every maturity level<\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:28px;max-width:1700px\">\n      <div class=\"card\" style=\"padding:36px 32px\">\n        <div class=\"kl\">Decision Gates<\/div>\n        <div class=\"kt\">Approval before action<\/div>\n        <div class=\"kb\">At L2, every AI-proposed action requires explicit, named human approval before execution. Approvals and rejections are logged with the approver's identity, accountability stays with people, not software.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:36px 32px\">\n        <div class=\"kl\">Confidence-Aware Escalation<\/div>\n        <div class=\"kt\">Handoff, not guesswork<\/div>\n        <div class=\"kb\">When the AI's confidence falls below threshold, the case escalates to your support path with the full conversation and analysis context preserved. The system is engineered to know what it doesn't know.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:36px 32px\">\n        <div class=\"kl\">Exception Routing<\/div>\n        <div class=\"kt\">Policy violations stop the line<\/div>\n        <div class=\"kb\">At L3+, actions that fall outside policy boundaries are not executed and not silently dropped, they escalate to human review with the reason for rejection attached.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:36px 32px\">\n        <div class=\"kl\">Override Authority<\/div>\n        <div class=\"kt\">Humans can always intervene<\/div>\n        <div class=\"kb\">Operators can pause, override, or roll back any automated workflow at any time. Override does not require OpenText involvement, the control is in the customer's hands.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:36px 32px\">\n        <div class=\"kl\">Reversibility<\/div>\n        <div class=\"kt\">Autonomy is a dial, not a door<\/div>\n        <div class=\"kb\">Any workflow can be reverted to a lower autonomy level immediately, without service disruption or contractual change. Trust extended can be trust withdrawn.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:36px 32px\">\n        <div class=\"kl\">Accountable Ownership<\/div>\n        <div class=\"kt\">Named owners for every workflow<\/div>\n        <div class=\"kb\">Each AI-assisted workflow has a designated customer owner responsible for its autonomy level, policy set, and review cadence, mirroring your existing change-control accountability.<\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Enterprise AI Governance, Confidential<\/span><span>6 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 07 AI BOUNDARIES -->\n<section data-label=\"07 AI Boundaries\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">AI Boundaries<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:48px\">What the AI is permitted to do, and what it is not<\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;max-width:1700px\">\n      <div>\n        <div style=\"font:700 14px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#156615;padding:16px 24px;background:#d9efd9;border-radius:12px 12px 0 0\">Within boundaries<\/div>\n        <div style=\"border:1px solid #e7eaef;border-top:0;border-radius:0 0 12px 12px;background:#fff\">\n          <div style=\"padding:17px 24px;border-bottom:1px solid #f6f7f7;font:300 19px/1.5 'Inter',sans-serif;color:#3f4d62\">Retrieve and analyze data the requesting user is authorized to see<\/div>\n          <div style=\"padding:17px 24px;border-bottom:1px solid #f6f7f7;font:300 19px/1.5 'Inter',sans-serif;color:#3f4d62\">Explain payloads, errors, and operational events with cited evidence<\/div>\n          <div style=\"padding:17px 24px;border-bottom:1px solid #f6f7f7;font:300 19px/1.5 'Inter',sans-serif;color:#3f4d62\">Recommend actions with confidence levels and supporting records<\/div>\n          <div style=\"padding:17px 24px;border-bottom:1px solid #f6f7f7;font:300 19px/1.5 'Inter',sans-serif;color:#3f4d62\">Execute pre-approved actions within policy guardrails (L3+, if enabled)<\/div>\n          <div style=\"padding:17px 24px;font:300 19px/1.5 'Inter',sans-serif;color:#3f4d62\">Escalate to humans when confidence is low or policy is unclear<\/div>\n        <\/div>\n      <\/div>\n      <div>\n        <div style=\"font:700 14px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#b11206;padding:16px 24px;background:#f6d7d4;border-radius:12px 12px 0 0\">Outside boundaries, always<\/div>\n        <div style=\"border:1px solid #e7eaef;border-top:0;border-radius:0 0 12px 12px;background:#fff\">\n          <div style=\"padding:17px 24px;border-bottom:1px solid #f6f7f7;font:300 19px/1.5 'Inter',sans-serif;color:#3f4d62\">Access data beyond the user's permissions or the tenant's scope<\/div>\n          <div style=\"padding:17px 24px;border-bottom:1px solid #f6f7f7;font:300 19px/1.5 'Inter',sans-serif;color:#3f4d62\">Take actions above the configured autonomy level for that workflow<\/div>\n          <div style=\"padding:17px 24px;border-bottom:1px solid #f6f7f7;font:300 19px/1.5 'Inter',sans-serif;color:#3f4d62\">Execute actions that fail policy validation, these escalate instead<\/div>\n          <div style=\"padding:17px 24px;border-bottom:1px solid #f6f7f7;font:300 19px/1.5 'Inter',sans-serif;color:#3f4d62\">Communicate externally with trading partners on its own initiative<\/div>\n          <div style=\"padding:17px 24px;font:300 19px/1.5 'Inter',sans-serif;color:#3f4d62\">Modify its own permissions, policies, or autonomy configuration<\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n    <div style=\"margin-top:36px;padding:22px 30px;background:#f0f4ff;border-radius:12px;border-left:4px solid #0066FF;max-width:1700px\">\n      <div style=\"font:300 19px/1.6 'Inter',sans-serif;color:#3f4d62\">The right column is invariant. It does not change with autonomy level, subscription tier, or future roadmap. <strong style=\"color:#101c2f;font-weight:700\">Boundaries that move with sales pressure are not boundaries.<\/strong><\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Enterprise AI Governance, Confidential<\/span><span>7 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 08 GRADUATED AUTONOMY -->\n<section data-label=\"08 Graduated Autonomy\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Graduated Autonomy<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:44px\">Five levels. Customer-set. Per workflow. Reversible.<\/div>\n    <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:20px;max-width:1728px\">\n      <div style=\"border:1px solid #e7eaef;border-radius:14px;overflow:hidden;background:#fff\">\n        <div style=\"background:#0033CF;padding:20px 22px\"><div style=\"font:900 30px/1 'Inter','Inter',sans-serif;color:#fff;margin-bottom:6px\">L0<\/div><div style=\"font:700 16px/1.2 'Inter',sans-serif;color:rgba(255,255,255,0.85)\">Observe<\/div><\/div>\n        <div style=\"padding:20px 22px\"><div style=\"font:300 16px/1.6 'Inter',sans-serif;color:#3f4d62;margin-bottom:14px\">Visibility and analysis only. Search, explain, summarize.<\/div><div style=\"font:700 13px/1.4 'Inter',sans-serif;color:#0033CF;text-transform:uppercase;letter-spacing:0.06em\">Risk: none, read-only<\/div><\/div>\n      <\/div>\n      <div style=\"border:1px solid #e7eaef;border-radius:14px;overflow:hidden;background:#fff\">\n        <div style=\"background:#0066FF;padding:20px 22px\"><div style=\"font:900 30px/1 'Inter','Inter',sans-serif;color:#fff;margin-bottom:6px\">L1<\/div><div style=\"font:700 16px/1.2 'Inter',sans-serif;color:rgba(255,255,255,0.85)\">Recommend<\/div><\/div>\n        <div style=\"padding:20px 22px\"><div style=\"font:300 16px/1.6 'Inter',sans-serif;color:#3f4d62;margin-bottom:14px\">Evidence-linked recommendations. Humans decide everything.<\/div><div style=\"font:700 13px/1.4 'Inter',sans-serif;color:#0066FF;text-transform:uppercase;letter-spacing:0.06em\">Risk: advisory only<\/div><\/div>\n      <\/div>\n      <div style=\"border:1px solid #e7eaef;border-radius:14px;overflow:hidden;background:#fff\">\n        <div style=\"background:#3a7d44;padding:20px 22px\"><div style=\"font:900 30px/1 'Inter','Inter',sans-serif;color:#fff;margin-bottom:6px\">L2<\/div><div style=\"font:700 16px/1.2 'Inter',sans-serif;color:rgba(255,255,255,0.85)\">Approve<\/div><\/div>\n        <div style=\"padding:20px 22px\"><div style=\"font:300 16px/1.6 'Inter',sans-serif;color:#3f4d62;margin-bottom:14px\">AI proposes specific actions; each needs named human approval.<\/div><div style=\"font:700 13px/1.4 'Inter',sans-serif;color:#3a7d44;text-transform:uppercase;letter-spacing:0.06em\">Risk: gated per action<\/div><\/div>\n      <\/div>\n      <div style=\"border:1px solid #e7eaef;border-radius:14px;overflow:hidden;background:#fff\">\n        <div style=\"background:#8a5c00;padding:20px 22px\"><div style=\"font:900 30px/1 'Inter','Inter',sans-serif;color:#fff;margin-bottom:6px\">L3<\/div><div style=\"font:700 16px/1.2 'Inter',sans-serif;color:rgba(255,255,255,0.85)\">Policy-Automate<\/div><\/div>\n        <div style=\"padding:20px 22px\"><div style=\"font:300 16px/1.6 'Inter',sans-serif;color:#3f4d62;margin-bottom:14px\">Executes within policy guardrails; exceptions escalate to humans.<\/div><div style=\"font:700 13px/1.4 'Inter',sans-serif;color:#8a5c00;text-transform:uppercase;letter-spacing:0.06em\">Risk: policy-bounded<\/div><\/div>\n      <\/div>\n      <div style=\"border:1px solid #e7eaef;border-radius:14px;overflow:hidden;background:#fff\">\n        <div style=\"background:#b11206;padding:20px 22px\"><div style=\"font:900 30px/1 'Inter','Inter',sans-serif;color:#fff;margin-bottom:6px\">L4<\/div><div style=\"font:700 16px/1.2 'Inter',sans-serif;color:rgba(255,255,255,0.85)\">Controlled Autonomy<\/div><\/div>\n        <div style=\"padding:20px 22px\"><div style=\"font:300 16px/1.6 'Inter',sans-serif;color:#3f4d62;margin-bottom:14px\">Autonomous within pre-approved boundaries; override and rollback retained.<\/div><div style=\"font:700 13px/1.4 'Inter',sans-serif;color:#b11206;text-transform:uppercase;letter-spacing:0.06em\">Risk: bounded, audited<\/div><\/div>\n      <\/div>\n    <\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:36px;max-width:1700px\">\n      <div style=\"padding:24px 30px;background:#f6f7f7;border-radius:12px\"><div style=\"font:700 17px/1.3 'Inter',sans-serif;color:#101c2f;margin-bottom:8px\">Levels are per-workflow, not global<\/div><div style=\"font:300 17px/1.55 'Inter',sans-serif;color:#3f4d62\">Transaction search can run at L0 while outage recovery runs at L3. Each workflow advances on its own evidence and its own governance review.<\/div><\/div>\n      <div style=\"padding:24px 30px;background:#f6f7f7;border-radius:12px\"><div style=\"font:700 17px/1.3 'Inter',sans-serif;color:#101c2f;margin-bottom:8px\">Advancement requires a governance gate<\/div><div style=\"font:300 17px/1.55 'Inter',sans-serif;color:#3f4d62\">Moving any workflow up a level is a customer decision with defined criteria: accuracy evidence, audit review, and named-owner signoff. The full model is detailed in the Autonomy Maturity Model document.<\/div><\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Enterprise AI Governance, Confidential<\/span><span>8 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 09 ROLLBACK -->\n<section data-label=\"09 Rollback & Reversibility\">\n<div style=\"position:absolute;inset:0;background:#f6f7f7;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Rollback &amp; Reversibility<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:48px;max-width:1300px\">Every step forward has a step back<\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:28px;max-width:1700px;margin-bottom:36px\">\n      <div class=\"card\" style=\"padding:36px 32px\">\n        <div class=\"kl\">Capability Rollback<\/div>\n        <div class=\"kt\">Turn any capability off<\/div>\n        <div class=\"kb\">Each AI capability can be disabled per role, per team, or tenant-wide, immediately, by customer administrators, without a support ticket or contract change.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:36px 32px\">\n        <div class=\"kl\">Autonomy Rollback<\/div>\n        <div class=\"kt\">Step down any workflow<\/div>\n        <div class=\"kb\">Any workflow at L2 to L4 can be reverted to a lower level instantly. In-flight automated actions complete or cancel according to your configured safe-stop behavior.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:36px 32px\">\n        <div class=\"kl\">Action Rollback<\/div>\n        <div class=\"kt\">Undo what was done<\/div>\n        <div class=\"kb\">Automated actions are designed reversible-first: queued retries can be cancelled, configuration changes carry prior-state snapshots, and the audit trail documents both the action and its reversal.<\/div>\n      <\/div>\n    <\/div>\n    <div style=\"background:#101c2f;border-radius:16px;padding:40px 48px;max-width:1700px;display:flex;align-items:center;gap:48px\">\n      <div style=\"flex:1\">\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0066FF;margin-bottom:14px\">Why this matters to governance boards<\/div>\n        <div style=\"font:800 28px/1.3 'Inter','Inter',sans-serif;color:#fff\">Reversibility converts an adoption decision from a one-way door into a controlled experiment.<\/div>\n      <\/div>\n      <div style=\"flex:1;font:300 19px/1.65 'Inter',sans-serif;color:rgba(255,255,255,0.72)\">Boards approve pilots they can stop. The rollout framework in Stage 3 is built on this property: every phase defines its rollback procedure before it begins, so approval is never a bet on perfection.<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Enterprise AI Governance, Confidential<\/span><span>9 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 10 GOVERNANCE LIFECYCLE -->\n<section data-label=\"10 Governance Lifecycle\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Governance Lifecycle<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:48px\">Governance is a cycle, not a checkpoint<\/div>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:24px;max-width:1728px;margin-bottom:40px\">\n      <div style=\"border:1px solid #e7eaef;border-radius:14px;padding:32px 28px;background:#fff;position:relative\">\n        <div style=\"position:absolute;top:-14px;left:28px;background:#0066FF;border-radius:999px;padding:6px 16px;font:700 12px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#fff\">Quarterly<\/div>\n        <div class=\"kt\" style=\"margin-top:8px\">Review<\/div>\n        <div class=\"kb\">Governance board reviews AI accuracy metrics, audit samples, escalation patterns, and incident reports for each active workflow.<\/div>\n      <\/div>\n      <div style=\"border:1px solid #e7eaef;border-radius:14px;padding:32px 28px;background:#fff;position:relative\">\n        <div style=\"position:absolute;top:-14px;left:28px;background:#101c2f;border-radius:999px;padding:6px 16px;font:700 12px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#fff\">As needed<\/div>\n        <div class=\"kt\" style=\"margin-top:8px\">Adjust<\/div>\n        <div class=\"kb\">Policies are versioned and updated: thresholds tuned, boundaries tightened or expanded, autonomy levels advanced or reverted based on evidence.<\/div>\n      <\/div>\n      <div style=\"border:1px solid #e7eaef;border-radius:14px;padding:32px 28px;background:#fff;position:relative\">\n        <div style=\"position:absolute;top:-14px;left:28px;background:#101c2f;border-radius:999px;padding:6px 16px;font:700 12px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#fff\">Continuous<\/div>\n        <div class=\"kt\" style=\"margin-top:8px\">Monitor<\/div>\n        <div class=\"kb\">KPI tracking against baselines, drift monitoring on recommendation quality, and alerting on policy-exception rates that trend upward.<\/div>\n      <\/div>\n      <div style=\"border:1px solid #e7eaef;border-radius:14px;padding:32px 28px;background:#fff;position:relative\">\n        <div style=\"position:absolute;top:-14px;left:28px;background:#101c2f;border-radius:999px;padding:6px 16px;font:700 12px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#fff\">Annual<\/div>\n        <div class=\"kt\" style=\"margin-top:8px\">Attest<\/div>\n        <div class=\"kb\">Formal governance attestation: control effectiveness review, DPA and policy currency check, and re-approval of standing autonomy levels.<\/div>\n      <\/div>\n    <\/div>\n    <div style=\"padding:22px 30px;background:#f0f4ff;border-radius:12px;border-left:4px solid #0066FF;max-width:1700px\">\n      <div style=\"font:300 19px/1.6 'Inter',sans-serif;color:#3f4d62\">OpenText provides the reporting surface for this cycle, audit extracts, accuracy metrics, exception summaries, so your governance board reviews evidence, not vendor assurances. The full operating cadence is defined in the Stage 3 Operationalization Framework.<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Enterprise AI Governance, Confidential<\/span><span>10 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 11 STAKEHOLDER MAP -->\n<section data-label=\"11 Stakeholder Decision Map\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Stakeholder Decision Map<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:44px\">What each review function owns in the decision<\/div>\n    <div style=\"border:1px solid #e7eaef;border-radius:16px;overflow:hidden;max-width:1728px\">\n      <div style=\"display:grid;grid-template-columns:240px 1fr 1fr;background:#101c2f;padding:16px 32px\">\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Function<\/div>\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Key questions they own<\/div>\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Supporting artifact in this framework<\/div>\n      <\/div>\n      <div style=\"display:grid;grid-template-columns:240px 1fr 1fr;padding:18px 32px;border-bottom:1px solid #f6f7f7\"><div style=\"font:700 18px/1.3 'Inter',sans-serif;color:#101c2f\">Legal &amp; Privacy<\/div><div style=\"font:300 17px/1.55 'Inter',sans-serif;color:#3f4d62\">Data ownership, training prohibition, retention, residency, DPA coverage<\/div><div style=\"font:400 17px/1.55 'Inter',sans-serif;color:#0033CF\">Legal &amp; Privacy Brief<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:240px 1fr 1fr;padding:18px 32px;border-bottom:1px solid #f6f7f7\"><div style=\"font:700 18px/1.3 'Inter',sans-serif;color:#101c2f\">Security / CISO<\/div><div style=\"font:300 17px/1.55 'Inter',sans-serif;color:#3f4d62\">Isolation, identity-aware retrieval, encryption, prompt and inference governance<\/div><div style=\"font:400 17px/1.55 'Inter',sans-serif;color:#0033CF\">Security Architecture Overview<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:240px 1fr 1fr;padding:18px 32px;border-bottom:1px solid #f6f7f7\"><div style=\"font:700 18px/1.3 'Inter',sans-serif;color:#101c2f\">Enterprise Architecture<\/div><div style=\"font:300 17px/1.55 'Inter',sans-serif;color:#3f4d62\">Integration model, layering on existing systems, standards, portability<\/div><div style=\"font:400 17px/1.55 'Inter',sans-serif;color:#0033CF\">Vendor Trust Overview · this deck, slide 3<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:240px 1fr 1fr;padding:18px 32px;border-bottom:1px solid #f6f7f7\"><div style=\"font:700 18px/1.3 'Inter',sans-serif;color:#101c2f\">Procurement<\/div><div style=\"font:300 17px/1.55 'Inter',sans-serif;color:#3f4d62\">Lock-in exposure, exit terms, model abstraction, commercial controls<\/div><div style=\"font:400 17px/1.55 'Inter',sans-serif;color:#0033CF\">Vendor Trust Overview<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:240px 1fr 1fr;padding:18px 32px;border-bottom:1px solid #f6f7f7\"><div style=\"font:700 18px/1.3 'Inter',sans-serif;color:#101c2f\">Governance Board<\/div><div style=\"font:300 17px/1.55 'Inter',sans-serif;color:#3f4d62\">Autonomy framework, oversight cadence, rollback, accountability model<\/div><div style=\"font:400 17px/1.55 'Inter',sans-serif;color:#0033CF\">Autonomy Maturity Model · Risk Matrix<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:240px 1fr 1fr;padding:18px 32px\"><div style=\"font:700 18px/1.3 'Inter',sans-serif;color:#101c2f\">Operations<\/div><div style=\"font:300 17px/1.55 'Inter',sans-serif;color:#3f4d62\">Workflow fit, rollout sequencing, KPI baselines, operational readiness<\/div><div style=\"font:400 17px/1.55 'Inter',sans-serif;color:#0033CF\">Stage 3, Execution package<\/div><\/div>\n    <\/div>\n    <div style=\"margin-top:28px;font:300 18px/1.5 'Inter',sans-serif;color:#3f4d62;max-width:1700px\">A structured governance workshop covering all six functions is available, see the AI Governance Workshop Guide in this stage.<\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Enterprise AI Governance, Confidential<\/span><span>11 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 12 CLOSE -->\n<section data-label=\"12 Close\">\n<div style=\"position:absolute;inset:0;background:#101c2f;overflow:hidden\">\n  <div style=\"position:absolute;right:-280px;top:-280px;width:900px;height:900px;border-radius:50%;border:1px solid rgba(0,102,255,0.1)\"><\/div>\n  <img class=\"logo\" src=\"__LOGO_NEG__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;max-width:1450px;padding:0 96px\">\n    <div style=\"width:72px;height:5px;background:#0066FF;border-radius:3px;margin:0 auto 44px\"><\/div>\n    <div style=\"font:900 58px/1.12 'Inter','Inter',sans-serif;color:#fff;letter-spacing:-0.025em;margin-bottom:36px\">Approve the controls,<br>and the AI takes care of itself.<\/div>\n    <div style=\"font:300 24px/1.6 'Inter',sans-serif;color:rgba(255,255,255,0.68);max-width:1100px;margin:0 auto 56px\">This governance model asks your board to approve something it already knows how to evaluate: data boundaries, access control, change gates, audit trails, and reversibility. The AI operates inside that envelope, or it doesn't operate.<\/div>\n    <div style=\"font:800 26px/1.4 'Inter','Inter',sans-serif;color:#0066FF\">Governed operational intelligence, within customer-defined boundaries.<\/div>\n  <\/div>\n  <div class=\"foot d\"><span>CONFIDENTIAL, FOR LEGAL, SECURITY, PRIVACY &amp; GOVERNANCE REVIEW<\/span><span>12 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<\/deck-stage>\n<script>window.addEventListener(\"error\",function(e){if(e.message&&e.message.indexOf(\"ResizeObserver loop\")!==-1){e.stopImmediatePropagation();e.preventDefault();}},true);<\/script>\n__DECKSTAGE__\n<\/body>\n<\/html>\n","s2/Legal-Privacy-Brief":"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n__FONTS__\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Legal &amp; Privacy Brief, OpenText Trading Grid with Aviator<\/title>\n__DOCCSS__\n<style>\n.sec{border:1px solid var(--ln);border-radius:14px;margin-bottom:22px;overflow:hidden;break-inside:avoid}\n.sec-h{display:flex;align-items:center;gap:18px;padding:20px 30px;background:var(--lt);border-bottom:1px solid var(--ln)}\n.sec-h .n{font:900 17px/1 'Inter','Inter',sans-serif;color:var(--bl);flex-shrink:0}\n.sec-h .t{font:800 21px/1.25 'Inter','Inter',sans-serif;color:var(--dk);letter-spacing:-0.01em}\n.sec-b{padding:24px 30px}\n.sec-b p{margin-bottom:12px}\n.sec-b p:last-child{margin-bottom:0}\n.pos{display:flex;gap:12px;align-items:flex-start;padding:13px 18px;background:#e8efff;border-radius:10px;margin-bottom:16px}\n.pos .k{font:700 11px/1.65 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0033CF;flex-shrink:0;padding-top:1px}\n.pos .v{font:400 15px/1.6 'Inter',sans-serif;color:var(--dk)}\n<\/style>\n<\/head>\n<body>\n<div class=\"page\">\n\n  <div class=\"doc-header\">\n    <div>\n      <div class=\"kicker\">OpenText Business Network · Trading Grid with Aviator<\/div>\n      <h1>Legal &amp; Privacy Brief<\/h1>\n      <div class=\"sub\">Data handling, model usage, and privacy posture of AI capabilities, for legal, privacy, and compliance review.<\/div>\n    <\/div>\n    <div style=\"flex-shrink:0\">\n      <img src=\"__LOGO_NEG__\" alt=\"opentext\">\n      <div style=\"display:flex;gap:8px;justify-content:flex-end\">\n        <span class=\"tag tag-b\">Stage 2, Decision<\/span>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"doc-body\">\n\n    <p class=\"lead\">This brief states the legal and privacy positions governing AI capabilities in Trading Grid with Aviator, in the order legal and privacy teams typically evaluate them. Each section ends with the position your team can record. Contractual specifics are governed by your master agreement and data processing agreement (DPA); this brief is a navigational summary, not a contract substitute.<\/p>\n\n    <div class=\"section-label\">Positions<\/div>\n    <div class=\"ar\"><\/div>\n\n    <div class=\"sec\">\n      <div class=\"sec-h\"><span class=\"n\">§1<\/span><span class=\"t\">Data ownership<\/span><\/div>\n      <div class=\"sec-b\">\n        <p>Customer transactional data, EDI payloads, document content, partner records, operational telemetry, remains the customer's property. The introduction of AI capabilities does not alter ownership, grant OpenText derivative rights, or create vendor claims over insights generated from customer data. AI outputs derived from your data (summaries, analyses, recommendations) are produced for your use within your tenant.<\/p>\n        <div class=\"pos\"><span class=\"k\">Position<\/span><span class=\"v\">AI capabilities introduce no change to data ownership terms. Customer data and AI outputs derived from it belong to the customer.<\/span><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"sec\">\n      <div class=\"sec-h\"><span class=\"n\">§2<\/span><span class=\"t\">No public model training<\/span><\/div>\n      <div class=\"sec-b\">\n        <p>Customer data is not used to train, fine-tune, or otherwise improve any AI model, neither OpenText-managed models nor third-party foundation models. Language reasoning is provided by Gemini models on Google Cloud under enterprise terms that contractually prohibit the use of customer content for model training. Data submitted for inference is processed to generate a response and is not absorbed into model weights or retained by the model provider for training purposes.<\/p>\n        <p>This prohibition covers transaction content, payloads, prompts, AI responses, partner configurations, and operational metadata within the customer tenant.<\/p>\n        <div class=\"pos\"><span class=\"k\">Position<\/span><span class=\"v\">Inference-only use. No customer data trains any model, OpenText or third-party. Verifiable in DPA and Google Cloud enterprise terms.<\/span><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"sec\">\n      <div class=\"sec-h\"><span class=\"n\">§3<\/span><span class=\"t\">Retention<\/span><\/div>\n      <div class=\"sec-b\">\n        <p>AI capabilities operate within the customer's existing Trading Grid retention framework. Transactional data retention is unchanged. AI-specific artifacts, interaction logs, audit records, generated summaries, are retained according to the customer's configured enterprise retention policy and are deletable on the same terms as other customer data. Prompts and responses are not retained by the model provider beyond transient processing.<\/p>\n        <div class=\"pos\"><span class=\"k\">Position<\/span><span class=\"v\">No new retention regime. AI artifacts follow the customer's existing retention and deletion rights.<\/span><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"sec\">\n      <div class=\"sec-h\"><span class=\"n\">§4<\/span><span class=\"t\">Residency and regional controls<\/span><\/div>\n      <div class=\"sec-b\">\n        <p>Data residency commitments under the customer's Business Network agreement continue to apply. AI processing is performed within the agreed processing scope and regions; regional inference options support customers with strict locality requirements. Cross-border transfer protections in the existing DPA (including SCCs where applicable) extend to AI processing.<\/p>\n        <div class=\"pos\"><span class=\"k\">Position<\/span><span class=\"v\">AI processing respects existing residency commitments; regional controls available where required. Confirm specifics per region in the DPA.<\/span><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"sec\">\n      <div class=\"sec-h\"><span class=\"n\">§5<\/span><span class=\"t\">Masking and minimization<\/span><\/div>\n      <div class=\"sec-b\">\n        <p>Data minimization is configurable. Field-level masking can exclude designated sensitive fields (pricing, identifiers, regulated data elements) from AI context. Where masking is configured, masked values are not visible to the model or in AI outputs. Minimization settings are customer-administered and auditable.<\/p>\n        <div class=\"pos\"><span class=\"k\">Position<\/span><span class=\"v\">Customer-configurable masking limits what data is exposed to AI reasoning, supporting data-minimization obligations.<\/span><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"sec\">\n      <div class=\"sec-h\"><span class=\"n\">§6<\/span><span class=\"t\">Metadata-only AI modes<\/span><\/div>\n      <div class=\"sec-b\">\n        <p>For document flows where content must not be processed by AI, regulated payloads, competitively sensitive documents, metadata-only mode restricts AI reasoning to envelope and transaction metadata (status, timestamps, partner, document type, error codes) without accessing document content. This preserves operational intelligence value (search, monitoring, anomaly detection) for flows where content access is not permitted.<\/p>\n        <div class=\"pos\"><span class=\"k\">Position<\/span><span class=\"v\">Content-excluded AI operation is available per flow, enabling adoption in regulated document categories.<\/span><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"sec\">\n      <div class=\"sec-h\"><span class=\"n\">§7<\/span><span class=\"t\">Tenant isolation and access<\/span><\/div>\n      <div class=\"sec-b\">\n        <p>AI retrieval, knowledge stores, and session context are tenant-isolated at the infrastructure layer. Customer-specific knowledge (runbooks, SOPs) is served only within the customer's tenant. AI retrieval is permission-aware: it operates within the requesting user's existing authorization, so AI cannot become a privilege-escalation path.<\/p>\n        <div class=\"pos\"><span class=\"k\">Position<\/span><span class=\"v\">No cross-tenant data access; AI inherits and enforces the customer's existing access-control model.<\/span><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"sec\">\n      <div class=\"sec-h\"><span class=\"n\">§8<\/span><span class=\"t\">DPA considerations<\/span><\/div>\n      <div class=\"sec-b\">\n        <p>For most customers, AI capabilities are addressed through the existing OpenText DPA framework, with Google Cloud operating as a documented subprocessor for inference. Review points your privacy team will want to confirm:<\/p>\n        <ul class=\"fl\">\n          <li>Subprocessor listing and notification terms covering the model provider<\/li>\n          <li>Processing purposes limited to service delivery (inference), excluding training<\/li>\n          <li>Regional processing commitments matching your residency requirements<\/li>\n          <li>Audit and records-access provisions covering AI interaction logs<\/li>\n          <li>Deletion and return-of-data terms extending to AI artifacts<\/li>\n        <\/ul>\n        <div class=\"pos\"><span class=\"k\">Position<\/span><span class=\"v\">AI fits the existing DPA structure; a focused review of the five points above is the recommended legal workstream.<\/span><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"divider\"><\/div>\n\n    <h2 style=\"margin-top:0\">Suggested review sequence for legal &amp; privacy teams<\/h2>\n    <table>\n      <thead><tr><th style=\"width:90px\">Step<\/th><th>Activity<\/th><th style=\"width:300px\">Supporting material<\/th><\/tr><\/thead>\n      <tbody>\n        <tr><td>1<\/td><td>Confirm training prohibition and subprocessor terms in DPA and Google Cloud enterprise terms<\/td><td>DPA · §2 above<\/td><\/tr>\n        <tr><td>2<\/td><td>Map regulated document flows; designate masking and metadata-only requirements<\/td><td>§5, §6 · your data classification<\/td><\/tr>\n        <tr><td>3<\/td><td>Validate residency and transfer mechanisms for each operating region<\/td><td>§4 · DPA annexes<\/td><\/tr>\n        <tr><td>4<\/td><td>Review audit log access and retention alignment with records policy<\/td><td>§3 · Security Architecture Overview<\/td><\/tr>\n        <tr><td>5<\/td><td>Record approved AI usage scope and autonomy ceiling for governance board<\/td><td>Autonomy Maturity Model · Risk Matrix<\/td><\/tr>\n      <\/tbody>\n    <\/table>\n\n    <div class=\"dark-block\">\n      <div class=\"db-k\">Summary for Counsel<\/div>\n      <div class=\"db-t\">AI capabilities operate inside the existing contractual envelope, not around it.<\/div>\n      <div class=\"db-b\">Ownership unchanged. Training prohibited. Retention, residency, and deletion rights preserved. Minimization configurable. Isolation architectural. The legal review is an extension of frameworks already in place for Trading Grid, not a new category of risk.<\/div>\n    <\/div>\n\n  <\/div>\n\n  <div class=\"doc-footer\">\n    <div>OpenText Business Network · Trading Grid with Aviator, Confidential<\/div>\n    <div>Stage 2, Decision · Legal &amp; Privacy Brief · 2026<\/div>\n  <\/div>\n\n<\/div>\n<\/body>\n<\/html>\n","s2/Security-Architecture-Overview":"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n__FONTS__\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Security Architecture Overview, OpenText Trading Grid with Aviator<\/title>\n<style>\n__COLORSCSS__\ndeck-stage:not(:defined){visibility:hidden}\n*{box-sizing:border-box;margin:0;padding:0}\nsection{font-family:'Inter','Helvetica Neue',sans-serif;overflow:hidden}\n.logo{position:absolute;top:52px;right:96px;height:44px;width:auto}\n.foot{position:absolute;bottom:44px;left:96px;right:96px;display:flex;justify-content:space-between;font:400 14px/1 'Inter',sans-serif;letter-spacing:0.04em;color:#3f4d62}\n.foot.d{color:rgba(255,255,255,0.35)}\n.foot span{white-space:nowrap}\n.ew{font:700 14px/1 'Inter',sans-serif;letter-spacing:0.14em;text-transform:uppercase;color:#0066FF;margin-bottom:16px}\n.ar{width:64px;height:5px;background:#0066FF;border-radius:3px;margin-bottom:28px}\n.h2{font:800 52px/1.06 'Inter','Inter',sans-serif;color:#101c2f;letter-spacing:-0.022em}\n.card{background:#fff;border:1px solid #e7eaef;border-radius:16px;box-shadow:0 10px 30px rgba(16,28,47,0.08),0 5px 10px rgba(16,28,47,0.04)}\n.kl{font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0066FF;margin-bottom:12px}\n.kt{font:800 21px/1.25 'Inter','Inter',sans-serif;color:#101c2f;margin-bottom:10px}\n.kb{font:300 17px/1.6 'Inter',sans-serif;color:#3f4d62}\n.kb strong{color:#101c2f;font-weight:700}\n.flow-node{border-radius:12px;padding:18px 22px;text-align:center}\n.flow-arrow{display:flex;align-items:center;justify-content:center;font:700 24px/1 'Inter',sans-serif;color:#0066FF}\n<\/style>\n<\/head>\n<body style=\"margin:0;background:#1a1a2e\">\n<deck-stage width=\"1920\" height=\"1080\">\n\n<!-- 01 TITLE -->\n<section data-label=\"01 Title\">\n<div style=\"position:absolute;inset:0;background:#101c2f;overflow:hidden\">\n  <div style=\"position:absolute;left:-260px;top:-260px;width:920px;height:920px;border-radius:50%;border:1px solid rgba(0,102,255,0.09)\"><\/div>\n  <img class=\"logo\" src=\"__LOGO_NEG__\" alt=\"opentext\">\n  <div style=\"position:absolute;left:96px;top:240px;max-width:1350px\">\n    <div style=\"width:72px;height:5px;background:#0066FF;border-radius:3px;margin-bottom:36px\"><\/div>\n    <div style=\"font:700 15px/1 'Inter',sans-serif;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.52);margin-bottom:28px\">OpenText Business Network · Trading Grid with Aviator · Stage 2, Decision<\/div>\n    <div style=\"font:900 76px/1.04 'Inter','Inter',sans-serif;color:#fff;letter-spacing:-0.03em;margin-bottom:40px\">Security Architecture<br>Overview<\/div>\n    <div style=\"font:300 26px/1.55 'Inter',sans-serif;color:rgba(255,255,255,0.72);max-width:940px\">How AI capabilities are secured at every layer, identity, retrieval, inference, orchestration, and audit, for CISO and security architecture review.<\/div>\n  <\/div>\n  <div class=\"foot d\"><span>CONFIDENTIAL, FOR SECURITY &amp; ARCHITECTURE REVIEW<\/span><span>2026<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 02 SECURITY MODEL AT A GLANCE -->\n<section data-label=\"02 Security Model\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">The Security Model<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:24px;max-width:1300px\">AI inherits the security model.<br>It does not get its own, weaker one.<\/div>\n    <div style=\"font:300 22px/1.55 'Inter',sans-serif;color:#3f4d62;max-width:1350px;margin-bottom:44px\">The design principle throughout: every AI request is subject to the same identity, authorization, encryption, and audit controls as any other Trading Grid operation, plus AI-specific governance on top.<\/div>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:24px;max-width:1728px\">\n      <div class=\"card\" style=\"padding:32px 28px\">\n        <div class=\"kl\">Identity<\/div>\n        <div class=\"kt\">Every request is a user's request<\/div>\n        <div class=\"kb\">No anonymous AI access. Every query, retrieval, and action executes under a named identity from your existing identity model.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:32px 28px\">\n        <div class=\"kl\">Authorization<\/div>\n        <div class=\"kt\">RBAC-aware retrieval<\/div>\n        <div class=\"kb\">AI surfaces only what the requesting user is already entitled to see. AI is not a privilege-escalation path.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:32px 28px\">\n        <div class=\"kl\">Isolation<\/div>\n        <div class=\"kt\">Tenant-scoped everything<\/div>\n        <div class=\"kb\">Retrieval indexes, knowledge stores, session context, isolated per tenant at the infrastructure layer.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:32px 28px\">\n        <div class=\"kl\">Accountability<\/div>\n        <div class=\"kt\">Full-lifecycle audit<\/div>\n        <div class=\"kb\">Request, retrieval, inference, response, and action, each step logged with identity, timestamp, and data scope.<\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Security Architecture, Confidential<\/span><span>2 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 03 REQUEST LIFECYCLE -->\n<section data-label=\"03 Request Lifecycle\">\n<div style=\"position:absolute;inset:0;background:#f6f7f7;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Request Lifecycle<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:48px\">The path of a single AI request, and its control points<\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 60px 1fr 60px 1fr 60px 1fr 60px 1fr;align-items:stretch;max-width:1728px;margin-bottom:40px\">\n      <div class=\"flow-node\" style=\"background:#101c2f\"><div style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#0066FF;margin-bottom:10px\">Step 1<\/div><div style=\"font:800 19px/1.2 'Inter','Inter',sans-serif;color:#fff;margin-bottom:8px\">User Query<\/div><div style=\"font:300 14px/1.5 'Inter',sans-serif;color:rgba(255,255,255,0.65)\">Authenticated session · named identity · role context attached<\/div><\/div>\n      <div class=\"flow-arrow\">→<\/div>\n      <div class=\"flow-node\" style=\"background:#fff;border:1px solid #e7eaef\"><div style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#0066FF;margin-bottom:10px\">Step 2<\/div><div style=\"font:800 19px/1.2 'Inter','Inter',sans-serif;color:#101c2f;margin-bottom:8px\">Prompt Filtering<\/div><div style=\"font:300 14px/1.5 'Inter',sans-serif;color:#3f4d62\">Injection screening · scope validation · policy pre-check<\/div><\/div>\n      <div class=\"flow-arrow\">→<\/div>\n      <div class=\"flow-node\" style=\"background:#fff;border:1px solid #e7eaef\"><div style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#0066FF;margin-bottom:10px\">Step 3<\/div><div style=\"font:800 19px/1.2 'Inter','Inter',sans-serif;color:#101c2f;margin-bottom:8px\">Governed Retrieval<\/div><div style=\"font:300 14px/1.5 'Inter',sans-serif;color:#3f4d62\">RBAC-filtered · tenant-scoped · masking applied · metadata-only where configured<\/div><\/div>\n      <div class=\"flow-arrow\">→<\/div>\n      <div class=\"flow-node\" style=\"background:#fff;border:1px solid #e7eaef\"><div style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#0066FF;margin-bottom:10px\">Step 4<\/div><div style=\"font:800 19px/1.2 'Inter','Inter',sans-serif;color:#101c2f;margin-bottom:8px\">Governed Inference<\/div><div style=\"font:300 14px/1.5 'Inter',sans-serif;color:#3f4d62\">Enterprise model endpoint · no training use · transient processing<\/div><\/div>\n      <div class=\"flow-arrow\">→<\/div>\n      <div class=\"flow-node\" style=\"background:#0066FF\"><div style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.7);margin-bottom:10px\">Step 5<\/div><div style=\"font:800 19px/1.2 'Inter','Inter',sans-serif;color:#fff;margin-bottom:8px\">Governed Response<\/div><div style=\"font:300 14px/1.5 'Inter',sans-serif;color:rgba(255,255,255,0.78)\">Evidence links · confidence score · output policy check · audit write<\/div><\/div>\n    <\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:1728px\">\n      <div style=\"padding:24px 30px;background:#fff;border:1px solid #e7eaef;border-radius:12px\"><div style=\"font:700 17px/1.3 'Inter',sans-serif;color:#101c2f;margin-bottom:8px\">Every arrow is encrypted<\/div><div style=\"font:300 17px/1.55 'Inter',sans-serif;color:#3f4d62\">TLS in transit between all components; customer data encrypted at rest in Trading Grid stores and tenant-scoped retrieval indexes.<\/div><\/div>\n      <div style=\"padding:24px 30px;background:#fff;border:1px solid #e7eaef;border-radius:12px\"><div style=\"font:700 17px/1.3 'Inter',sans-serif;color:#101c2f;margin-bottom:8px\">Every step is logged<\/div><div style=\"font:300 17px/1.55 'Inter',sans-serif;color:#3f4d62\">The audit record for one request spans all five steps, reconstructable end-to-end by your security team, without OpenText assistance.<\/div><\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Security Architecture, Confidential<\/span><span>3 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 04 RBAC RETRIEVAL -->\n<section data-label=\"04 Identity-Aware Retrieval\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Identity-Aware Retrieval<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:24px;max-width:1300px\">The AI sees exactly what the user sees, nothing more<\/div>\n    <div style=\"font:300 22px/1.55 'Inter',sans-serif;color:#3f4d62;max-width:1350px;margin-bottom:48px\">Retrieval is filtered by the requesting user's permissions <em>before<\/em> any data reaches the model. Authorization happens at retrieval time, not response time.<\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;max-width:1700px\">\n      <div class=\"card\" style=\"padding:36px 36px\">\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#156615;margin-bottom:20px\">Scenario A, Authorized analyst<\/div>\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n          <div style=\"background:#f0f4ff;border-radius:12px 12px 12px 2px;padding:14px 18px;font:300 18px/1.5 'Inter',sans-serif;color:#101c2f;max-width:90%\">\"Show me invoice errors for the retail division\"<\/div>\n          <div style=\"background:#101c2f;border-radius:12px 12px 2px 12px;padding:14px 18px;font:300 16px/1.55 'Inter',sans-serif;color:rgba(255,255,255,0.9);align-self:flex-end;max-width:92%\">Returns retail-division invoice errors, the data this analyst's role is entitled to query through any other interface.<\/div>\n        <\/div>\n        <div style=\"margin-top:20px;padding:14px 18px;background:#d9efd9;border-radius:8px;font:400 15px/1.5 'Inter',sans-serif;color:#156615\">Retrieval scope = user's RBAC scope. Same answer authority as their dashboard access.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:36px 36px\">\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#b11206;margin-bottom:20px\">Scenario B, Out-of-scope request<\/div>\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n          <div style=\"background:#f0f4ff;border-radius:12px 12px 12px 2px;padding:14px 18px;font:300 18px/1.5 'Inter',sans-serif;color:#101c2f;max-width:90%\">\"Show me pricing terms for the healthcare division\"<\/div>\n          <div style=\"background:#101c2f;border-radius:12px 12px 2px 12px;padding:14px 18px;font:300 16px/1.55 'Inter',sans-serif;color:rgba(255,255,255,0.9);align-self:flex-end;max-width:92%\">No healthcare-division data is retrieved. The model never receives it, there is nothing to leak, summarize, or be tricked into revealing.<\/div>\n        <\/div>\n        <div style=\"margin-top:20px;padding:14px 18px;background:#f6d7d4;border-radius:8px;font:400 15px/1.5 'Inter',sans-serif;color:#b11206\">Denial happens at retrieval, before inference. Prompt cleverness cannot bypass authorization.<\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Security Architecture, Confidential<\/span><span>4 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 05 VECTOR & KNOWLEDGE ISOLATION -->\n<section data-label=\"05 Vector Isolation\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Vector &amp; Knowledge Isolation<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:48px;max-width:1300px\">Retrieval infrastructure is tenant-partitioned by construction<\/div>\n    <div style=\"display:grid;grid-template-columns:1.1fr 1fr;gap:48px;max-width:1728px;align-items:start\">\n      <div style=\"background:#f6f7f7;border-radius:16px;padding:40px\">\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px\">\n          <div style=\"background:#fff;border:2px solid #0066FF;border-radius:12px;padding:24px\">\n            <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#0066FF;margin-bottom:14px\">Tenant A<\/div>\n            <div style=\"display:flex;flex-direction:column;gap:8px\">\n              <div style=\"padding:10px 14px;background:#f0f4ff;border-radius:8px;font:400 14px/1.4 'Inter',sans-serif;color:#101c2f\">Retrieval index A<\/div>\n              <div style=\"padding:10px 14px;background:#f0f4ff;border-radius:8px;font:400 14px/1.4 'Inter',sans-serif;color:#101c2f\">Runbooks &amp; SOPs A<\/div>\n              <div style=\"padding:10px 14px;background:#f0f4ff;border-radius:8px;font:400 14px/1.4 'Inter',sans-serif;color:#101c2f\">Session context A<\/div>\n              <div style=\"padding:10px 14px;background:#f0f4ff;border-radius:8px;font:400 14px/1.4 'Inter',sans-serif;color:#101c2f\">Audit log A<\/div>\n            <\/div>\n          <\/div>\n          <div style=\"background:#fff;border:2px solid #3f4d62;border-radius:12px;padding:24px\">\n            <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#3f4d62;margin-bottom:14px\">Tenant B<\/div>\n            <div style=\"display:flex;flex-direction:column;gap:8px\">\n              <div style=\"padding:10px 14px;background:#f6f7f7;border-radius:8px;font:400 14px/1.4 'Inter',sans-serif;color:#101c2f\">Retrieval index B<\/div>\n              <div style=\"padding:10px 14px;background:#f6f7f7;border-radius:8px;font:400 14px/1.4 'Inter',sans-serif;color:#101c2f\">Runbooks &amp; SOPs B<\/div>\n              <div style=\"padding:10px 14px;background:#f6f7f7;border-radius:8px;font:400 14px/1.4 'Inter',sans-serif;color:#101c2f\">Session context B<\/div>\n              <div style=\"padding:10px 14px;background:#f6f7f7;border-radius:8px;font:400 14px/1.4 'Inter',sans-serif;color:#101c2f\">Audit log B<\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n        <div style=\"margin-top:20px;text-align:center;font:700 14px/1.5 'Inter',sans-serif;color:#b11206;letter-spacing:0.04em\">NO SHARED INDEXES · NO CROSS-TENANT QUERIES · NO SHARED AI MEMORY<\/div>\n      <\/div>\n      <div style=\"display:flex;flex-direction:column;gap:18px\">\n        <div style=\"padding:24px 28px;border:1px solid #e7eaef;border-radius:12px\"><div style=\"font:700 17px/1.3 'Inter',sans-serif;color:#101c2f;margin-bottom:8px\">Per-tenant retrieval indexes<\/div><div style=\"font:300 16px/1.6 'Inter',sans-serif;color:#3f4d62\">Embeddings and search indexes are built and stored per tenant. A retrieval query physically cannot address another tenant's index.<\/div><\/div>\n        <div style=\"padding:24px 28px;border:1px solid #e7eaef;border-radius:12px\"><div style=\"font:700 17px/1.3 'Inter',sans-serif;color:#101c2f;margin-bottom:8px\">Tenant-scoped knowledge agents<\/div><div style=\"font:300 16px/1.6 'Inter',sans-serif;color:#3f4d62\">Customer runbooks and SOPs are served exclusively within the owning tenant, institutional knowledge never becomes shared model context.<\/div><\/div>\n        <div style=\"padding:24px 28px;border:1px solid #e7eaef;border-radius:12px\"><div style=\"font:700 17px/1.3 'Inter',sans-serif;color:#101c2f;margin-bottom:8px\">No cross-session learning<\/div><div style=\"font:300 16px/1.6 'Inter',sans-serif;color:#3f4d62\">The model does not retain or learn from session content. Tenant A's questions cannot influence Tenant B's answers, there is no shared state to leak through.<\/div><\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Security Architecture, Confidential<\/span><span>5 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 06 PROMPT & INFERENCE GOVERNANCE -->\n<section data-label=\"06 Prompt & Inference Governance\">\n<div style=\"position:absolute;inset:0;background:#f6f7f7;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Prompt &amp; Inference Governance<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:48px\">Controls on what goes into the model, and what comes o
