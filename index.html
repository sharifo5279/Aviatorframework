\n<body>\n<div class=\"page\">\n\n  <div class=\"doc-header\">\n    <div>\n      <div class=\"kicker\">OpenText Business Network · Trading Grid with Aviator<\/div>\n      <h1>Business Network AI Center of Excellence<\/h1>\n      <div class=\"sub\">The long-term governance and maturity framework, how AI oversight becomes a durable organizational capability.<\/div>\n    <\/div>\n    <div style=\"flex-shrink:0\">\n      <img src=\"__LOGO_NEG__\" alt=\"opentext\">\n      <div style=\"display:flex;gap:8px;justify-content:flex-end\">\n        <span class=\"tag tag-b\">Stage 3, Execution<\/span>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"doc-body\">\n\n    <p class=\"lead\">The rollout framework gets AI safely into production. The Center of Excellence keeps it governed for the years after, as capabilities expand, models evolve, regulations shift, and the people who approved the original deployment move on. <strong>The CoE is how institutional memory outlives individual tenure.<\/strong><\/p>\n\n    <div class=\"section-label\">Charter<\/div>\n    <div class=\"ar\"><\/div>\n    <h2 style=\"margin-top:0\">What the CoE owns<\/h2>\n    <div class=\"pillar\">\n      <div><div class=\"k\">Govern<\/div><div class=\"t\">Standing oversight<\/div><div class=\"b\">Runs the governance lifecycle, quarterly reviews, annual attestations, gate decisions for new capabilities and autonomy advancements. Maintains the ownership register and the policy library.<\/div><\/div>\n      <div><div class=\"k\">Mature<\/div><div class=\"t\">Capability progression<\/div><div class=\"b\">Owns the roadmap from current deployment to future capabilities: which workflows advance levels, which new agents enter evaluation, and what evidence each step requires.<\/div><\/div>\n      <div><div class=\"k\">Steward<\/div><div class=\"t\">Knowledge &amp; practice<\/div><div class=\"b\">Curates what the organization learns: tuning playbooks, accuracy findings, incident lessons, training materials. Onboards new analysts and new governance members into the operating model.<\/div><\/div>\n    <\/div>\n\n    <h2>Composition, small core, broad reach<\/h2>\n    <table>\n      <thead><tr><th style=\"width:240px\">Seat<\/th><th>Responsibility in the CoE<\/th><th style=\"width:160px\">Commitment<\/th><\/tr><\/thead>\n      <tbody>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">CoE lead (operations)<\/td><td>Chairs the CoE; owns the capability roadmap and the weekly operating rhythm<\/td><td>Part-time, standing<\/td><\/tr>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">Governance/risk delegate<\/td><td>Connects CoE decisions to the enterprise governance board; runs gate reviews<\/td><td>Quarterly + gates<\/td><\/tr>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">Security delegate<\/td><td>Owns the AI threat-model currency and SIEM/audit integration health<\/td><td>Quarterly + changes<\/td><\/tr>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">Privacy delegate<\/td><td>Owns DPA currency, classification updates, and regulatory watch<\/td><td>Quarterly + changes<\/td><\/tr>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">Workflow owners<\/td><td>Bring per-workflow evidence; execute level changes and rollbacks<\/td><td>Per workflow<\/td><\/tr>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">OpenText partner seat<\/td><td>Roadmap visibility, evidence packages, configuration support, advisory, non-voting<\/td><td>Quarterly<\/td><\/tr>\n      <\/tbody>\n    <\/table>\n    <div class=\"callout\"><p><strong>Deliberately not a new department.<\/strong> The CoE is a standing coordination body of existing roles, typically under two FTE of aggregate effort once steady-state is reached.<\/p><\/div>\n\n    <div class=\"divider\"><\/div>\n\n    <div class=\"section-label\">Programs<\/div>\n    <div class=\"ar\"><\/div>\n\n    <h2 style=\"margin-top:0\">1 · AI lifecycle management<\/h2>\n    <p>Every AI capability moves through a managed lifecycle: <strong>evaluate → pilot → production → mature → retire or advance.<\/strong> The CoE keeps a capability register recording each capability's stage, autonomy level, owner, policy set version, and last review date. New Aviator capabilities released by OpenText enter at \"evaluate\", never directly into production, and follow the same gate discipline as the original rollout.<\/p>\n\n    <h2>2 · Policy evolution<\/h2>\n    <ul class=\"fl\">\n      <li><strong>Versioned policy library:<\/strong> every policy set (caps, lists, windows, escalation triggers) is versioned with its approval record and effective dates.<\/li>\n      <li><strong>Change discipline:<\/strong> policy changes follow the same review path as autonomy changes, proposed with rationale, reviewed by the affected owners, approved at the right level, logged.<\/li>\n      <li><strong>Annual currency review:<\/strong> policies are re-validated against current operations yearly; stale policies are the leading indicator of governance decay.<\/li>\n    <\/ul>\n\n    <h2>3 · Audit program<\/h2>\n    <ul class=\"fl\">\n      <li><strong>Continuing cadence:<\/strong> monthly accuracy sampling, quarterly governance review, annual attestation, inherited from the rollout and owned permanently by the CoE.<\/li>\n      <li><strong>Drift watch:<\/strong> recommendation acceptance and exception-rate trends reviewed for slow degradation that single periods won't show.<\/li>\n      <li><strong>Independence:<\/strong> the audit owner reports findings to the governance board, not to the workflow owners being audited.<\/li>\n    <\/ul>\n\n    <h2>4 · Continuous improvement<\/h2>\n    <ul class=\"fl\">\n      <li><strong>Quarterly improvement review:<\/strong> what the AI gets wrong most, what users ask that it can't answer, where masking or scope rules block legitimate value, each becomes a tuning action, a configuration change, or an OpenText product request.<\/li>\n      <li><strong>Win library:<\/strong> documented cases where AI-assisted operations prevented incidents or recovered hours, the raw material for expansion decisions and budget renewals.<\/li>\n      <li><strong>Capability requests upstream:<\/strong> the CoE consolidates product feedback to OpenText with operational evidence attached.<\/li>\n    <\/ul>\n\n    <h2>5 · Operational maturity model<\/h2>\n    <p>The CoE assesses the organization annually against five maturity dimensions, the same dimensions scored in the Stage 2 governance workshop, now tracked longitudinally:<\/p>\n    <table>\n      <thead><tr><th>Dimension<\/th><th>Steady-state standard<\/th><\/tr><\/thead>\n      <tbody>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">Governance structure<\/td><td>CoE charter active; decisions logged; no orphaned workflows<\/td><\/tr>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">Data classification<\/td><td>Classification current; masking/metadata rules reviewed with each new flow<\/td><\/tr>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">Operational baselines<\/td><td>KPIs computed from telemetry; baselines re-frozen after major operational changes<\/td><\/tr>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">Audit practice<\/td><td>Sampling on schedule; findings at zero or remediated within the quarter<\/td><\/tr>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">Change control<\/td><td>All autonomy and policy changes gated; rollback drills passing annually<\/td><\/tr>\n      <\/tbody>\n    <\/table>\n\n    <div class=\"dark-block\">\n      <div class=\"db-k\">The Long View<\/div>\n      <div class=\"db-t\">Governance that matures is governance that lasts.<\/div>\n      <div class=\"db-b\">The future of enterprise AI is not unconstrained autonomy. It is governed operational intelligence operating within customer-defined boundaries, and the CoE is the institution that keeps those boundaries meaningful, year after year.<\/div>\n    <\/div>\n\n  <\/div>\n\n  <div class=\"doc-footer\">\n    <div>OpenText Business Network · Trading Grid with Aviator, Confidential<\/div>\n    <div>Stage 3, Execution · Business Network AI CoE · 2026<\/div>\n  <\/div>\n\n<\/div>\n<\/body>\n<\/html>\n","int/Understanding-Customer-AI-Concerns":"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n__FONTS__\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Understanding Customer AI Concerns, OpenText Trading Grid with Aviator<\/title>\n<style>\n__COLORSCSS__\ndeck-stage:not(:defined){visibility:hidden}\n*{box-sizing:border-box;margin:0;padding:0}\nsection{font-family:'Inter','Helvetica Neue',sans-serif;overflow:hidden}\n.logo{position:absolute;top:52px;right:96px;height:44px;width:auto}\n.foot{position:absolute;bottom:44px;left:96px;right:96px;display:flex;justify-content:space-between;font:400 14px/1 'Inter',sans-serif;letter-spacing:0.04em;color:#3f4d62}\n.foot.d{color:rgba(255,255,255,0.35)}\n.foot span{white-space:nowrap}\n.ew{font:700 14px/1 'Inter',sans-serif;letter-spacing:0.14em;text-transform:uppercase;color:#0066FF;margin-bottom:16px}\n.ar{width:64px;height:5px;background:#0066FF;border-radius:3px;margin-bottom:28px}\n.card{background:#fff;border:1px solid #e7eaef;border-radius:16px;box-shadow:0 10px 30px rgba(16,28,47,0.08),0 5px 10px rgba(16,28,47,0.04)}\n.quote{font:800 50px/1.12 'Inter','Inter',sans-serif;color:#101c2f;letter-spacing:-0.022em}\n.col-h{font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px}\n.col-b{font:300 19px/1.62 'Inter',sans-serif;color:#3f4d62}\n.col-b strong{color:#101c2f;font-weight:700}\n.concern-grid{display:grid;grid-template-columns:1fr 1fr 1.2fr;gap:28px}\n.ccard{border-radius:14px;padding:32px 30px}\n<\/style>\n<\/head>\n<body style=\"margin:0;background:#1a1a2e\">\n<deck-stage width=\"1920\" height=\"1080\">\n\n<!-- 01 TITLE -->\n<section data-label=\"01 Title\">\n<div style=\"position:absolute;inset:0;background:#101c2f;overflow:hidden\">\n  <div style=\"position:absolute;left:-200px;bottom:-300px;width:840px;height:840px;border-radius:50%;border:1px solid rgba(0,102,255,0.1)\"><\/div>\n  <img class=\"logo\" src=\"__LOGO_NEG__\" alt=\"opentext\">\n  <div style=\"position:absolute;left:96px;top:250px;max-width:1300px\">\n    <div style=\"width:72px;height:5px;background:#0066FF;border-radius:3px;margin-bottom:36px\"><\/div>\n    <div style=\"font:700 15px/1 'Inter',sans-serif;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.52);margin-bottom:28px\">OpenText Business Network · Trading Grid with Aviator<\/div>\n    <div style=\"font:900 76px/1.04 'Inter','Inter',sans-serif;color:#fff;letter-spacing:-0.03em;margin-bottom:40px\">Understanding Customer<br>AI Concerns<\/div>\n    <div style=\"font:300 26px/1.55 'Inter',sans-serif;color:rgba(255,255,255,0.72);max-width:900px\">Seven objections we hear in every enterprise AI conversation, what's really behind each one, and how OpenText answers with substance instead of reassurance.<\/div>\n  <\/div>\n  <div class=\"foot d\"><span>CONFIDENTIAL, OPENTEXT BUSINESS NETWORK<\/span><span>2026<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 02 FRAMING -->\n<section data-label=\"02 How to Read Objections\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Before the Objections<\/div>\n    <div class=\"ar\"><\/div>\n    <div style=\"font:800 54px/1.06 'Inter','Inter',sans-serif;color:#101c2f;letter-spacing:-0.022em;margin-bottom:48px;max-width:1200px\">Every AI objection has two layers.<br>Answer both, or you've answered neither.<\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;max-width:1500px\">\n      <div class=\"card\" style=\"padding:44px 40px\">\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#8a5c00;margin-bottom:18px\">Layer 1, The Emotional Concern<\/div>\n        <div style=\"font:800 28px/1.25 'Inter','Inter',sans-serif;color:#101c2f;margin-bottom:18px\">\"Will this embarrass me?\"<\/div>\n        <div style=\"font:300 20px/1.65 'Inter',sans-serif;color:#3f4d62\">The stakeholder raising the objection is personally exposed. If AI goes wrong, it's their name on the decision. Fear of career risk, loss of control, and being blamed for a vendor's failure drives more resistance than any technical gap. <strong style=\"color:#101c2f;font-weight:700\">Acknowledge it explicitly, never argue it away.<\/strong><\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:44px 40px\">\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0066FF;margin-bottom:18px\">Layer 2, The Operational Concern<\/div>\n        <div style=\"font:800 28px/1.25 'Inter','Inter',sans-serif;color:#101c2f;margin-bottom:18px\">\"Will this break my operation?\"<\/div>\n        <div style=\"font:300 20px/1.65 'Inter',sans-serif;color:#3f4d62\">Underneath the emotion is a legitimate operational question: data exposure, incorrect actions, audit failures, compliance violations. These deserve specific, technical, verifiable answers. <strong style=\"color:#101c2f;font-weight:700\">Vague reassurance here destroys credibility instantly.<\/strong><\/div>\n      <\/div>\n    <\/div>\n    <div style=\"margin-top:36px;padding:22px 30px;background:#f0f4ff;border-radius:12px;border-left:4px solid #0066FF;max-width:1500px\">\n      <div style=\"font:300 20px/1.6 'Inter',sans-serif;color:#3f4d62\">The structure for every objection in this deck: <strong style=\"color:#101c2f;font-weight:700\">name the emotion → validate the operational risk → show the specific OpenText control that addresses it.<\/strong><\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Trading Grid, Confidential<\/span><span>2 / 11<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 03 OBJECTION 1 -->\n<section data-label=\"03 Public Model Training\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Objection 01 of 07<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"quote\" style=\"margin-bottom:48px\">\"We don't want our data training public models.\"<\/div>\n    <div class=\"concern-grid\">\n      <div class=\"ccard\" style=\"background:#fdf6e8\">\n        <div class=\"col-h\" style=\"color:#8a5c00\">The Emotional Concern<\/div>\n        <div class=\"col-b\">Loss of stewardship. The customer imagines their proprietary supply chain data, pricing, volumes, partner relationships, leaking into a model that competitors can query. For a supply chain executive, this feels like handing trade secrets to the market.<\/div>\n      <\/div>\n      <div class=\"ccard\" style=\"background:#f6f7f7\">\n        <div class=\"col-h\" style=\"color:#3f4d62\">The Operational Concern<\/div>\n        <div class=\"col-b\">Contractual and regulatory exposure. Trading partner agreements often prohibit data sharing. GDPR, sector regulations, and customer DPAs constrain processing purposes. Training use could constitute a breach with real legal consequences.<\/div>\n      <\/div>\n      <div class=\"ccard\" style=\"background:#101c2f\">\n        <div class=\"col-h\" style=\"color:#0066FF\">The OpenText Response<\/div>\n        <div class=\"col-b\" style=\"color:rgba(255,255,255,0.85)\"><strong style=\"color:#fff\">Customer data is never used to train models, by architecture and by contract.<\/strong> Gemini models on Google Cloud operate under enterprise terms prohibiting training on customer data. Data is used for inference only, within your session, within your tenant. This commitment is documentable in your DPA, bring legal in early, not late.<\/div>\n      <\/div>\n    <\/div>\n    <div style=\"margin-top:32px;padding:18px 28px;background:#e8efff;border-radius:12px;display:flex;gap:16px;align-items:center\">\n      <span style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0033CF;flex-shrink:0\">Field note<\/span>\n      <span style=\"font:300 18px/1.5 'Inter',sans-serif;color:#3f4d62\">Don't say \"trust us.\" Say \"here is the contractual language, and here is the architecture that enforces it.\" Offer the Legal &amp; Privacy Brief immediately.<\/span>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Trading Grid, Confidential<\/span><span>3 / 11<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 04 OBJECTION 2 -->\n<section data-label=\"04 Hallucination\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Objection 02 of 07<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"quote\" style=\"margin-bottom:48px\">\"AI makes things up.\"<\/div>\n    <div class=\"concern-grid\">\n      <div class=\"ccard\" style=\"background:#fdf6e8\">\n        <div class=\"col-h\" style=\"color:#8a5c00\">The Emotional Concern<\/div>\n        <div class=\"col-b\">Public embarrassment. Everyone has seen confident, wrong AI answers. The stakeholder pictures an analyst acting on a fabricated conclusion, a partner dispute escalating, and the post-mortem asking \"who approved this tool?\"<\/div>\n      <\/div>\n      <div class=\"ccard\" style=\"background:#f6f7f7\">\n        <div class=\"col-h\" style=\"color:#3f4d62\">The Operational Concern<\/div>\n        <div class=\"col-b\">Decision integrity. In B2B operations, a wrong root-cause diagnosis means mis-routed escalations, wasted hours, and SLA penalties. If AI output can't be verified, it can't be allowed near operational decisions.<\/div>\n      <\/div>\n      <div class=\"ccard\" style=\"background:#101c2f\">\n        <div class=\"col-h\" style=\"color:#0066FF\">The OpenText Response<\/div>\n        <div class=\"col-b\" style=\"color:rgba(255,255,255,0.85)\"><strong style=\"color:#fff\">Aviator is grounded in your transactional truth, and it knows what it doesn't know.<\/strong> Answers are built from retrieved transaction records, not open-ended generation. Every conclusion links to its evidence so analysts can verify. And when confidence is low, the system escalates to a human with full context instead of guessing.<\/div>\n      <\/div>\n    <\/div>\n    <div style=\"margin-top:32px;padding:18px 28px;background:#e8efff;border-radius:12px;display:flex;gap:16px;align-items:center\">\n      <span style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0033CF;flex-shrink:0\">Field note<\/span>\n      <span style=\"font:300 18px/1.5 'Inter',sans-serif;color:#3f4d62\">Demo this rather than claiming it: run a transaction query live, then click through from the answer to the underlying records. Verifiability is the proof.<\/span>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Trading Grid, Confidential<\/span><span>4 / 11<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 05 OBJECTION 3 -->\n<section data-label=\"05 AI Taking Actions\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Objection 03 of 07<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"quote\" style=\"margin-bottom:48px\">\"We cannot allow AI to take actions in our environment.\"<\/div>\n    <div class=\"concern-grid\">\n      <div class=\"ccard\" style=\"background:#fdf6e8\">\n        <div class=\"col-h\" style=\"color:#8a5c00\">The Emotional Concern<\/div>\n        <div class=\"col-b\">Loss of control. The stakeholder imagines AI modifying partner configurations or re-sending documents at 2 AM with nobody watching. Autonomy feels like surrendering the operation to something that can't be held accountable.<\/div>\n      <\/div>\n      <div class=\"ccard\" style=\"background:#f6f7f7\">\n        <div class=\"col-h\" style=\"color:#3f4d62\">The Operational Concern<\/div>\n        <div class=\"col-b\">Change control and blast radius. Enterprise operations run on approval workflows, change windows, and rollback plans. An actor that bypasses change control, human or AI, is an audit finding waiting to happen.<\/div>\n      <\/div>\n      <div class=\"ccard\" style=\"background:#101c2f\">\n        <div class=\"col-h\" style=\"color:#0066FF\">The OpenText Response<\/div>\n        <div class=\"col-b\" style=\"color:rgba(255,255,255,0.85)\"><strong style=\"color:#fff\">Agree with them, then show the dial.<\/strong> The default posture is observe-and-recommend: no actions at all. Autonomy is graduated (L0 to L4), customer-configured per workflow, and reversible at any time. Where automation is enabled, it runs inside policy guardrails with approval gates, audit logging, and rollback. AI enters their change-control process; it does not bypass it.<\/div>\n      <\/div>\n    <\/div>\n    <div style=\"margin-top:32px;padding:18px 28px;background:#e8efff;border-radius:12px;display:flex;gap:16px;align-items:center\">\n      <span style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0033CF;flex-shrink:0\">Field note<\/span>\n      <span style=\"font:300 18px/1.5 'Inter',sans-serif;color:#3f4d62\">Never defend autonomy to a customer who fears it. Lead with \"it starts at zero autonomy and never moves without your governance signoff.\"<\/span>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Trading Grid, Confidential<\/span><span>5 / 11<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 06 OBJECTION 4 -->\n<section data-label=\"06 Black Box\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Objection 04 of 07<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"quote\" style=\"margin-bottom:48px\">\"AI is a black box. We can't audit what we can't explain.\"<\/div>\n    <div class=\"concern-grid\">\n      <div class=\"ccard\" style=\"background:#fdf6e8\">\n        <div class=\"col-h\" style=\"color:#8a5c00\">The Emotional Concern<\/div>\n        <div class=\"col-b\">Fear of the unexplainable. Governance and compliance leaders are professionally accountable for explaining decisions to auditors, regulators, and boards. \"The AI decided\" is a sentence that ends careers.<\/div>\n      <\/div>\n      <div class=\"ccard\" style=\"background:#f6f7f7\">\n        <div class=\"col-h\" style=\"color:#3f4d62\">The Operational Concern<\/div>\n        <div class=\"col-b\">Audit and regulatory defensibility. SOX, GDPR, and sector regulators increasingly require decision traceability. If AI-assisted decisions can't be reconstructed after the fact, the audit trail has a hole in it.<\/div>\n      <\/div>\n      <div class=\"ccard\" style=\"background:#101c2f\">\n        <div class=\"col-h\" style=\"color:#0066FF\">The OpenText Response<\/div>\n        <div class=\"col-b\" style=\"color:rgba(255,255,255,0.85)\"><strong style=\"color:#fff\">The model is probabilistic; the system around it is fully auditable.<\/strong> Every interaction is logged: who asked, what was retrieved, what was answered, what was approved or acted on. Every conclusion links to source records. Reconstruction after the fact is a query, not an investigation. Offer governance teams a standing audit view, not a one-time assurance.<\/div>\n      <\/div>\n    <\/div>\n    <div style=\"margin-top:32px;padding:18px 28px;background:#e8efff;border-radius:12px;display:flex;gap:16px;align-items:center\">\n      <span style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0033CF;flex-shrink:0\">Field note<\/span>\n      <span style=\"font:300 18px/1.5 'Inter',sans-serif;color:#3f4d62\">Distinguish \"explainable model internals\" (no vendor has this) from \"explainable system behavior\" (we do). Honesty about the difference builds enormous credibility.<\/span>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Trading Grid, Confidential<\/span><span>6 / 11<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 07 OBJECTION 5 -->\n<section data-label=\"07 Already Have Dashboards\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Objection 05 of 07<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"quote\" style=\"margin-bottom:48px\">\"We already have dashboards.\"<\/div>\n    <div class=\"concern-grid\">\n      <div class=\"ccard\" style=\"background:#fdf6e8\">\n        <div class=\"col-h\" style=\"color:#8a5c00\">The Emotional Concern<\/div>\n        <div class=\"col-b\">Investment defensiveness. The stakeholder built or bought those dashboards. \"You need AI\" can sound like \"your visibility program failed.\" The objection is partly a defense of their own track record.<\/div>\n      <\/div>\n      <div class=\"ccard\" style=\"background:#f6f7f7\">\n        <div class=\"col-h\" style=\"color:#3f4d62\">The Operational Concern<\/div>\n        <div class=\"col-b\">Tool sprawl and redundant spend. Another pane of glass with overlapping function is real cost: licenses, training, integration, and attention. If AI is just dashboards with chat, it's not worth the procurement cycle.<\/div>\n      <\/div>\n      <div class=\"ccard\" style=\"background:#101c2f\">\n        <div class=\"col-h\" style=\"color:#0066FF\">The OpenText Response<\/div>\n        <div class=\"col-b\" style=\"color:rgba(255,255,255,0.85)\"><strong style=\"color:#fff\">Dashboards show what happened. Operational intelligence explains why, and what to do.<\/strong> A dashboard surfaces 47 failed ASNs; Aviator correlates them to one root cause, explains it in operational language, and recommends a fix. It works <em>with<\/em> existing visibility investments, Command Center charts gain inline natural-language explanation, rather than replacing them.<\/div>\n      <\/div>\n    <\/div>\n    <div style=\"margin-top:32px;padding:18px 28px;background:#e8efff;border-radius:12px;display:flex;gap:16px;align-items:center\">\n      <span style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0033CF;flex-shrink:0\">Field note<\/span>\n      <span style=\"font:300 18px/1.5 'Inter',sans-serif;color:#3f4d62\">Frame as \"from monitoring to reasoning\", the dashboard investment was the prerequisite, not the casualty. Their visibility data is what makes AI useful.<\/span>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Trading Grid, Confidential<\/span><span>7 / 11<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 08 OBJECTION 6 -->\n<section data-label=\"08 Lock-In\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Objection 06 of 07<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"quote\" style=\"margin-bottom:48px\">\"We fear vendor lock-in.\"<\/div>\n    <div class=\"concern-grid\">\n      <div class=\"ccard\" style=\"background:#fdf6e8\">\n        <div class=\"col-h\" style=\"color:#8a5c00\">The Emotional Concern<\/div>\n        <div class=\"col-b\">Being trapped. Procurement and EA leaders have lived through platforms that became hostage situations, costs rising, exit impossible. AI deepening the OpenText relationship can read as the trap tightening.<\/div>\n      <\/div>\n      <div class=\"ccard\" style=\"background:#f6f7f7\">\n        <div class=\"col-h\" style=\"color:#3f4d62\">The Operational Concern<\/div>\n        <div class=\"col-b\">Exit cost and negotiating leverage. If AI workflows become operationally essential, what does leaving cost? Does the intelligence layer create proprietary data formats or processes that can't be migrated?<\/div>\n      <\/div>\n      <div class=\"ccard\" style=\"background:#101c2f\">\n        <div class=\"col-h\" style=\"color:#0066FF\">The OpenText Response<\/div>\n        <div class=\"col-b\" style=\"color:rgba(255,255,255,0.85)\"><strong style=\"color:#fff\">Your data and your telemetry remain yours, exportable, in standard formats.<\/strong> The transactional backbone runs on open B2B standards (X12, EDIFACT, XML, APIs). AI adds a reasoning layer on top; it doesn't convert your data into anything proprietary. Model abstraction at the orchestration layer means the underlying LLM can evolve without re-platforming your operation.<\/div>\n      <\/div>\n    <\/div>\n    <div style=\"margin-top:32px;padding:18px 28px;background:#e8efff;border-radius:12px;display:flex;gap:16px;align-items:center\">\n      <span style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0033CF;flex-shrink:0\">Field note<\/span>\n      <span style=\"font:300 18px/1.5 'Inter',sans-serif;color:#3f4d62\">Don't promise \"no lock-in\", sophisticated buyers don't believe it. Promise portability of data, standards-based integration, and contractual exit terms they can verify.<\/span>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Trading Grid, Confidential<\/span><span>8 / 11<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 09 OBJECTION 7 -->\n<section data-label=\"09 Tried AI Before\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Objection 07 of 07<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"quote\" style=\"margin-bottom:48px\">\"We tried AI before. It didn't deliver.\"<\/div>\n    <div class=\"concern-grid\">\n      <div class=\"ccard\" style=\"background:#fdf6e8\">\n        <div class=\"col-h\" style=\"color:#8a5c00\">The Emotional Concern<\/div>\n        <div class=\"col-b\">Burned-before skepticism. Someone championed an AI pilot, spent budget and political capital, and got demo-ware. They will not be the person who falls for it twice. Enthusiasm from a vendor actively increases suspicion.<\/div>\n      <\/div>\n      <div class=\"ccard\" style=\"background:#f6f7f7\">\n        <div class=\"col-h\" style=\"color:#3f4d62\">The Operational Concern<\/div>\n        <div class=\"col-b\">Pilot purgatory. Generic AI pilots fail in B2B operations for a specific reason: no operational grounding. A model with no access to transactional context produces plausible text, not operational answers, and adoption dies in weeks.<\/div>\n      <\/div>\n      <div class=\"ccard\" style=\"background:#101c2f\">\n        <div class=\"col-h\" style=\"color:#0066FF\">The OpenText Response<\/div>\n        <div class=\"col-b\" style=\"color:rgba(255,255,255,0.85)\"><strong style=\"color:#fff\">Their previous pilot likely failed for the exact reason this is different: grounding.<\/strong> Aviator reasons over the same Trading Grid that already runs their B2B operation, live transactions, partner data, integration telemetry. Propose a bounded evaluation with named workflows and measurable baselines (MTTR, escalation rate) so \"delivered or didn't\" is a number, not an opinion.<\/div>\n      <\/div>\n    <\/div>\n    <div style=\"margin-top:32px;padding:18px 28px;background:#e8efff;border-radius:12px;display:flex;gap:16px;align-items:center\">\n      <span style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0033CF;flex-shrink:0\">Field note<\/span>\n      <span style=\"font:300 18px/1.5 'Inter',sans-serif;color:#3f4d62\">Ask what their previous pilot lacked before pitching. Usually the answer, operational context, measurable scope, governance, sets up this conversation perfectly.<\/span>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Trading Grid, Confidential<\/span><span>9 / 11<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 10 SUMMARY MATRIX -->\n<section data-label=\"10 Response Matrix\">\n<div style=\"position:absolute;inset:0;background:#f6f7f7;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Quick Reference<\/div>\n    <div class=\"ar\"><\/div>\n    <div style=\"font:800 50px/1.06 'Inter','Inter',sans-serif;color:#101c2f;letter-spacing:-0.022em;margin-bottom:40px\">The seven objections at a glance<\/div>\n    <div style=\"background:#fff;border:1px solid #e7eaef;border-radius:16px;overflow:hidden;box-shadow:0 10px 30px rgba(16,28,47,0.08)\">\n      <div style=\"display:grid;grid-template-columns:1.3fr 1fr 1.5fr;background:#101c2f;padding:16px 32px\">\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Objection<\/div>\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Underlying fear<\/div>\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Core answer<\/div>\n      <\/div>\n      <div style=\"display:grid;grid-template-columns:1.3fr 1fr 1.5fr;padding:15px 32px;border-bottom:1px solid #f6f7f7;font:300 18px/1.45 'Inter',sans-serif;color:#3f4d62\"><div style=\"font-weight:700;color:#101c2f\">\"No public model training\"<\/div><div>Trade secret leakage<\/div><div>Inference only, contractual + architectural; documented in DPA<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:1.3fr 1fr 1.5fr;padding:15px 32px;border-bottom:1px solid #f6f7f7;font:300 18px/1.45 'Inter',sans-serif;color:#3f4d62\"><div style=\"font-weight:700;color:#101c2f\">\"AI makes things up\"<\/div><div>Public embarrassment<\/div><div>Grounded in transactional truth; evidence-linked; escalates when uncertain<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:1.3fr 1fr 1.5fr;padding:15px 32px;border-bottom:1px solid #f6f7f7;font:300 18px/1.45 'Inter',sans-serif;color:#3f4d62\"><div style=\"font-weight:700;color:#101c2f\">\"AI can't take actions\"<\/div><div>Loss of control<\/div><div>Default is zero autonomy; graduated L0 to L4, customer-set, reversible<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:1.3fr 1fr 1.5fr;padding:15px 32px;border-bottom:1px solid #f6f7f7;font:300 18px/1.45 'Inter',sans-serif;color:#3f4d62\"><div style=\"font-weight:700;color:#101c2f\">\"AI is a black box\"<\/div><div>Audit indefensibility<\/div><div>Fully logged system behavior; every output traceable to source records<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:1.3fr 1fr 1.5fr;padding:15px 32px;border-bottom:1px solid #f6f7f7;font:300 18px/1.45 'Inter',sans-serif;color:#3f4d62\"><div style=\"font-weight:700;color:#101c2f\">\"We have dashboards\"<\/div><div>Investment defensiveness<\/div><div>Monitoring → reasoning; explains why and what to do; builds on their data<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:1.3fr 1fr 1.5fr;padding:15px 32px;border-bottom:1px solid #f6f7f7;font:300 18px/1.45 'Inter',sans-serif;color:#3f4d62\"><div style=\"font-weight:700;color:#101c2f\">\"We fear lock-in\"<\/div><div>Being trapped<\/div><div>Standards-based data, exportable telemetry, model abstraction<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:1.3fr 1fr 1.5fr;padding:15px 32px;font:300 18px/1.45 'Inter',sans-serif;color:#3f4d62\"><div style=\"font-weight:700;color:#101c2f\">\"We tried AI before\"<\/div><div>Burned-before skepticism<\/div><div>Operational grounding is the difference; bounded pilot with measurable baselines<\/div><\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Trading Grid, Confidential<\/span><span>10 / 11<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 11 CLOSE -->\n<section data-label=\"11 Close\">\n<div style=\"position:absolute;inset:0;background:#101c2f;overflow:hidden\">\n  <div style=\"position:absolute;right:-280px;bottom:-280px;width:900px;height:900px;border-radius:50%;border:1px solid rgba(0,102,255,0.1)\"><\/div>\n  <img class=\"logo\" src=\"__LOGO_NEG__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;max-width:1400px;padding:0 96px\">\n    <div style=\"width:72px;height:5px;background:#0066FF;border-radius:3px;margin:0 auto 44px\"><\/div>\n    <div style=\"font:900 56px/1.12 'Inter','Inter',sans-serif;color:#fff;letter-spacing:-0.025em;margin-bottom:36px\">Customers aren't resisting AI.<br>They're resisting ungoverned AI.<\/div>\n    <div style=\"font:300 24px/1.6 'Inter',sans-serif;color:rgba(255,255,255,0.68);max-width:1050px;margin:0 auto 56px\">Every objection in this deck is, at its core, a request for governance. Answer with controls, evidence, and customer authority over the system, and the objection becomes the reason to choose OpenText.<\/div>\n    <div style=\"font:800 26px/1.4 'Inter','Inter',sans-serif;color:#0066FF\">Governed operational intelligence is the answer to all seven.<\/div>\n  <\/div>\n  <div class=\"foot d\"><span>CONFIDENTIAL, OPENTEXT BUSINESS NETWORK<\/span><span>11 / 11<\/span><\/div>\n<\/div>\n<\/section>\n\n<\/deck-stage>\n<script>window.addEventListener(\"error\",function(e){if(e.message&&e.message.indexOf(\"ResizeObserver loop\")!==-1){e.stopImmediatePropagation();e.preventDefault();}},true);<\/script>\n__DECKSTAGE__\n<\/body>\n<\/html>\n","int/AI-Positioning-Talking-Points":"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n__FONTS__\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>AI Positioning &amp; Talking Points, OpenText Field Enablement<\/title>\n__DOCCSS__\n<style>\n.phrase-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px}\n.phrase-col{border:1px solid var(--ln);border-radius:14px;overflow:hidden}\n.phrase-col .ph{padding:14px 24px;font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase}\n.phrase-col .pi{padding:14px 24px;border-top:1px solid var(--lt);font:300 15px/1.55 'Inter',sans-serif;color:var(--sl)}\n.swap{display:grid;grid-template-columns:1fr 56px 1fr;align-items:center;gap:0;margin-bottom:10px}\n.swap .no{padding:14px 18px;background:#fdf1f0;border-radius:10px;font:300 15px/1.5 'Inter',sans-serif;color:#7a1208}\n.swap .yes{padding:14px 18px;background:#eef7ee;border-radius:10px;font:400 15px/1.5 'Inter',sans-serif;color:#114911}\n.swap .arr{text-align:center;font:700 18px/1 'Inter',sans-serif;color:var(--bl)}\n.qa{border:1px solid var(--ln);border-radius:12px;padding:20px 26px;margin-bottom:14px;break-inside:avoid}\n.qa .q{font:700 16px/1.4 'Inter',sans-serif;color:var(--dk);margin-bottom:8px}\n.qa .a{font:300 15px/1.65 'Inter',sans-serif;color:var(--sl)}\n<\/style>\n<\/head>\n<body>\n<div class=\"page\">\n\n  <div class=\"doc-header\">\n    <div>\n      <div class=\"kicker\">OpenText Business Network · Trading Grid with Aviator<\/div>\n      <h1>AI Positioning &amp; Talking Points<\/h1>\n      <div class=\"sub\">How we talk about AI in Business Network conversations, the language that builds trust, and the language that destroys it.<\/div>\n    <\/div>\n    <div style=\"flex-shrink:0\">\n      <img src=\"__LOGO_NEG__\" alt=\"opentext\">\n      <div style=\"display:flex;gap:8px;justify-content:flex-end\">\n        <span class=\"tag tag-b\">Stage 1, Interest<\/span>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"doc-body\">\n\n    <p class=\"lead\">Enterprise customers have been pitched AI relentlessly for three years. Most of what they've heard was hype, and they know it. Our credibility comes from sounding different: <strong>operationally grounded, governance-first, and honest about boundaries.<\/strong><\/p>\n\n    <div class=\"section-label\">Core Positioning<\/div>\n    <div class=\"ar\"><\/div>\n\n    <h2 style=\"margin-top:0\">The one sentence<\/h2>\n    <div class=\"callout\"><p style=\"font:400 19px/1.6 'Inter',sans-serif;color:var(--dk)\">\"Trading Grid with Aviator is <strong>governed operational intelligence<\/strong>, AI that reasons over your own B2B transactional data, explains its conclusions, and operates only within the boundaries your organization defines.\"<\/p><\/div>\n    <p>Every word is doing work. <strong>Governed<\/strong> answers the fear before it's raised. <strong>Operational<\/strong> distances us from chatbots. <strong>Intelligence<\/strong> (not \"automation\") keeps humans in the frame. <strong>Your own data<\/strong> establishes grounding. <strong>Boundaries your organization defines<\/strong> hands control to the customer.<\/p>\n\n    <h2>What we are, and are not, selling<\/h2>\n    <table>\n      <thead><tr><th style=\"width:50%\">We are positioning<\/th><th>We are not positioning<\/th><\/tr><\/thead>\n      <tbody>\n        <tr><td>An operational intelligence layer over the Business Network<\/td><td>A chatbot bolted onto an EDI platform<\/td><\/tr>\n        <tr><td>AI-assisted operations, people accomplishing more<\/td><td>AI replacing operations teams<\/td><\/tr>\n        <tr><td>Reasoning grounded in the customer's transactional truth<\/td><td>A general-purpose assistant with opinions<\/td><\/tr>\n        <tr><td>Graduated, customer-controlled autonomy<\/td><td>Autonomous agents acting on their own judgment<\/td><\/tr>\n        <tr><td>A governance framework that matures with trust<\/td><td>An experiment the customer hosts at their own risk<\/td><\/tr>\n      <\/tbody>\n    <\/table>\n\n    <div class=\"divider\"><\/div>\n\n    <div class=\"section-label\">Language Guide<\/div>\n    <div class=\"ar\"><\/div>\n\n    <h2 style=\"margin-top:0\">Phrases to use<\/h2>\n    <div class=\"phrase-grid\">\n      <div class=\"phrase-col\">\n        <div class=\"ph\" style=\"background:#eef7ee;color:#114911\">Say this<\/div>\n        <div class=\"pi\">\"Governed operational intelligence\"<\/div>\n        <div class=\"pi\">\"AI-assisted operations\"<\/div>\n        <div class=\"pi\">\"Grounded in your transactional data\"<\/div>\n        <div class=\"pi\">\"Policy-bound automation\"<\/div>\n        <div class=\"pi\">\"Explainable, every answer links to its evidence\"<\/div>\n        <div class=\"pi\">\"Operational reasoning\" / \"anomaly correlation\"<\/div>\n        <div class=\"pi\">\"You set the autonomy level; you can turn it back\"<\/div>\n        <div class=\"pi\">\"Operational augmentation, your team, faster\"<\/div>\n      <\/div>\n      <div class=\"phrase-col\">\n        <div class=\"ph\" style=\"background:#fdf1f0;color:#7a1208\">Never say this<\/div>\n        <div class=\"pi\">\"It's like ChatGPT for EDI\"<\/div>\n        <div class=\"pi\">\"The AI just figures it out\"<\/div>\n        <div class=\"pi\">\"Fully autonomous\" / \"set it and forget it\"<\/div>\n        <div class=\"pi\">\"AI will replace your manual work[ers]\"<\/div>\n        <div class=\"pi\">\"It's magic\" / \"it just works\"<\/div>\n        <div class=\"pi\">\"Trust me, the model is really good\"<\/div>\n        <div class=\"pi\">\"Everyone's doing AI now\" (FOMO selling)<\/div>\n        <div class=\"pi\">\"It never makes mistakes\"<\/div>\n      <\/div>\n    <\/div>\n\n    <h2>Reframes, catching yourself mid-sentence<\/h2>\n    <div class=\"swap\"><div class=\"no\">\"The AI automatically fixes failed transactions.\"<\/div><div class=\"arr\">→<\/div><div class=\"yes\">\"Where your policies allow it, recovery can be automated, with audit logging and rollback. By default, it recommends and you decide.\"<\/div><\/div>\n    <div class=\"swap\"><div class=\"no\">\"You can ask it anything.\"<\/div><div class=\"arr\">→<\/div><div class=\"yes\">\"Your team can ask operational questions in plain language, and it answers from your transaction data, with the evidence attached.\"<\/div><\/div>\n    <div class=\"swap\"><div class=\"no\">\"It's powered by Gemini, the same AI as Google's chatbot.\"<\/div><div class=\"arr\">→<\/div><div class=\"yes\">\"Language reasoning runs on Gemini under Google Cloud enterprise terms, your data is never used for training, and it stays in your tenant.\"<\/div><\/div>\n    <div class=\"swap\"><div class=\"no\">\"It eliminates the need for EDI specialists.\"<\/div><div class=\"arr\">→<\/div><div class=\"yes\">\"It lets non-specialists handle first-line investigation, so your EDI experts focus on the work that genuinely needs them.\"<\/div><\/div>\n    <div class=\"swap\"><div class=\"no\">\"AI is the future, you don't want to be left behind.\"<\/div><div class=\"arr\">→<\/div><div class=\"yes\">\"Here's a bounded evaluation with your workflows and baseline metrics. If the numbers don't move, you've lost nothing.\"<\/div><\/div>\n\n    <div class=\"divider\"><\/div>\n\n    <div class=\"section-label\">Handling Skepticism<\/div>\n    <div class=\"ar\"><\/div>\n\n    <h2 style=\"margin-top:0\">Principles for the paranoid customer<\/h2>\n    <p>Customer paranoia about AI is rational. Treat it as a feature of a competent buyer, not an obstacle.<\/p>\n    <ul class=\"fl\">\n      <li><strong>Validate before answering.<\/strong> \"That's exactly the right question to ask a vendor\" costs nothing and changes the temperature of the room.<\/li>\n      <li><strong>Answer with controls, not adjectives.<\/strong> \"Secure\" and \"enterprise-grade\" are noise. Tenant isolation, permission-aware retrieval, audit logs, autonomy levels, DPA language, those are answers.<\/li>\n      <li><strong>Concede what's true.<\/strong> Foundation models are probabilistic; no vendor can fully explain model internals. We can explain and audit everything the <em>system<\/em> does. Honesty about the boundary is a differentiator.<\/li>\n      <li><strong>Put governance people in the room early.<\/strong> Inviting legal, privacy, and security into the second meeting, rather than dodging them until procurement, signals we have nothing to hide and shortens the cycle.<\/li>\n      <li><strong>Offer the paper.<\/strong> Trust Principles one-pager, Legal &amp; Privacy Brief, Security Architecture overview. Skeptics trust documents they can mark up more than slides they're shown.<\/li>\n    <\/ul>\n\n    <h2>Quick answers to common pushback<\/h2>\n    <div class=\"qa\"><div class=\"q\">\"Is this just a wrapper around a public LLM?\"<\/div><div class=\"a\">\"The language model is one layer. The product is the orchestration around it: retrieval from your Trading Grid data, permission enforcement, payload and EDI interpretation, audit logging, and policy guardrails. The model reasons; the platform governs.\"<\/div><\/div>\n    <div class=\"qa\"><div class=\"q\">\"What happens when it's wrong?\"<\/div><div class=\"a\">\"Three things. Every answer links to its source records, so wrong answers are catchable before they're acted on. Low-confidence cases escalate to humans with full context instead of being answered. And at default autonomy levels, the AI never acts, people do.\"<\/div><\/div>\n    <div class=\"qa\"><div class=\"q\">\"Why shouldn't we wait until AI matures?\"<\/div><div class=\"a\">\"Waiting is a fine governance posture, but you can adopt the L0 capabilities (search, explanation, summarization) with zero autonomy risk today and bank the MTTR gains while your governance framework matures on a real system instead of a hypothetical one.\"<\/div><\/div>\n    <div class=\"qa\"><div class=\"q\">\"Our industry is regulated. Can we even use this?\"<\/div><div class=\"a\">\"Regulated supply chains, pharma, healthcare, automotive, are exactly who this governance model was designed for. Metadata-only modes, masking, regional controls, and audit trails exist because of those requirements, not despite them. Let's get your compliance team the Legal &amp; Privacy Brief.\"<\/div><\/div>\n\n    <div class=\"divider\"><\/div>\n\n    <div class=\"dark-block\">\n      <div class=\"db-k\">If You Remember One Thing<\/div>\n      <div class=\"db-t\">We don't sell AI. We sell control over AI, with operational results as the proof.<\/div>\n      <div class=\"db-b\">The customer's fear is ungoverned AI. The competition's pitch is magical AI. Our position, governed operational intelligence, grounded in their own data, bounded by their own policies, wins precisely because it takes their skepticism seriously.<\/div>\n    <\/div>\n\n  <\/div>\n\n  <div class=\"doc-footer\">\n    <div>OpenText Business Network · Trading Grid with Aviator, Confidential<\/div>\n    <div>Stage 1, Interest · AI Positioning &amp; Talking Points · 2026<\/div>\n  <\/div>\n\n<\/div>\n<\/body>\n<\/html>\n","int/AI-Governance-Workshop-Guide":"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n__FONTS__\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>AI Governance Workshop Guide, OpenText Field Enablement<\/title>\n__DOCCSS__\n<style>\n.agenda{border:1px solid var(--ln);border-radius:14px;overflow:hidden;margin-bottom:32px}\n.agenda-row{display:grid;grid-template-columns:120px 280px 1fr;padding:16px 26px;border-bottom:1px solid var(--lt);align-items:start}\n.agenda-row:last-child{border-bottom:none}\n.agenda-row .time{font:700 14px/1.5 'Inter',sans-serif;color:var(--bl)}\n.agenda-row .item{font:700 15px/1.5 'Inter',sans-serif;color:var(--dk)}\n.agenda-row .det{font:300 14px/1.6 'Inter',sans-serif;color:var(--sl)}\n.qblock{background:var(--lt);border-radius:12px;padding:22px 28px;margin-bottom:18px;break-inside:avoid}\n.qblock .qh{font:700 15px/1.4 'Inter',sans-serif;color:var(--dk);margin-bottom:12px}\n.qblock ol{margin:0;padding-left:22px}\n.qblock li{font:300 15px/1.7 'Inter',sans-serif;color:var(--sl);margin-bottom:7px}\n.sm{width:100%;border-collapse:collapse;margin:6px 0 24px}\n.sm th{font:700 11px/1.4 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:var(--sl);text-align:left;padding:10px 12px;border-bottom:2px solid var(--ln)}\n.sm td{font:300 14px/1.55 'Inter',sans-serif;color:var(--sl);padding:12px;border-bottom:1px solid var(--lt);vertical-align:top}\n.sm td:first-child{font-weight:700;color:var(--dk);white-space:nowrap}\n<\/style>\n<\/head>\n<body>\n<div class=\"page\">\n\n  <div class=\"doc-header\">\n    <div>\n      <div class=\"kicker\">OpenText Business Network · Trading Grid with Aviator<\/div>\n      <h1>AI Governance Workshop Guide<\/h1>\n      <div class=\"sub\">A facilitator's kit for running the customer governance workshop, agenda, stakeholder mapping, discovery questions, objection handling, and maturity assessment.<\/div>\n    <\/div>\n    <div style=\"flex-shrink:0\">\n      <img src=\"__LOGO_NEG__\" alt=\"opentext\">\n      <div style=\"display:flex;gap:8px;justify-content:flex-end\">\n        <span class=\"tag tag-b\">Stage 2, Decision<\/span>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"doc-body\">\n\n    <p class=\"lead\">The governance workshop is the pivot point of the adoption journey: the meeting where legal, privacy, security, architecture, and operations stop evaluating AI in the abstract and start designing <strong>their<\/strong> governance model for it. Run well, it converts skeptics into co-authors.<\/p>\n\n    <div class=\"section-label\">Workshop Design<\/div>\n    <div class=\"ar\"><\/div>\n\n    <h2 style=\"margin-top:0\">Objectives, what done looks like<\/h2>\n    <ul class=\"fl\">\n      <li>Every governance function has voiced its concerns on the record, and seen them mapped to specific controls<\/li>\n      <li>A draft autonomy ceiling and capability scope exists for the initial deployment<\/li>\n      <li>Maturity assessment is complete: the customer knows where they are and what their gate criteria will be<\/li>\n      <li>Named owners are identified for workflow, policy, and audit responsibilities<\/li>\n      <li>The next two governance actions are scheduled before the room empties<\/li>\n    <\/ul>\n\n    <h2>Half-day agenda (3.5 hours)<\/h2>\n    <div class=\"agenda\">\n      <div class=\"agenda-row\"><span class=\"time\">0:00 to 0:20<\/span><span class=\"item\">Framing: governed operational intelligence<\/span><span class=\"det\">Executive Vision summary (slides 5, 10, 11 only). Set the rule: every concern raised today gets mapped to a control or logged as an open item, nothing is waved away.<\/span><\/div>\n      <div class=\"agenda-row\"><span class=\"time\">0:20 to 1:00<\/span><span class=\"item\">Concern inventory<\/span><span class=\"det\">Round-robin by function. Capture concerns verbatim on a shared board. Do not respond yet, collection first, response later. Facilitator tags each: data / model / action / audit / commercial.<\/span><\/div>\n      <div class=\"agenda-row\"><span class=\"time\">1:00 to 1:45<\/span><span class=\"item\">Control mapping<\/span><span class=\"det\">Walk the five governance layers (Enterprise AI Governance deck, slide 3). Map each captured concern to its layer and control. Open items get an owner and a date.<\/span><\/div>\n      <div class=\"agenda-row\"><span class=\"time\">1:45 to 2:00<\/span><span class=\"item\">Break<\/span><span class=\"det\">, <\/span><\/div>\n      <div class=\"agenda-row\"><span class=\"time\">2:00 to 2:40<\/span><span class=\"item\">Autonomy &amp; scope design<\/span><span class=\"det\">Using the Autonomy Maturity Model and Risk Matrix: which capabilities, at which levels, for the initial deployment? Draft the autonomy ceiling per workflow.<\/span><\/div>\n      <div class=\"agenda-row\"><span class=\"time\">2:40 to 3:10<\/span><span class=\"item\">Maturity assessment<\/span><span class=\"det\">Score the organization on the five readiness dimensions (below). Agree the gate criteria the customer will hold themselves to for any future level advancement.<\/span><\/div>\n      <div class=\"agenda-row\"><span class=\"time\">3:10 to 3:30<\/span><span class=\"item\">Ownership &amp; next actions<\/span><span class=\"det\">Name the workflow owner, policy owner, and audit owner. Schedule the DPA review and the pilot-scope decision meeting. Recap open items.<\/span><\/div>\n    <\/div>\n\n    <div class=\"divider\"><\/div>\n\n    <div class=\"section-label\">Stakeholder Mapping<\/div>\n    <div class=\"ar\"><\/div>\n\n    <h2 style=\"margin-top:0\">Who must be in the room<\/h2>\n    <table class=\"sm\">\n      <thead><tr><th>Function<\/th><th>Why they're essential<\/th><th>What they typically need to hear first<\/th><\/tr><\/thead>\n      <tbody>\n        <tr><td>Legal / Privacy<\/td><td>Owns DPA, training prohibition, retention, residency positions<\/td><td>\"No training on your data, here's the contractual language\" (§2, Legal &amp; Privacy Brief)<\/td><\/tr>\n        <tr><td>CISO / Security<\/td><td>Owns isolation, identity, encryption, incident response sign-off<\/td><td>\"AI inherits your security model, RBAC-aware retrieval, full-lifecycle audit\"<\/td><\/tr>\n        <tr><td>Enterprise Architecture<\/td><td>Owns integration patterns and platform standards<\/td><td>\"A reasoning layer on the platform you already run, no parallel stack\"<\/td><\/tr>\n        <tr><td>Procurement<\/td><td>Owns commercial terms and exit posture<\/td><td>\"Portability and exit terms are verifiable in the paper\" (Vendor Trust Overview)<\/td><\/tr>\n        <tr><td>Governance / Risk Board<\/td><td>Owns autonomy decisions and oversight cadence<\/td><td>\"You approve levels, not promises, and every level reverses\"<\/td><\/tr>\n        <tr><td>Operations Leadership<\/td><td>Owns workflows, KPI baselines, and adoption reality<\/td><td>\"Your team keeps decision rights; the AI does the searching and explaining\"<\/td><\/tr>\n      <\/tbody>\n    <\/table>\n    <div class=\"callout\"><p><strong>If a function is missing, log it as a risk.<\/strong> A workshop without legal present produces a decision that legal will reopen later, schedule the absent function's session before closing the workshop.<\/p><\/div>\n\n    <div class=\"divider\"><\/div>\n\n    <div class=\"section-label\">Discovery Questions<\/div>\n    <div class=\"ar\"><\/div>\n\n    <h2 style=\"margin-top:0\">Governance discovery, by function<\/h2>\n\n    <div class=\"qblock\">\n      <div class=\"qh\">Legal &amp; privacy<\/div>\n      <ol>\n        <li>Which document flows carry regulated or contractually restricted content? (Candidates for metadata-only mode)<\/li>\n        <li>What residency commitments exist with your trading partners, by region?<\/li>\n        <li>Does your current DPA process have a defined path for AI subprocessors?<\/li>\n        <li>Who signs off on new processing purposes, and what evidence do they need?<\/li>\n      <\/ol>\n    <\/div>\n    <div class=\"qblock\">\n      <div class=\"qh\">Security<\/div>\n      <ol>\n        <li>How is role-based access currently structured for Trading Grid users? (AI inherits this)<\/li>\n        <li>What does your SIEM need to consume AI audit events, format, frequency, fields?<\/li>\n        <li>What's your standard for service-identity review and revocation?<\/li>\n        <li>Does your incident-response playbook have a category for AI-assisted workflows yet?<\/li>\n      <\/ol>\n    <\/div>\n    <div class=\"qblock\">\n      <div class=\"qh\">Governance &amp; risk<\/div>\n      <ol>\n        <li>What body would own AI autonomy decisions, existing change board, or new?<\/li>\n        <li>What evidence threshold would you set for moving a workflow from recommend (L1) to approve (L2)?<\/li>\n        <li>What review cadence fits your existing governance calendar, quarterly, biannual?<\/li>\n        <li>Who holds kill-switch authority out of hours?<\/li>\n      <\/ol>\n    <\/div>\n    <div class=\"qblock\">\n      <div class=\"qh\">Operations<\/div>\n      <ol>\n        <li>What's your current MTTR for transaction investigations, and where does the time go?<\/li>\n        <li>What share of issues escalate to EDI specialists today?<\/li>\n        <li>Which two workflows, if accelerated, would your team feel within a month?<\/li>\n        <li>What would make your analysts distrust an AI recommendation? (Design the pilot to avoid it)<\/li>\n      <\/ol>\n    <\/div>\n\n    <div class=\"divider\"><\/div>\n\n    <div class=\"section-label\">Objection Handling<\/div>\n    <div class=\"ar\"><\/div>\n\n    <h2 style=\"margin-top:0\">In-workshop objection patterns<\/h2>\n    <table class=\"sm\">\n      <thead><tr><th>Pattern<\/th><th>What's happening<\/th><th>Facilitator move<\/th><\/tr><\/thead>\n      <tbody>\n        <tr><td>\"This all sounds fine, but…\"<\/td><td>Unvoiced concern, often political, not technical<\/td><td>Ask directly: \"What would have to be true for you to sign off?\" Capture the answer as a gate criterion.<\/td><\/tr>\n        <tr><td>The hypothetical cascade<\/td><td>Stacking edge cases (\"but what if X, then Y, then Z…\")<\/td><td>Anchor to the autonomy level: \"At L1, that chain stops at step one, no action occurs.\" Then log the cascade as an L3 policy test case.<\/td><\/tr>\n        <tr><td>Cross-functional standoff<\/td><td>Security defers to legal, legal defers to security<\/td><td>Use the stakeholder decision map, show each function the question that is theirs alone to answer.<\/td><\/tr>\n        <tr><td>\"We need to see it run first\"<\/td><td>Healthy demand for evidence<\/td><td>Agree enthusiastically. Scope an L0-only evaluation with their data and their baselines, this is the designed entry point, not a concession.<\/td><\/tr>\n        <tr><td>The silent veto-holder<\/td><td>A stakeholder who hasn't spoken<\/td><td>Round-robin rule: every function speaks in the concern inventory. Silence in the room becomes a \"no\" in procurement.<\/td><\/tr>\n      <\/tbody>\n    <\/table>\n\n    <div class=\"divider\"><\/div>\n\n    <div class=\"section-label\">Maturity Assessment<\/div>\n    <div class=\"ar\"><\/div>\n\n    <h2 style=\"margin-top:0\">Five-dimension readiness scoring<\/h2>\n    <p>Score each dimension 1 to 5 with the room. The profile, not the total, drives the recommendation.<\/p>\n    <table class=\"sm\">\n      <thead><tr><th>Dimension<\/th><th>1, Nascent<\/th><th>3, Developing<\/th><th>5, Established<\/th><\/tr><\/thead>\n      <tbody>\n        <tr><td>Governance structure<\/td><td>No body owns AI decisions<\/td><td>Existing board could absorb AI scope<\/td><td>AI governance charter exists with named owners<\/td><\/tr>\n        <tr><td>Data classification<\/td><td>Flows not classified for sensitivity<\/td><td>Partial classification; key flows known<\/td><td>Classified flows with masking/metadata rules ready<\/td><\/tr>\n        <tr><td>Operational baselines<\/td><td>No MTTR/escalation metrics<\/td><td>Metrics exist but aren't tracked consistently<\/td><td>Baselines tracked; targets settable today<\/td><\/tr>\n        <tr><td>Audit practice<\/td><td>Logs collected, rarely reviewed<\/td><td>Periodic review of system logs<\/td><td>Active audit program ready to absorb AI events<\/td><\/tr>\n        <tr><td>Change control<\/td><td>Informal approvals<\/td><td>Defined process, uneven adherence<\/td><td>Mature gates AI approvals can plug into<\/td><\/tr>\n      <\/tbody>\n    <\/table>\n    <ul class=\"fl\">\n      <li><strong>Mostly 1 to 2:<\/strong> recommend L0-only evaluation while governance foundations are built, position the framework documents as the build plan.<\/li>\n      <li><strong>Mostly 3:<\/strong> L0 to L1 production deployment with quarterly review; define L2 gate criteria now so evidence collection starts immediately.<\/li>\n      <li><strong>Mostly 4 to 5:<\/strong> full Stage 3 rollout planning, this customer can run the phased framework as written.<\/li>\n    <\/ul>\n\n    <div class=\"dark-block\">\n      <div class=\"db-k\">Facilitator's North Star<\/div>\n      <div class=\"db-t\">Leave with their governance model, not your pitch.<\/div>\n      <div class=\"db-b\">The workshop succeeds when the customer's stakeholders can describe, in their own words, what the AI may do, what it may not, and how they'd stop it. At that point, adoption is a scheduling question.<\/div>\n    <\/div>\n\n  <\/div>\n\n  <div class=\"doc-footer\">\n    <div>OpenText Business Network · Trading Grid with Aviator, Confidential<\/div>\n    <div>Stage 2, Decision · AI Governance Workshop Guide · 2026<\/div>\n  <\/div>\n\n<\/div>\n<\/body>\n<\/html>\n"};

var DOCCSS="/* Shared document styles — OpenText AI Customer Adoption Framework */\n\n\n\n\n\n*{box-sizing:border-box;margin:0;padding:0}\n:root{--dk:#101c2f;--bl:#0066FF;--bld:#0033CF;--sl:#3f4d62;--lt:#f6f7f7;--ln:#e7eaef}\nbody{font-family:'Inter','Helvetica Neue',sans-serif;font-weight:300;color:var(--sl);background:var(--lt);-webkit-font-smoothing:antialiased;line-height:1.6}\n.page{max-width:1100px;margin:0 auto;background:#fff;box-shadow:0 0 0 1px var(--ln)}\n.doc-header{background:var(--dk);padding:52px 64px 48px;display:flex;justify-content:space-between;align-items:flex-end;gap:40px}\n.doc-header .kicker{font:700 13px/1 'Inter',sans-serif;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.52);margin-bottom:16px}\n.doc-header h1{font:900 40px/1.08 'Inter','Inter',sans-serif;color:#fff;letter-spacing:-0.025em;margin-bottom:12px}\n.doc-header .sub{font:300 18px/1.5 'Inter',sans-serif;color:rgba(255,255,255,0.68)}\n.doc-header img{height:40px;width:auto;display:block;margin-bottom:16px;margin-left:auto}\n.doc-body{padding:52px 64px 64px}\n.doc-footer{background:var(--dk);padding:28px 64px;display:flex;justify-content:space-between;align-items:center}\n.doc-footer div{font:300 13px/1 'Inter',sans-serif;color:rgba(255,255,255,0.45)}\n.doc-footer div:last-child{color:rgba(255,255,255,0.35)}\n.ar{width:48px;height:4px;background:var(--bl);border-radius:2px;margin-bottom:16px}\n.section-label{font:700 12px/1 'Inter',sans-serif;letter-spacing:0.12em;text-transform:uppercase;color:var(--bl);margin-bottom:8px}\nh2{font:800 28px/1.15 'Inter','Inter',sans-serif;color:var(--dk);letter-spacing:-0.02em;margin:44px 0 20px}\nh3{font:800 20px/1.25 'Inter','Inter',sans-serif;color:var(--dk);letter-spacing:-0.01em;margin:28px 0 12px}\np{font:300 16px/1.7 'Inter',sans-serif;color:var(--sl);margin-bottom:16px}\np strong,li strong{color:var(--dk);font-weight:700}\n.lead{font:300 20px/1.6 'Inter',sans-serif;margin-bottom:32px}\nul.fl{margin:0 0 16px;padding:0;list-style:none}\nul.fl li{font:300 16px/1.7 'Inter',sans-serif;padding-left:24px;position:relative;margin-bottom:8px}\nul.fl li::before{content:'→';position:absolute;left:0;color:var(--bl);font-weight:700}\n.tag{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:999px;font:700 12px/1 'Inter',sans-serif;letter-spacing:0.06em;text-transform:uppercase}\n.tag::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}\n.tag-b{background:#e8efff;color:#0033CF}\n.tag-g{background:#d9efd9;color:#156615}\n.tag-o{background:#fdf6e8;color:#8a5c00}\n.tag-r{background:#f6d7d4;color:#b11206}\ntable{width:100%;border-collapse:collapse;margin:6px 0 20px}\nth{font:700 12px/1.4 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:var(--sl);text-align:left;padding:10px 14px;border-bottom:2px solid var(--ln)}\ntd{font:300 15px/1.6 'Inter',sans-serif;color:var(--sl);padding:12px 14px;border-bottom:1px solid var(--lt);vertical-align:top}\n.callout{padding:20px 28px;background:#e8efff;border-radius:12px;border-left:4px solid var(--bl);margin:20px 0}\n.callout p{margin:0}\n.divider{height:1px;background:var(--ln);margin:44px 0}\n.card{background:#fff;border:1px solid var(--ln);border-radius:14px;box-shadow:0 8px 24px rgba(16,28,47,0.07)}\n.dark-block{background:var(--dk);border-radius:14px;padding:36px 40px;margin-top:8px}\n.dark-block .db-k{font:700 13px/1 'Inter',sans-serif;color:rgba(255,255,255,0.5);margin-bottom:16px;letter-spacing:0.1em;text-transform:uppercase}\n.dark-block .db-t{font:900 26px/1.3 'Inter','Inter',sans-serif;color:#fff;margin-bottom:14px}\n.dark-block .db-b{font:300 17px/1.6 'Inter',sans-serif;color:rgba(255,255,255,0.68)}\n@media print{\n  body{background:#fff}\n  .page{box-shadow:none;max-width:100%}\n  .card{box-shadow:none;break-inside:avoid}\n  .doc-header,.doc-footer,.dark-block,.callout{-webkit-print-color-adjust:exact;print-color-adjust:exact}\n}\n";
