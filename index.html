ut<\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;max-width:1700px\">\n      <div class=\"card\" style=\"padding:40px 36px\">\n        <div style=\"font:700 14px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0066FF;margin-bottom:24px\">Inbound, Prompt Controls<\/div>\n        <div style=\"display:flex;flex-direction:column;gap:16px\">\n          <div style=\"display:flex;gap:14px;align-items:flex-start\"><div style=\"width:8px;height:8px;border-radius:50%;background:#0066FF;flex-shrink:0;margin-top:9px\"><\/div><div class=\"kb\" style=\"font-size:18px\"><strong>Injection screening.<\/strong> Prompts are screened for injection patterns, attempts to override instructions, impersonate roles, or extract system context, before reaching the model.<\/div><\/div>\n          <div style=\"display:flex;gap:14px;align-items:flex-start\"><div style=\"width:8px;height:8px;border-radius:50%;background:#0066FF;flex-shrink:0;margin-top:9px\"><\/div><div class=\"kb\" style=\"font-size:18px\"><strong>Scope validation.<\/strong> Requests are validated against the user's role and the capability's configured scope, out-of-scope requests are declined before retrieval.<\/div><\/div>\n          <div style=\"display:flex;gap:14px;align-items:flex-start\"><div style=\"width:8px;height:8px;border-radius:50%;background:#0066FF;flex-shrink:0;margin-top:9px\"><\/div><div class=\"kb\" style=\"font-size:18px\"><strong>Context minimization.<\/strong> Only the data needed to answer the request is assembled into model context, bounded by masking rules and metadata-only flags.<\/div><\/div>\n        <\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:40px 36px\">\n        <div style=\"font:700 14px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0066FF;margin-bottom:24px\">Outbound, Inference &amp; Output Controls<\/div>\n        <div style=\"display:flex;flex-direction:column;gap:16px\">\n          <div style=\"display:flex;gap:14px;align-items:flex-start\"><div style=\"width:8px;height:8px;border-radius:50%;background:#0066FF;flex-shrink:0;margin-top:9px\"><\/div><div class=\"kb\" style=\"font-size:18px\"><strong>Enterprise inference endpoints.<\/strong> Inference runs on Google Cloud enterprise endpoints under terms prohibiting training use; processing is transient.<\/div><\/div>\n          <div style=\"display:flex;gap:14px;align-items:flex-start\"><div style=\"width:8px;height:8px;border-radius:50%;background:#0066FF;flex-shrink:0;margin-top:9px\"><\/div><div class=\"kb\" style=\"font-size:18px\"><strong>Output policy checks.<\/strong> Responses are validated before delivery: evidence links present, confidence computed, and policy-restricted content withheld.<\/div><\/div>\n          <div style=\"display:flex;gap:14px;align-items:flex-start\"><div style=\"width:8px;height:8px;border-radius:50%;background:#0066FF;flex-shrink:0;margin-top:9px\"><\/div><div class=\"kb\" style=\"font-size:18px\"><strong>Action gating.<\/strong> Any output that proposes an action routes through the autonomy framework, recommendation, approval gate, or policy validation, never direct execution from raw model output.<\/div><\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n    <div style=\"margin-top:32px;padding:22px 30px;background:#fff;border:1px solid #e7eaef;border-radius:12px;max-width:1700px\">\n      <div style=\"font:300 18px/1.6 'Inter',sans-serif;color:#3f4d62\"><strong style=\"color:#101c2f;font-weight:700\">Design stance:<\/strong> the model is treated as a powerful but untrusted component. Everything it receives is filtered; everything it produces is checked. Security does not depend on the model behaving well.<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Security Architecture, Confidential<\/span><span>6 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 07 ENCRYPTION & DATA PROTECTION -->\n<section data-label=\"07 Encryption\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Encryption &amp; Data Protection<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:48px\">Protection follows the data through the AI path<\/div>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:28px;max-width:1700px;margin-bottom:36px\">\n      <div class=\"card\" style=\"padding:36px 32px\">\n        <div class=\"kl\">In Transit<\/div>\n        <div class=\"kt\">TLS everywhere<\/div>\n        <div class=\"kb\">All traffic between user surfaces, orchestration, retrieval, and inference endpoints is TLS-encrypted. No plaintext hops, including internal service-to-service calls in the AI path.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:36px 32px\">\n        <div class=\"kl\">At Rest<\/div>\n        <div class=\"kt\">Encrypted stores, tenant keys<\/div>\n        <div class=\"kb\">Transactional data, retrieval indexes, knowledge stores, and audit logs are encrypted at rest. Key management follows the Business Network platform's established KMS practices.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:36px 32px\">\n        <div class=\"kl\">In Use<\/div>\n        <div class=\"kt\">Minimized, masked, transient<\/div>\n        <div class=\"kb\">Model context is assembled per request, bounded by masking and minimization rules, and not persisted after the response. The inference provider retains nothing for training.<\/div>\n      <\/div>\n    <\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:1700px\">\n      <div style=\"padding:24px 30px;background:#f6f7f7;border-radius:12px\"><div style=\"font:700 17px/1.3 'Inter',sans-serif;color:#101c2f;margin-bottom:8px\">Field-level masking<\/div><div style=\"font:300 17px/1.55 'Inter',sans-serif;color:#3f4d62\">Designated sensitive fields (pricing, identifiers, regulated elements) are masked before context assembly, invisible to the model and to AI outputs.<\/div><\/div>\n      <div style=\"padding:24px 30px;background:#f6f7f7;border-radius:12px\"><div style=\"font:700 17px/1.3 'Inter',sans-serif;color:#101c2f;margin-bottom:8px\">Metadata-only flows<\/div><div style=\"font:300 17px/1.55 'Inter',sans-serif;color:#3f4d62\">For regulated document categories, AI reasons over envelope metadata only, status, partner, timestamps, error codes, with document content never entering the AI path.<\/div><\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Security Architecture, Confidential<\/span><span>7 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 08 POLICY-AWARE ORCHESTRATION -->\n<section data-label=\"08 Policy-Aware Orchestration\">\n<div style=\"position:absolute;inset:0;background:#f6f7f7;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Policy-Aware Orchestration<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:24px;max-width:1400px\">Between the model and your operation sits the orchestration layer<\/div>\n    <div style=\"font:300 22px/1.55 'Inter',sans-serif;color:#3f4d62;max-width:1400px;margin-bottom:44px\">The model proposes. The orchestration layer disposes, against your policies, every time.<\/div>\n    <div style=\"background:#fff;border:1px solid #e7eaef;border-radius:16px;padding:44px 48px;max-width:1728px\">\n      <div style=\"display:grid;grid-template-columns:1fr 80px 1.4fr 80px 1fr;align-items:center\">\n        <div style=\"text-align:center\">\n          <div style=\"background:#101c2f;border-radius:14px;padding:28px 24px\">\n            <div style=\"font:800 22px/1.2 'Inter','Inter',sans-serif;color:#fff;margin-bottom:8px\">Model Output<\/div>\n            <div style=\"font:300 15px/1.5 'Inter',sans-serif;color:rgba(255,255,255,0.65)\">Proposed action: retry 38 failed transactions for Partner X<\/div>\n          <\/div>\n        <\/div>\n        <div class=\"flow-arrow\">→<\/div>\n        <div>\n          <div style=\"background:#f0f4ff;border:2px solid #0066FF;border-radius:14px;padding:28px 32px\">\n            <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0066FF;margin-bottom:16px;text-align:center\">Policy Validation Gate<\/div>\n            <div style=\"display:flex;flex-direction:column;gap:10px\">\n              <div style=\"display:flex;justify-content:space-between;font:400 16px/1.4 'Inter',sans-serif;color:#101c2f\"><span>Autonomy level permits action?<\/span><span style=\"color:#156615;font-weight:700\">L3 ✓<\/span><\/div>\n              <div style=\"display:flex;justify-content:space-between;font:400 16px/1.4 'Inter',sans-serif;color:#101c2f\"><span>Within transaction count limit?<\/span><span style=\"color:#156615;font-weight:700\">38 ≤ 50 ✓<\/span><\/div>\n              <div style=\"display:flex;justify-content:space-between;font:400 16px/1.4 'Inter',sans-serif;color:#101c2f\"><span>Partner on approved list?<\/span><span style=\"color:#156615;font-weight:700\">✓<\/span><\/div>\n              <div style=\"display:flex;justify-content:space-between;font:400 16px/1.4 'Inter',sans-serif;color:#101c2f\"><span>Within change window?<\/span><span style=\"color:#156615;font-weight:700\">✓<\/span><\/div>\n              <div style=\"display:flex;justify-content:space-between;font:400 16px/1.4 'Inter',sans-serif;color:#101c2f\"><span>Rollback snapshot available?<\/span><span style=\"color:#156615;font-weight:700\">✓<\/span><\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n        <div class=\"flow-arrow\">→<\/div>\n        <div style=\"display:flex;flex-direction:column;gap:16px\">\n          <div style=\"background:#d9efd9;border-radius:12px;padding:20px 24px\"><div style=\"font:700 15px/1.3 'Inter',sans-serif;color:#156615;margin-bottom:6px\">All checks pass<\/div><div style=\"font:300 15px/1.5 'Inter',sans-serif;color:#3f4d62\">Execute · log · notify owner<\/div><\/div>\n          <div style=\"background:#f6d7d4;border-radius:12px;padding:20px 24px\"><div style=\"font:700 15px/1.3 'Inter',sans-serif;color:#b11206;margin-bottom:6px\">Any check fails<\/div><div style=\"font:300 15px/1.5 'Inter',sans-serif;color:#3f4d62\">Block · escalate to human with reason · log<\/div><\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n    <div style=\"margin-top:28px;font:300 18px/1.5 'Inter',sans-serif;color:#3f4d62;max-width:1700px\">Policies are customer-defined, versioned, and auditable. The gate executes <strong style=\"color:#101c2f;font-weight:700\">every time<\/strong>, there is no fast path that bypasses validation.<\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Security Architecture, Confidential<\/span><span>8 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 09 API GOVERNANCE -->\n<section data-label=\"09 API & Integration Governance\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">API &amp; Integration Governance<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:48px\">The AI's hands are governed APIs, not direct system access<\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:28px;max-width:1700px;margin-bottom:36px\">\n      <div class=\"card\" style=\"padding:36px 32px\">\n        <div class=\"kl\">Capability Allow-Lists<\/div>\n        <div class=\"kt\">Enumerated, not open-ended<\/div>\n        <div class=\"kb\">AI agents can invoke only the specific platform APIs registered to their capability. There is no general-purpose execution surface, an agent's possible actions are enumerable in advance for your security review.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:36px 32px\">\n        <div class=\"kl\">Scoped Service Identity<\/div>\n        <div class=\"kt\">Least-privilege execution<\/div>\n        <div class=\"kb\">Where automation executes (L3+), it runs under scoped service identities with least-privilege grants, auditable separately from human activity and revocable independently.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:36px 32px\">\n        <div class=\"kl\">Rate &amp; Blast-Radius Limits<\/div>\n        <div class=\"kt\">Bounded impact per window<\/div>\n        <div class=\"kb\">Action throughput is rate-limited and volume-capped per policy (e.g., max transactions per recovery window), bounding worst-case impact even within approved authority.<\/div>\n      <\/div>\n    <\/div>\n    <div style=\"padding:22px 30px;background:#f0f4ff;border-radius:12px;border-left:4px solid #0066FF;max-width:1700px\">\n      <div style=\"font:300 19px/1.6 'Inter',sans-serif;color:#3f4d62\">For security review purposes: request the capability-to-API map for each agent in scope. It is finite, documented, and the right artifact for threat modeling, <strong style=\"color:#101c2f;font-weight:700\">you can review what the AI can do, not just what it's expected to do.<\/strong><\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Security Architecture, Confidential<\/span><span>9 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 10 AUDIT LOGGING -->\n<section data-label=\"10 Audit Logging\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Audit Logging<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:44px\">What your SOC and audit teams get<\/div>\n    <div style=\"border:1px solid #e7eaef;border-radius:16px;overflow:hidden;max-width:1728px;margin-bottom:32px\">\n      <div style=\"display:grid;grid-template-columns:280px 1fr 420px;background:#101c2f;padding:16px 32px\">\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Event class<\/div>\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Captured fields<\/div>\n        <div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65)\">Security use<\/div>\n      <\/div>\n      <div style=\"display:grid;grid-template-columns:280px 1fr 420px;padding:17px 32px;border-bottom:1px solid #f6f7f7\"><div style=\"font:700 17px/1.4 'Inter',sans-serif;color:#101c2f\">AI query<\/div><div style=\"font:300 16px/1.5 'Inter',sans-serif;color:#3f4d62\">Identity, role, timestamp, surface, query text, capability invoked<\/div><div style=\"font:300 16px/1.5 'Inter',sans-serif;color:#0033CF\">Usage monitoring, insider-risk review<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:280px 1fr 420px;padding:17px 32px;border-bottom:1px solid #f6f7f7\"><div style=\"font:700 17px/1.4 'Inter',sans-serif;color:#101c2f\">Data retrieval<\/div><div style=\"font:300 16px/1.5 'Inter',sans-serif;color:#3f4d62\">Records accessed, permission scope applied, masking/metadata flags in effect<\/div><div style=\"font:300 16px/1.5 'Inter',sans-serif;color:#0033CF\">Access certification, DLP investigation<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:280px 1fr 420px;padding:17px 32px;border-bottom:1px solid #f6f7f7\"><div style=\"font:700 17px/1.4 'Inter',sans-serif;color:#101c2f\">Inference call<\/div><div style=\"font:300 16px/1.5 'Inter',sans-serif;color:#3f4d62\">Model endpoint, context size class, response status, latency<\/div><div style=\"font:300 16px/1.5 'Inter',sans-serif;color:#0033CF\">Subprocessor oversight, anomaly detection<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:280px 1fr 420px;padding:17px 32px;border-bottom:1px solid #f6f7f7\"><div style=\"font:700 17px/1.4 'Inter',sans-serif;color:#101c2f\">Response<\/div><div style=\"font:300 16px/1.5 'Inter',sans-serif;color:#3f4d62\">Answer delivered, evidence links, confidence score, output checks applied<\/div><div style=\"font:300 16px/1.5 'Inter',sans-serif;color:#0033CF\">Quality review, incident reconstruction<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:280px 1fr 420px;padding:17px 32px;border-bottom:1px solid #f6f7f7\"><div style=\"font:700 17px/1.4 'Inter',sans-serif;color:#101c2f\">Action lifecycle<\/div><div style=\"font:300 16px/1.5 'Inter',sans-serif;color:#3f4d62\">Proposed action, policy checks &amp; results, approver identity, execution, rollback state<\/div><div style=\"font:300 16px/1.5 'Inter',sans-serif;color:#0033CF\">Change audit, SOX evidence, post-incident review<\/div><\/div>\n      <div style=\"display:grid;grid-template-columns:280px 1fr 420px;padding:17px 32px\"><div style=\"font:700 17px/1.4 'Inter',sans-serif;color:#101c2f\">Configuration change<\/div><div style=\"font:300 16px/1.5 'Inter',sans-serif;color:#3f4d62\">Autonomy level changes, policy versions, capability enablement, by whom<\/div><div style=\"font:300 16px/1.5 'Inter',sans-serif;color:#0033CF\">Governance attestation, privilege review<\/div><\/div>\n    <\/div>\n    <div style=\"display:flex;gap:24px;max-width:1728px\">\n      <div style=\"flex:1;padding:20px 28px;background:#f6f7f7;border-radius:12px;font:300 17px/1.55 'Inter',sans-serif;color:#3f4d62\"><strong style=\"color:#101c2f;font-weight:700\">Retention:<\/strong> per your enterprise policy<\/div>\n      <div style=\"flex:1;padding:20px 28px;background:#f6f7f7;border-radius:12px;font:300 17px/1.55 'Inter',sans-serif;color:#3f4d62\"><strong style=\"color:#101c2f;font-weight:700\">Access:<\/strong> query-able by your teams<\/div>\n      <div style=\"flex:1;padding:20px 28px;background:#f6f7f7;border-radius:12px;font:300 17px/1.55 'Inter',sans-serif;color:#3f4d62\"><strong style=\"color:#101c2f;font-weight:700\">Export:<\/strong> SIEM-consumable extracts<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Security Architecture, Confidential<\/span><span>10 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 11 THREAT SCENARIOS -->\n<section data-label=\"11 Threat Scenarios\">\n<div style=\"position:absolute;inset:0;background:#f6f7f7;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Threat Scenarios<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:44px\">The questions red teams ask, and the layered answers<\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:1728px\">\n      <div class=\"card\" style=\"padding:30px 32px\">\n        <div style=\"font:700 19px/1.35 'Inter',sans-serif;color:#101c2f;margin-bottom:12px\">\"What if a user prompt-injects the agent?\"<\/div>\n        <div class=\"kb\">Injection screening on input; retrieval already bounded by the user's own RBAC scope (nothing above their privilege exists in context); output policy checks; action gating through the autonomy framework. A successful injection earns the attacker their own permissions.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:30px 32px\">\n        <div style=\"font:700 19px/1.35 'Inter',sans-serif;color:#101c2f;margin-bottom:12px\">\"What if the model returns a harmful action?\"<\/div>\n        <div class=\"kb\">Raw model output cannot execute anything. Proposed actions route through policy validation, autonomy level, limits, allow-lists, change windows, and fail closed to human escalation. The model has no direct system access.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:30px 32px\">\n        <div style=\"font:700 19px/1.35 'Inter',sans-serif;color:#101c2f;margin-bottom:12px\">\"What if credentials of an AI service identity leak?\"<\/div>\n        <div class=\"kb\">Service identities are least-privilege, capability-scoped, rate-limited, and independently revocable. Their activity is logged separately from human activity, making anomalous use detectable in your SIEM.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:30px 32px\">\n        <div style=\"font:700 19px/1.35 'Inter',sans-serif;color:#101c2f;margin-bottom:12px\">\"What if another tenant tries to reach our data through AI?\"<\/div>\n        <div class=\"kb\">There is no shared retrieval surface to attack: indexes, knowledge stores, and session context are partitioned per tenant at the infrastructure layer, and the model retains nothing across sessions.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:30px 32px\">\n        <div style=\"font:700 19px/1.35 'Inter',sans-serif;color:#101c2f;margin-bottom:12px\">\"What if automation misbehaves at scale?\"<\/div>\n        <div class=\"kb\">Rate limits and volume caps bound blast radius per window; rollback snapshots precede changes; operators can pause or revert workflows instantly; exception-rate monitoring alerts on drift before it compounds.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:30px 32px\">\n        <div style=\"font:700 19px/1.35 'Inter',sans-serif;color:#101c2f;margin-bottom:12px\">\"How do we investigate an AI-related incident?\"<\/div>\n        <div class=\"kb\">The full request lifecycle is reconstructable from audit logs, identity, retrieval scope, model call, response, action, approver. Incident response uses your existing playbooks; AI adds log sources, not blind spots.<\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Security Architecture, Confidential<\/span><span>11 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 12 CLOSE -->\n<section data-label=\"12 Close\">\n<div style=\"position:absolute;inset:0;background:#101c2f;overflow:hidden\">\n  <div style=\"position:absolute;left:-280px;bottom:-280px;width:900px;height:900px;border-radius:50%;border:1px solid rgba(0,102,255,0.1)\"><\/div>\n  <img class=\"logo\" src=\"__LOGO_NEG__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;max-width:1450px;padding:0 96px\">\n    <div style=\"width:72px;height:5px;background:#0066FF;border-radius:3px;margin:0 auto 44px\"><\/div>\n    <div style=\"font:900 58px/1.12 'Inter','Inter',sans-serif;color:#fff;letter-spacing:-0.025em;margin-bottom:36px\">Security does not depend on<br>the model behaving well.<\/div>\n    <div style=\"font:300 24px/1.6 'Inter',sans-serif;color:rgba(255,255,255,0.68);max-width:1100px;margin:0 auto 56px\">Identity-bound requests. Permission-filtered retrieval. Tenant-partitioned infrastructure. Policy-gated actions. Full-lifecycle audit. The model is one component inside a control architecture your security team can verify, capability maps, audit extracts, and threat-model documentation are available for review.<\/div>\n    <div style=\"font:800 26px/1.4 'Inter','Inter',sans-serif;color:#0066FF\">Governed operational intelligence, secured by architecture.<\/div>\n  <\/div>\n  <div class=\"foot d\"><span>CONFIDENTIAL, FOR SECURITY &amp; ARCHITECTURE REVIEW<\/span><span>12 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<\/deck-stage>\n<script>window.addEventListener(\"error\",function(e){if(e.message&&e.message.indexOf(\"ResizeObserver loop\")!==-1){e.stopImmediatePropagation();e.preventDefault();}},true);<\/script>\n__DECKSTAGE__\n<\/body>\n<\/html>\n","s2/AI-Autonomy-Maturity-Model":"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n__FONTS__\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>AI Autonomy Maturity Model, OpenText Trading Grid with Aviator<\/title>\n__DOCCSS__\n<style>\n.lv{border:1px solid var(--ln);border-radius:14px;margin-bottom:24px;overflow:hidden;break-inside:avoid}\n.lv-h{display:flex;align-items:center;gap:20px;padding:22px 30px}\n.lv-h .badge{font:900 26px/1 'Inter','Inter',sans-serif;color:#fff;background:rgba(255,255,255,0.14);border-radius:10px;padding:12px 16px;flex-shrink:0}\n.lv-h .t{font:800 24px/1.2 'Inter','Inter',sans-serif;color:#fff;letter-spacing:-0.01em}\n.lv-h .s{font:300 15px/1.4 'Inter',sans-serif;color:rgba(255,255,255,0.72);margin-top:4px}\n.lv-b{padding:24px 30px}\n.lv-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px 26px}\n.lv-cell .k{font:700 11px/1 'Inter',sans-serif;letter-spacing:0.12em;text-transform:uppercase;color:var(--bl);margin-bottom:8px}\n.lv-cell .v{font:300 15px/1.65 'Inter',sans-serif;color:var(--sl)}\n.gate{display:flex;gap:14px;align-items:flex-start;margin-top:18px;padding:16px 20px;background:var(--lt);border-radius:10px}\n.gate .k{font:700 11px/1.7 'Inter',sans-serif;letter-spacing:0.12em;text-transform:uppercase;color:var(--sl);flex-shrink:0;padding-top:2px}\n.gate .v{font:400 14px/1.6 'Inter',sans-serif;color:var(--dk)}\n.ladder{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;align-items:end;margin:28px 0 36px}\n.ladder>div{border-radius:10px 10px 0 0;padding:14px 12px 12px;text-align:center}\n.ladder .ln2{font:900 20px/1 'Inter','Inter',sans-serif;color:#fff;margin-bottom:6px}\n.ladder .lt2{font:700 12px/1.3 'Inter',sans-serif;color:rgba(255,255,255,0.85);letter-spacing:0.04em;text-transform:uppercase}\n<\/style>\n<\/head>\n<body>\n<div class=\"page\">\n\n  <div class=\"doc-header\">\n    <div>\n      <div class=\"kicker\">OpenText Business Network · Trading Grid with Aviator<\/div>\n      <h1>AI Autonomy Maturity Model<\/h1>\n      <div class=\"sub\">The graduated autonomy framework (L0 to L4): definitions, operational examples, risk levels, and governance implications.<\/div>\n    <\/div>\n    <div style=\"flex-shrink:0\">\n      <img src=\"__LOGO_NEG__\" alt=\"opentext\">\n      <div style=\"display:flex;gap:8px;justify-content:flex-end\">\n        <span class=\"tag tag-b\">Stage 2, Decision<\/span>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"doc-body\">\n\n    <p class=\"lead\">Autonomy is not a switch, it is a maturity ladder climbed one workflow at a time, with a governance gate at each rung. This model gives governance boards a shared vocabulary for deciding <strong>how much the AI may do, where, and under what evidence.<\/strong><\/p>\n\n    <div class=\"ladder\">\n      <div style=\"background:#0033CF;height:80px\"><div class=\"ln2\">L0<\/div><div class=\"lt2\">Observe<\/div><\/div>\n      <div style=\"background:#0066FF;height:110px\"><div class=\"ln2\">L1<\/div><div class=\"lt2\">Recommend<\/div><\/div>\n      <div style=\"background:#3a7d44;height:140px\"><div class=\"ln2\">L2<\/div><div class=\"lt2\">Approve<\/div><\/div>\n      <div style=\"background:#8a5c00;height:170px\"><div class=\"ln2\">L3<\/div><div class=\"lt2\">Policy-Automate<\/div><\/div>\n      <div style=\"background:#b11206;height:200px\"><div class=\"ln2\">L4<\/div><div class=\"lt2\">Controlled Autonomy<\/div><\/div>\n    <\/div>\n\n    <div class=\"section-label\">The Five Levels<\/div>\n    <div class=\"ar\"><\/div>\n\n    <div class=\"lv\">\n      <div class=\"lv-h\" style=\"background:#0033CF\"><span class=\"badge\">L0<\/span><div><div class=\"t\">Observe<\/div><div class=\"s\">AI provides visibility and analysis only, no recommendations, no actions<\/div><\/div><\/div>\n      <div class=\"lv-b\">\n        <div class=\"lv-grid\">\n          <div class=\"lv-cell\"><div class=\"k\">Operational examples<\/div><div class=\"v\">Natural language transaction search · payload explanation · inline explanation of dashboards, charts, and alerts · operational summaries that describe (not advise)<\/div><\/div>\n          <div class=\"lv-cell\"><div class=\"k\">Risk level<\/div><div class=\"v\"><strong>Minimal.<\/strong> Read-only, permission-bounded retrieval. Worst case is an unhelpful answer, caught by evidence links and analyst verification.<\/div><\/div>\n          <div class=\"lv-cell\"><div class=\"k\">Governance implications<\/div><div class=\"v\">Suitable for evaluation and early production without new governance machinery. Establish audit log review and accuracy spot-checks as the baseline practice.<\/div><\/div>\n        <\/div>\n        <div class=\"gate\"><span class=\"k\">Entry gate<\/span><span class=\"v\">Standard security review (identity, isolation, data scope) plus DPA confirmation. Most organizations can authorize L0 within their existing approval frameworks.<\/span><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"lv\">\n      <div class=\"lv-h\" style=\"background:#0066FF\"><span class=\"badge\">L1<\/span><div><div class=\"t\">Recommend<\/div><div class=\"s\">AI surfaces insights and recommendations with evidence, humans make all decisions<\/div><\/div><\/div>\n      <div class=\"lv-b\">\n        <div class=\"lv-grid\">\n          <div class=\"lv-cell\"><div class=\"k\">Operational examples<\/div><div class=\"v\">Root-cause analysis with suggested fixes · anomaly alerts with recommended responses · partner degradation warnings · SLA-risk flags with mitigation options<\/div><\/div>\n          <div class=\"lv-cell\"><div class=\"k\">Risk level<\/div><div class=\"v\"><strong>Low.<\/strong> Advisory only. Risk concentrates in over-trust of recommendations, mitigated by confidence scoring, evidence links, and analyst verification habits.<\/div><\/div>\n          <div class=\"lv-cell\"><div class=\"k\">Governance implications<\/div><div class=\"v\">Begin measuring recommendation acceptance rate and accuracy against outcomes. These metrics become the evidence base for any L2 decision.<\/div><\/div>\n        <\/div>\n        <div class=\"gate\"><span class=\"k\">Entry gate<\/span><span class=\"v\">L0 operating cleanly (audit reviews unremarkable) + defined accuracy measurement plan + named workflow owner.<\/span><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"lv\">\n      <div class=\"lv-h\" style=\"background:#3a7d44\"><span class=\"badge\">L2<\/span><div><div class=\"t\">Human Approval<\/div><div class=\"s\">AI proposes specific actions, each executes only on explicit, named human approval<\/div><\/div><\/div>\n      <div class=\"lv-b\">\n        <div class=\"lv-grid\">\n          <div class=\"lv-cell\"><div class=\"k\">Operational examples<\/div><div class=\"v\">Proposed partner configuration corrections · proposed document reprocessing · drafted support responses pending analyst send · proposed mapping fixes<\/div><\/div>\n          <div class=\"lv-cell\"><div class=\"k\">Risk level<\/div><div class=\"v\"><strong>Moderate, gated.<\/strong> Action risk exists but every action carries a named approver. Watch for \"approval fatigue\", rubber-stamping erodes the gate's value.<\/div><\/div>\n          <div class=\"lv-cell\"><div class=\"k\">Governance implications<\/div><div class=\"v\">Approval workflows must integrate change control. Track approval/rejection rates and time-to-approve; audit samples should verify approvals are substantive.<\/div><\/div>\n        <\/div>\n        <div class=\"gate\"><span class=\"k\">Entry gate<\/span><span class=\"v\">L1 evidence: recommendation accuracy meets the threshold your board set (e.g., ≥95% on sampled reviews) + approval workflow defined + rollback procedure documented per action type.<\/span><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"lv\">\n      <div class=\"lv-h\" style=\"background:#8a5c00\"><span class=\"badge\">L3<\/span><div><div class=\"t\">Policy Automation<\/div><div class=\"s\">AI executes within customer-defined policy guardrails, exceptions escalate to humans<\/div><\/div><\/div>\n      <div class=\"lv-b\">\n        <div class=\"lv-grid\">\n          <div class=\"lv-cell\"><div class=\"k\">Operational examples<\/div><div class=\"v\">Automated transaction retry/recovery during declared outage windows · auto-triage and routing of inbound issues · scheduled operational reporting with distribution<\/div><\/div>\n          <div class=\"lv-cell\"><div class=\"k\">Risk level<\/div><div class=\"v\"><strong>Elevated, policy-bounded.<\/strong> Actions execute without per-action approval. Risk is bounded by policy limits (volume caps, partner lists, change windows) and rollback snapshots.<\/div><\/div>\n          <div class=\"lv-cell\"><div class=\"k\">Governance implications<\/div><div class=\"v\">Policy sets become governance artifacts: versioned, reviewed, attested. Exception-rate monitoring is mandatory, a rising exception rate is the early warning signal.<\/div><\/div>\n        <\/div>\n        <div class=\"gate\"><span class=\"k\">Entry gate<\/span><span class=\"v\">L2 history: high approval rate with low post-approval reversals + written policy set approved by governance board + tested rollback + defined exception-handling path.<\/span><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"lv\">\n      <div class=\"lv-h\" style=\"background:#b11206\"><span class=\"badge\">L4<\/span><div><div class=\"t\">Controlled Autonomy<\/div><div class=\"s\">AI operates autonomously within pre-approved boundaries, override and rollback always retained<\/div><\/div><\/div>\n      <div class=\"lv-b\">\n        <div class=\"lv-grid\">\n          <div class=\"lv-cell\"><div class=\"k\">Operational examples<\/div><div class=\"v\">Continuous 24/7 monitoring with bounded remediation · self-service onboarding guidance executing configuration steps within approved templates<\/div><\/div>\n          <div class=\"lv-cell\"><div class=\"k\">Risk level<\/div><div class=\"v\"><strong>Highest in the model, and still bounded.<\/strong> Boundaries, caps, and overrides remain. The distinguishing risk is accumulation: many small autonomous actions compounding unnoticed. Continuous KPI and drift monitoring addresses this.<\/div><\/div>\n          <div class=\"lv-cell\"><div class=\"k\">Governance implications<\/div><div class=\"v\">Standing oversight: quarterly governance review of autonomous activity, annual re-attestation of boundaries, and a defined kill-switch owner with tested procedures.<\/div><\/div>\n        <\/div>\n        <div class=\"gate\"><span class=\"k\">Entry gate<\/span><span class=\"v\">Sustained L3 operation with stable exception rates + board-level approval of the autonomy envelope + tested override/kill-switch + executive owner accountable for the workflow.<\/span><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"divider\"><\/div>\n\n    <h2 style=\"margin-top:0\">Principles for using the model<\/h2>\n    <ul class=\"fl\">\n      <li><strong>Levels are assigned per workflow, not per platform.<\/strong> Transaction search at L0 and outage recovery at L3 can, and should, coexist. Each workflow earns its level independently.<\/li>\n      <li><strong>Advancement requires evidence, not elapsed time.<\/strong> The gates above are evidence gates: accuracy metrics, approval histories, exception rates. A workflow that can't produce the evidence stays where it is.<\/li>\n      <li><strong>Reversion is always available and carries no penalty.<\/strong> Stepping a workflow down is an ordinary governance action, not an incident. Boards that know they can revert approve faster.<\/li>\n      <li><strong>Most value lives at L0 to L1.<\/strong> The majority of operational benefit, investigation speed, explanation, self-service, requires no action authority at all. Automation is the optimization, not the prerequisite.<\/li>\n      <li><strong>L4 is a destination few workflows need.<\/strong> Reserve controlled autonomy for high-volume, low-variance, well-instrumented workflows where the evidence is overwhelming.<\/li>\n    <\/ul>\n\n    <div class=\"dark-block\">\n      <div class=\"db-k\">For Governance Boards<\/div>\n      <div class=\"db-t\">Approve levels, not promises.<\/div>\n      <div class=\"db-b\">This model turns \"should we allow AI?\" into a sequence of small, evidence-based, reversible decisions, the kind enterprise governance is already good at making.<\/div>\n    <\/div>\n\n  <\/div>\n\n  <div class=\"doc-footer\">\n    <div>OpenText Business Network · Trading Grid with Aviator, Confidential<\/div>\n    <div>Stage 2, Decision · AI Autonomy Maturity Model · 2026<\/div>\n  <\/div>\n\n<\/div>\n<\/body>\n<\/html>\n","s2/Enterprise-AI-Risk-Matrix":"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n__FONTS__\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Enterprise AI Risk Matrix, OpenText Trading Grid with Aviator<\/title>\n__DOCCSS__\n<style>\n.page{max-width:1280px}\n.rm{width:100%;border-collapse:collapse;margin:8px 0 28px}\n.rm th{font:700 11px/1.4 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:var(--sl);text-align:left;padding:12px 12px;border-bottom:2px solid var(--ln);background:var(--lt)}\n.rm td{font:300 14px/1.55 'Inter',sans-serif;color:var(--sl);padding:14px 12px;border-bottom:1px solid var(--lt);vertical-align:top}\n.rm td.cap{font-weight:700;color:var(--dk);min-width:150px}\n.pill{display:inline-block;padding:4px 12px;border-radius:999px;font:700 11px/1 'Inter',sans-serif;letter-spacing:0.05em;text-transform:uppercase;white-space:nowrap}\n.p-low{background:#d9efd9;color:#156615}\n.p-med{background:#fdf6e8;color:#8a5c00}\n.p-high{background:#f6d7d4;color:#b11206}\n.p-min{background:#e8efff;color:#0033CF}\n.leg{display:flex;gap:14px;align-items:center;margin-bottom:24px;flex-wrap:wrap}\n.leg span{font:300 14px/1 'Inter',sans-serif;color:var(--sl)}\n<\/style>\n<\/head>\n<body>\n<div class=\"page\">\n\n  <div class=\"doc-header\">\n    <div>\n      <div class=\"kicker\">OpenText Business Network · Trading Grid with Aviator<\/div>\n      <h1>Enterprise AI Risk Matrix<\/h1>\n      <div class=\"sub\">Capability-by-capability mapping of operational impact, privacy risk, legal exposure, automation level, and mitigating controls.<\/div>\n    <\/div>\n    <div style=\"flex-shrink:0\">\n      <img src=\"__LOGO_NEG__\" alt=\"opentext\">\n      <div style=\"display:flex;gap:8px;justify-content:flex-end\">\n        <span class=\"tag tag-b\">Stage 2, Decision<\/span>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"doc-body\">\n\n    <p class=\"lead\">This matrix supports governance-board risk review. Ratings reflect each capability operating at its <strong>typical deployment level<\/strong> with platform controls active; the final column lists the controls that hold the rating where it is.<\/p>\n\n    <div class=\"leg\">\n      <span class=\"pill p-min\">Minimal<\/span>\n      <span class=\"pill p-low\">Low<\/span>\n      <span class=\"pill p-med\">Medium<\/span>\n      <span class=\"pill p-high\">Elevated<\/span>\n      <span>, ratings assume platform controls active; autonomy level shown is the typical deployment posture<\/span>\n    <\/div>\n\n    <div class=\"section-label\">Capability Risk Map<\/div>\n    <div class=\"ar\"><\/div>\n\n    <table class=\"rm\">\n      <thead>\n        <tr>\n          <th style=\"width:160px\">Capability<\/th>\n          <th>Operational impact if wrong<\/th>\n          <th style=\"width:110px\">Privacy risk<\/th>\n          <th style=\"width:110px\">Legal exposure<\/th>\n          <th style=\"width:130px\">Automation level<\/th>\n          <th style=\"width:300px\">Mitigation controls<\/th>\n        <\/tr>\n      <\/thead>\n      <tbody>\n        <tr>\n          <td class=\"cap\">Transaction search &amp; retrieval<\/td>\n          <td>Analyst follows a wrong result set; time lost. No system change occurs.<\/td>\n          <td><span class=\"pill p-low\">Low<\/span><\/td>\n          <td><span class=\"pill p-min\">Minimal<\/span><\/td>\n          <td><span class=\"pill p-min\">L0<\/span><\/td>\n          <td>RBAC-scoped retrieval · evidence-linked results · tenant isolation · full query audit<\/td>\n        <\/tr>\n        <tr>\n          <td class=\"cap\">Payload analysis &amp; explanation<\/td>\n          <td>Misinterpretation could misdirect first-line investigation; specialist path remains available.<\/td>\n          <td><span class=\"pill p-med\">Medium<\/span><\/td>\n          <td><span class=\"pill p-low\">Low<\/span><\/td>\n          <td><span class=\"pill p-min\">L0<\/span><\/td>\n          <td>Field masking · metadata-only mode for regulated flows · drill-down to raw payload · confidence scoring<\/td>\n        <\/tr>\n        <tr>\n          <td class=\"cap\">Error root-cause analysis<\/td>\n          <td>Wrong diagnosis delays resolution or misroutes escalation; humans apply all fixes.<\/td>\n          <td><span class=\"pill p-low\">Low<\/span><\/td>\n          <td><span class=\"pill p-low\">Low<\/span><\/td>\n          <td><span class=\"pill p-low\">L1<\/span><\/td>\n          <td>Multi-signal evidence cited per conclusion · confidence-aware human handoff · acceptance-rate tracking<\/td>\n        <\/tr>\n        <tr>\n          <td class=\"cap\">Knowledge &amp; support assistance<\/td>\n          <td>Inaccurate guidance could propagate a wrong procedure; escalation valve limits exposure.<\/td>\n          <td><span class=\"pill p-med\">Medium<\/span><\/td>\n          <td><span class=\"pill p-low\">Low<\/span><\/td>\n          <td><span class=\"pill p-low\">L0 to L1<\/span><\/td>\n          <td>Tenant-isolated runbook retrieval · source citation · low-confidence auto-escalation with context<\/td>\n        <\/tr>\n        <tr>\n          <td class=\"cap\">Trading partner insights<\/td>\n          <td>Skewed partner assessment could misinform relationship decisions made by humans.<\/td>\n          <td><span class=\"pill p-med\">Medium<\/span><\/td>\n          <td><span class=\"pill p-med\">Medium<\/span><\/td>\n          <td><span class=\"pill p-low\">L1<\/span><\/td>\n          <td>Drillable evidence · partner-data access controls · human-only external communication<\/td>\n        <\/tr>\n        <tr>\n          <td class=\"cap\">Forecasting &amp; anomaly detection<\/td>\n          <td>False positives consume attention; false negatives delay detection vs. today's baseline (no detection).<\/td>\n          <td><span class=\"pill p-low\">Low<\/span><\/td>\n          <td><span class=\"pill p-min\">Minimal<\/span><\/td>\n          <td><span class=\"pill p-low\">L1<\/span><\/td>\n          <td>Tenant-local training data · customer-tunable thresholds · alert-only posture · accuracy review cadence<\/td>\n        <\/tr>\n        <tr>\n          <td class=\"cap\">SLA monitoring &amp; summaries<\/td>\n          <td>A missed risk flag returns the team to the reactive status quo; summaries cite source events.<\/td>\n          <td><span class=\"pill p-low\">Low<\/span><\/td>\n          <td><span class=\"pill p-low\">Low<\/span><\/td>\n          <td><span class=\"pill p-low\">L1<\/span><\/td>\n          <td>Source-event citation · distribution controls · KPI baseline comparison<\/td>\n        <\/tr>\n        <tr>\n          <td class=\"cap\">Proposed configuration changes<\/td>\n          <td>A bad change could disrupt a partner flow, gated by named human approval per action.<\/td>\n          <td><span class=\"pill p-low\">Low<\/span><\/td>\n          <td><span class=\"pill p-med\">Medium<\/span><\/td>\n          <td><span class=\"pill p-med\">L2<\/span><\/td>\n          <td>Explicit approval per action · prior-state snapshot · change-window enforcement · approver audit identity<\/td>\n        <\/tr>\n        <tr>\n          <td class=\"cap\">Automated transaction recovery<\/td>\n          <td>Erroneous retries at volume could duplicate or delay transactions within the bounded window.<\/td>\n          <td><span class=\"pill p-low\">Low<\/span><\/td>\n          <td><span class=\"pill p-med\">Medium<\/span><\/td>\n          <td><span class=\"pill p-med\">L3<\/span><\/td>\n          <td>Policy guardrails (volume caps, partner lists, windows) · exception escalation · rollback snapshots · rate limits<\/td>\n        <\/tr>\n        <tr>\n          <td class=\"cap\">Continuous monitoring with bounded remediation<\/td>\n          <td>Compounding small autonomous actions, the accumulation risk unique to standing autonomy.<\/td>\n          <td><span class=\"pill p-med\">Medium<\/span><\/td>\n          <td><span class=\"pill p-med\">Medium<\/span><\/td>\n          <td><span class=\"pill p-high\">L4<\/span><\/td>\n          <td>Pre-approved action envelope · drift &amp; exception-rate monitoring · kill-switch with named owner · quarterly board review<\/td>\n        <\/tr>\n      <\/tbody>\n    <\/table>\n\n    <h2>How to use this matrix in governance review<\/h2>\n    <ul class=\"fl\">\n      <li><strong>Approve by row, not by platform.<\/strong> Each capability can be enabled, restricted, or deferred independently, the matrix is a menu, not a bundle.<\/li>\n      <li><strong>Ratings move with controls.<\/strong> Disabling masking raises payload-analysis privacy risk; tightening policy caps lowers L3 exposure. Treat the mitigation column as the lever.<\/li>\n      <li><strong>Compare against the manual baseline.<\/strong> Several risks (missed anomalies, slow diagnosis) exist today at higher severity without AI, evaluate net risk, not absolute risk.<\/li>\n      <li><strong>Pair with the Autonomy Maturity Model.<\/strong> The automation-level column maps directly to L0 to L4 gates; a capability's row is the starting point for its gate review.<\/li>\n    <\/ul>\n\n    <div class=\"dark-block\">\n      <div class=\"db-k\">Reading the Matrix<\/div>\n      <div class=\"db-t\">No capability requires accepting unbounded risk. Every elevated rating is paired with the control that bounds it.<\/div>\n      <div class=\"db-b\">That pairing, risk named, control named, is what governance boards should demand from any AI vendor. We built the matrix to that standard.<\/div>\n    <\/div>\n\n  <\/div>\n\n  <div class=\"doc-footer\">\n    <div>OpenText Business Network · Trading Grid with Aviator, Confidential<\/div>\n    <div>Stage 2, Decision · Enterprise AI Risk Matrix · 2026<\/div>\n  <\/div>\n\n<\/div>\n<\/body>\n<\/html>\n","s2/AI-Vendor-Trust-Overview":"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n__FONTS__\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>AI Vendor Trust Overview, OpenText Trading Grid with Aviator<\/title>\n__DOCCSS__\n<style>\n.tp{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:36px}\n.tp-card{border:1px solid var(--ln);border-radius:14px;padding:26px 28px;box-shadow:0 8px 24px rgba(16,28,47,0.07);break-inside:avoid}\n.tp-card .k{font:700 12px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:var(--bl);margin-bottom:10px}\n.tp-card .t{font:800 19px/1.25 'Inter','Inter',sans-serif;color:var(--dk);margin-bottom:10px}\n.tp-card .b{font:300 15px/1.65 'Inter',sans-serif;color:var(--sl)}\n<\/style>\n<\/head>\n<body>\n<div class=\"page\">\n\n  <div class=\"doc-header\">\n    <div>\n      <div class=\"kicker\">OpenText Business Network · Trading Grid with Aviator<\/div>\n      <h1>AI Vendor Trust Overview<\/h1>\n      <div class=\"sub\">Portability, model abstraction, and lock-in posture, for procurement and enterprise architecture review.<\/div>\n    <\/div>\n    <div style=\"flex-shrink:0\">\n      <img src=\"__LOGO_NEG__\" alt=\"opentext\">\n      <div style=\"display:flex;gap:8px;justify-content:flex-end\">\n        <span class=\"tag tag-b\">Stage 2, Decision<\/span>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"doc-body\">\n\n    <p class=\"lead\">Procurement teams evaluating AI capabilities are right to ask the exit question first: <strong>\"If this becomes operationally essential, what does leaving cost?\"<\/strong> This overview answers it directly.<\/p>\n\n    <div class=\"section-label\">Trust Commitments<\/div>\n    <div class=\"ar\"><\/div>\n\n    <div class=\"tp\">\n      <div class=\"tp-card\">\n        <div class=\"k\">Data Portability<\/div>\n        <div class=\"t\">Your data exports in the formats it arrived in<\/div>\n        <div class=\"b\">The transactional backbone runs on open B2B standards, X12, EDIFACT, XML, and documented APIs. AI capabilities read these formats; they do not convert your data into proprietary structures. Transaction history, partner configurations, and document archives are exportable in standard formats throughout and at the end of the relationship.<\/div>\n      <\/div>\n      <div class=\"tp-card\">\n        <div class=\"k\">Telemetry Ownership<\/div>\n        <div class=\"t\">Customer-owned operational telemetry<\/div>\n        <div class=\"b\">Operational metrics, partner performance history, SLA records, and audit logs generated by your usage are your records. They are accessible to your teams during the relationship and included in the scope of return-of-data terms, including the AI interaction history your governance program relies on.<\/div>\n      <\/div>\n      <div class=\"tp-card\">\n        <div class=\"k\">Model Abstraction<\/div>\n        <div class=\"t\">The platform, not the model, is the product<\/div>\n        <div class=\"b\">Aviator's orchestration layer abstracts the underlying foundation model. Today language reasoning runs on Gemini via Google Cloud enterprise terms; the architecture is designed so models can be upgraded or substituted without re-platforming your operation, your policies, or your integrations. You are not buying a bet on one model vendor.<\/div>\n      <\/div>\n      <div class=\"tp-card\">\n        <div class=\"k\">Standards-Based Integration<\/div>\n        <div class=\"t\">No proprietary protocol moat<\/div>\n        <div class=\"b\">Integration with your ERP, monitoring, and identity systems uses documented APIs and established standards. AI capabilities layer onto the same integration surface, adopting them creates no new proprietary coupling beyond the Business Network relationship you already govern.<\/div>\n      <\/div>\n      <div class=\"tp-card\">\n        <div class=\"k\">Graduated Commitment<\/div>\n        <div class=\"t\">Adoption is reversible at every stage<\/div>\n        <div class=\"b\">AI capabilities can be enabled per workflow and disabled the same way. Autonomy levels step down instantly. There is no architectural point-of-no-return in the adoption path: a customer who stops using AI capabilities retains a fully functioning Business Network operation.<\/div>\n      <\/div>\n      <div class=\"tp-card\">\n        <div class=\"k\">Commercial Transparency<\/div>\n        <div class=\"t\">Verifiable terms, not assurances<\/div>\n        <div class=\"b\">Every commitment in this overview maps to contract language your procurement team can verify: data return and deletion terms, subprocessor listings, exit assistance provisions, and audit rights. We encourage marking up the paper, skeptical procurement is good procurement.<\/div>\n      <\/div>\n    <\/div>\n\n    <h2 style=\"margin-top:0\">The lock-in question, answered honestly<\/h2>\n    <p>No vendor relationship of operational significance is costless to exit, switching B2B networks involves partner migration effort regardless of AI. What we commit to is that <strong>AI capabilities add no new lock-in on top of that baseline<\/strong>: no proprietary data formats, no AI-only operational dependencies without manual fallback, and no contractual coupling that survives the relationship.<\/p>\n    <table>\n      <thead><tr><th>Concern<\/th><th>Mechanism that addresses it<\/th><\/tr><\/thead>\n      <tbody>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">\"Our processes will depend on AI we can't replicate\"<\/td><td>Every AI-assisted workflow retains its manual path. AI accelerates investigation and resolution; it does not become the only way to operate.<\/td><\/tr>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">\"Our data will be trapped in vendor formats\"<\/td><td>Standards-based data in, standards-based data out. Export rights cover transactions, configurations, telemetry, and audit history.<\/td><\/tr>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">\"The model vendor becomes a hidden dependency\"<\/td><td>Model abstraction at the orchestration layer; model substitution is OpenText's obligation, not the customer's migration project.<\/td><\/tr>\n        <tr><td style=\"font-weight:700;color:var(--dk)\">\"Pricing leverage will turn against us\"<\/td><td>AI capabilities are governed by the same commercial framework and negotiation cycle as the rest of your Business Network agreement.<\/td><\/tr>\n      <\/tbody>\n    <\/table>\n\n    <div class=\"dark-block\">\n      <div class=\"db-k\">For Procurement Files<\/div>\n      <div class=\"db-t\">Adopt on evidence, stay on results, leave with your data.<\/div>\n      <div class=\"db-b\">That is the standard an enterprise should hold any AI vendor to. We built the architecture and the paper to meet it.<\/div>\n    <\/div>\n\n  <\/div>\n\n  <div class=\"doc-footer\">\n    <div>OpenText Business Network · Trading Grid with Aviator, Confidential<\/div>\n    <div>Stage 2, Decision · AI Vendor Trust Overview · 2026<\/div>\n  <\/div>\n\n<\/div>\n<\/body>\n<\/html>\n","s3/Controlled-AI-Rollout":"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n__FONTS__\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Controlled AI Rollout, OpenText Trading Grid with Aviator<\/title>\n<style>\n__COLORSCSS__\ndeck-stage:not(:defined){visibility:hidden}\n*{box-sizing:border-box;margin:0;padding:0}\nsection{font-family:'Inter','Helvetica Neue',sans-serif;overflow:hidden}\n.logo{position:absolute;top:52px;right:96px;height:44px;width:auto}\n.foot{position:absolute;bottom:44px;left:96px;right:96px;display:flex;justify-content:space-between;font:400 14px/1 'Inter',sans-serif;letter-spacing:0.04em;color:#3f4d62}\n.foot.d{color:rgba(255,255,255,0.35)}\n.foot span{white-space:nowrap}\n.ew{font:700 14px/1 'Inter',sans-serif;letter-spacing:0.14em;text-transform:uppercase;color:#0066FF;margin-bottom:16px}\n.ar{width:64px;height:5px;background:#0066FF;border-radius:3px;margin-bottom:28px}\n.h2{font:800 52px/1.06 'Inter','Inter',sans-serif;color:#101c2f;letter-spacing:-0.022em}\n.card{background:#fff;border:1px solid #e7eaef;border-radius:16px;box-shadow:0 10px 30px rgba(16,28,47,0.08),0 5px 10px rgba(16,28,47,0.04)}\n.kl{font:700 13px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0066FF;margin-bottom:12px}\n.kt{font:800 21px/1.25 'Inter','Inter',sans-serif;color:#101c2f;margin-bottom:10px}\n.kb{font:300 17px/1.6 'Inter',sans-serif;color:#3f4d62}\n.kb strong{color:#101c2f;font-weight:700}\n.ph-h{border-radius:14px 14px 0 0;padding:24px 32px;display:flex;align-items:center;gap:18px}\n.ph-b{border:1px solid #e7eaef;border-top:0;border-radius:0 0 14px 14px;background:#fff;padding:28px 32px}\n.li{display:flex;align-items:flex-start;gap:10px;font:300 17px/1.55 'Inter',sans-serif;color:#3f4d62;margin-bottom:11px}\n.li span{color:#0066FF;font-weight:700;flex-shrink:0}\n<\/style>\n<\/head>\n<body style=\"margin:0;background:#1a1a2e\">\n<deck-stage width=\"1920\" height=\"1080\">\n\n<!-- 01 TITLE -->\n<section data-label=\"01 Title\">\n<div style=\"position:absolute;inset:0;background:#101c2f;overflow:hidden\">\n  <div style=\"position:absolute;right:-200px;bottom:-300px;width:880px;height:880px;border-radius:50%;border:1px solid rgba(0,102,255,0.09)\"><\/div>\n  <img class=\"logo\" src=\"__LOGO_NEG__\" alt=\"opentext\">\n  <div style=\"position:absolute;left:96px;top:240px;max-width:1350px\">\n    <div style=\"width:72px;height:5px;background:#0066FF;border-radius:3px;margin-bottom:36px\"><\/div>\n    <div style=\"font:700 15px/1 'Inter',sans-serif;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.52);margin-bottom:28px\">OpenText Business Network · Trading Grid with Aviator · Stage 3, Execution<\/div>\n    <div style=\"font:900 76px/1.04 'Inter','Inter',sans-serif;color:#fff;letter-spacing:-0.03em;margin-bottom:40px\">Controlled<br>AI Rollout<\/div>\n    <div style=\"font:300 26px/1.55 'Inter',sans-serif;color:rgba(255,255,255,0.72);max-width:940px\">The three-phase deployment strategy: visibility first, recommendations second, policy-bound automation third, with reversibility and measurement built into every phase.<\/div>\n  <\/div>\n  <div class=\"foot d\"><span>CONFIDENTIAL, DELIVERY &amp; OPERATIONS TEAMS<\/span><span>2026<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 02 ROLLOUT PRINCIPLES -->\n<section data-label=\"02 Rollout Principles\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Rollout Principles<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:52px;max-width:1300px\">Three commitments govern every phase<\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:28px;max-width:1700px\">\n      <div class=\"card\" style=\"padding:44px 38px\">\n        <div style=\"font:900 52px/1 'Inter','Inter',sans-serif;color:#e7eaef;margin-bottom:22px\">01<\/div>\n        <div class=\"kt\" style=\"font-size:25px\">Reversibility<\/div>\n        <div class=\"kb\" style=\"font-size:18px\">Every phase defines its rollback procedure <strong>before it begins<\/strong>. Capabilities disable per workflow; autonomy steps down instantly; automated actions carry prior-state snapshots. No phase is a one-way door.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:44px 38px\">\n        <div style=\"font:900 52px/1 'Inter','Inter',sans-serif;color:#e7eaef;margin-bottom:22px\">02<\/div>\n        <div class=\"kt\" style=\"font-size:25px\">Measurability<\/div>\n        <div class=\"kb\" style=\"font-size:18px\">Baselines are captured before enablement, MTTR, escalation rate, SLA attainment. Every phase has numeric exit criteria. <strong>\"Delivered or didn't\" is a number,<\/strong> not an opinion, at every gate.<\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:44px 38px\">\n        <div style=\"font:900 52px/1 'Inter','Inter',sans-serif;color:#e7eaef;margin-bottom:22px\">03<\/div>\n        <div class=\"kt\" style=\"font-size:25px\">Trust maturity<\/div>\n        <div class=\"kb\" style=\"font-size:18px\">Authority expands only as evidence accumulates. Phase advancement is a governance decision with defined criteria, <strong>trust is earned by the system and granted by the customer,<\/strong> never assumed by the vendor.<\/div>\n      <\/div>\n    <\/div>\n    <div style=\"margin-top:36px;padding:22px 30px;background:#f0f4ff;border-radius:12px;border-left:4px solid #0066FF;max-width:1700px\">\n      <div style=\"font:300 19px/1.6 'Inter',sans-serif;color:#3f4d62\">The phases map directly to the autonomy model approved in Stage 2: Phase 1 operates at L0, Phase 2 at L1 to L2, Phase 3 at L3, with L4 reserved for mature, board-approved workflows beyond this initial rollout.<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Controlled AI Rollout, Confidential<\/span><span>2 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 03 PHASE OVERVIEW -->\n<section data-label=\"03 Three Phases\">\n<div style=\"position:absolute;inset:0;background:#f6f7f7;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">The Three Phases<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:48px\">Visibility → Recommendations → Policy automation<\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:26px;max-width:1728px\">\n      <div>\n        <div class=\"ph-h\" style=\"background:#101c2f\">\n          <div style=\"font:900 40px/1 'Inter','Inter',sans-serif;color:rgba(255,255,255,0.25)\">P1<\/div>\n          <div><div style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0066FF;margin-bottom:6px\">Phase 1 · L0 · Days 0 to 90<\/div><div style=\"font:800 25px/1.1 'Inter','Inter',sans-serif;color:#fff\">Visibility Only<\/div><\/div>\n        <\/div>\n        <div class=\"ph-b\">\n          <div class=\"li\"><span>→<\/span>Conversational transaction search and retrieval<\/div>\n          <div class=\"li\"><span>→<\/span>Payload explanation in operational language<\/div>\n          <div class=\"li\"><span>→<\/span>Inline explanation of monitoring charts and alerts<\/div>\n          <div class=\"li\"><span>→<\/span>Knowledge assistance with human handoff<\/div>\n          <div style=\"margin-top:18px;padding-top:16px;border-top:1px solid #e7eaef\"><div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#3f4d62;margin-bottom:8px\">Exit criteria<\/div><div style=\"font:300 16px/1.55 'Inter',sans-serif;color:#3f4d62\">Adoption ≥ 60% of target users · MTTR reduction evident vs. baseline · audit review unremarkable · accuracy spot-checks pass<\/div><\/div>\n        <\/div>\n      <\/div>\n      <div>\n        <div class=\"ph-h\" style=\"background:#0066FF\">\n          <div style=\"font:900 40px/1 'Inter','Inter',sans-serif;color:rgba(255,255,255,0.3)\">P2<\/div>\n          <div><div style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.7);margin-bottom:6px\">Phase 2 · L1 to L2 · Days 60 to 240<\/div><div style=\"font:800 25px/1.1 'Inter','Inter',sans-serif;color:#fff\">Recommendations<\/div><\/div>\n        <\/div>\n        <div class=\"ph-b\">\n          <div class=\"li\"><span>→<\/span>Root-cause analysis with recommended fixes<\/div>\n          <div class=\"li\"><span>→<\/span>Anomaly detection and SLA-risk alerts<\/div>\n          <div class=\"li\"><span>→<\/span>Partner degradation insights<\/div>\n          <div class=\"li\"><span>→<\/span>Approval-gated configuration proposals (L2, selected workflows)<\/div>\n          <div style=\"margin-top:18px;padding-top:16px;border-top:1px solid #e7eaef\"><div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#3f4d62;margin-bottom:8px\">Exit criteria<\/div><div style=\"font:300 16px/1.55 'Inter',sans-serif;color:#3f4d62\">Recommendation accuracy ≥ board threshold · approval rate high with low reversals · escalation rate down vs. baseline · governance review signoff<\/div><\/div>\n        <\/div>\n      <\/div>\n      <div>\n        <div class=\"ph-h\" style=\"background:#27364c\">\n          <div style=\"font:900 40px/1 'Inter','Inter',sans-serif;color:rgba(255,255,255,0.25)\">P3<\/div>\n          <div><div style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.1em;text-transform:uppercase;color:#0066FF;margin-bottom:6px\">Phase 3 · L3 · Day 180+<\/div><div style=\"font:800 25px/1.1 'Inter','Inter',sans-serif;color:#fff\">Policy Automation<\/div><\/div>\n        <\/div>\n        <div class=\"ph-b\">\n          <div class=\"li\"><span>→<\/span>Automated transaction recovery in declared windows<\/div>\n          <div class=\"li\"><span>→<\/span>Auto-triage and routing within policy bounds<\/div>\n          <div class=\"li\"><span>→<\/span>Scheduled operational summaries with distribution<\/div>\n          <div class=\"li\"><span>→<\/span>Exception escalation to named owners<\/div>\n          <div style=\"margin-top:18px;padding-top:16px;border-top:1px solid #e7eaef\"><div style=\"font:700 13px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#3f4d62;margin-bottom:8px\">Standing criteria<\/div><div style=\"font:300 16px/1.55 'Inter',sans-serif;color:#3f4d62\">Exception rate stable · zero unauthorized-action findings · quarterly governance review · rollback drills pass<\/div><\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Controlled AI Rollout, Confidential<\/span><span>3 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 04 PHASE 1 DETAIL -->\n<section data-label=\"04 Phase 1, Visibility\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Phase 1, Visibility Only · Days 0 to 90<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:24px\">Prove value where nothing can go wrong<\/div>\n    <div style=\"font:300 22px/1.55 'Inter',sans-serif;color:#3f4d62;max-width:1350px;margin-bottom:44px\">Phase 1 deploys read-only intelligence to a defined pilot group. The AI cannot act, so the rollout risk is adoption risk, managed like any tooling change.<\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;max-width:1700px\">\n      <div class=\"card\" style=\"padding:36px 36px\">\n        <div class=\"kl\">Deployment Sequence<\/div>\n        <div style=\"display:flex;flex-direction:column;gap:0\">\n          <div style=\"display:flex;gap:18px;padding:14px 0;border-bottom:1px solid #f6f7f7\"><div style=\"font:900 18px/1.4 'Inter','Inter',sans-serif;color:#0066FF;flex-shrink:0\">1<\/div><div class=\"kb\"><strong>Baseline capture (weeks 1 to 2).<\/strong> Record MTTR, escalation rate, investigation volume, SLA attainment for the pilot scope, before anyone touches the AI.<\/div><\/div>\n          <div style=\"display:flex;gap:18px;padding:14px 0;border-bottom:1px solid #f6f7f7\"><div style=\"font:900 18px/1.4 'Inter','Inter',sans-serif;color:#0066FF;flex-shrink:0\">2<\/div><div class=\"kb\"><strong>Pilot group enablement (weeks 2 to 4).<\/strong> 10 to 25 users across operations and support. Role-scoped access, full audit logging from day one.<\/div><\/div>\n          <div style=\"display:flex;gap:18px;padding:14px 0;border-bottom:1px solid #f6f7f7\"><div style=\"font:900 18px/1.4 'Inter','Inter',sans-serif;color:#0066FF;flex-shrink:0\">3<\/div><div class=\"kb\"><strong>Guided adoption (weeks 4 to 8).<\/strong> Weekly usage reviews; capture wins and failure modes; tune masking and scope configuration.<\/div><\/div>\n          <div style=\"display:flex;gap:18px;padding:14px 0\"><div style=\"font:900 18px/1.4 'Inter','Inter',sans-serif;color:#0066FF;flex-shrink:0\">4<\/div><div class=\"kb\"><strong>Measured expansion (weeks 8 to 12).<\/strong> Extend to full target population once accuracy spot-checks and audit review pass.<\/div><\/div>\n        <\/div>\n      <\/div>\n      <div style=\"display:flex;flex-direction:column;gap:20px\">\n        <div class=\"card\" style=\"padding:30px 32px\">\n          <div class=\"kl\">What Success Looks Like<\/div>\n          <div class=\"kb\" style=\"font-size:18px\">Analysts reach for Aviator before the query console. Investigation MTTR visibly drops. Specialists report fewer first-line escalations. The governance board's audit sample reads clean.<\/div>\n        <\/div>\n        <div class=\"card\" style=\"padding:30px 32px\">\n          <div class=\"kl\">Rollback Procedure<\/div>\n          <div class=\"kb\" style=\"font-size:18px\">Disable capabilities per role or tenant-wide via administration, immediate, no vendor ticket. Pilot users return to existing tools with zero operational impact, because nothing depended on the AI.<\/div>\n        <\/div>\n        <div style=\"padding:24px 30px;background:#f0f4ff;border-radius:12px;border-left:4px solid #0066FF\">\n          <div style=\"font:300 17px/1.6 'Inter',sans-serif;color:#3f4d62\"><strong style=\"color:#101c2f;font-weight:700\">Why 90 days:<\/strong> long enough to clear novelty effects and produce defensible before/after numbers; short enough to hold stakeholder attention for the Phase 2 decision.<\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Controlled AI Rollout, Confidential<\/span><span>4 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 05 PHASE 2 DETAIL -->\n<section data-label=\"05 Phase 2, Recommendations\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Phase 2, Recommendations · Days 60 to 240<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:24px\">The AI starts advising. Humans keep deciding.<\/div>\n    <div style=\"font:300 22px/1.55 'Inter',sans-serif;color:#3f4d62;max-width:1400px;margin-bottom:44px\">Phase 2 overlaps Phase 1 deliberately: recommendation capabilities switch on for workflows where visibility has already earned analyst trust.<\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;max-width:1700px\">\n      <div class=\"card\" style=\"padding:36px 36px\">\n        <div class=\"kl\">What Turns On<\/div>\n        <div style=\"display:flex;flex-direction:column;gap:14px\">\n          <div class=\"kb\" style=\"font-size:18px\"><strong>L1, advisory:<\/strong> root-cause analysis with recommended fixes, anomaly and SLA-risk alerts, partner degradation insights. Humans act on everything.<\/div>\n          <div class=\"kb\" style=\"font-size:18px\"><strong>L2, approval-gated (selected workflows):<\/strong> proposed configuration corrections and document reprocessing, each executing only on named human approval with prior-state snapshot.<\/div>\n        <\/div>\n        <div style=\"margin-top:24px;padding:18px 22px;background:#f6f7f7;border-radius:10px\">\n          <div style=\"font:700 14px/1.4 'Inter',sans-serif;color:#101c2f;margin-bottom:6px\">The metric that matters most<\/div>\n          <div style=\"font:300 16px/1.6 'Inter',sans-serif;color:#3f4d62\">Recommendation acceptance rate, tracked weekly. High acceptance with low post-action reversals is the evidence Phase 3 will be approved on.<\/div>\n        <\/div>\n      <\/div>\n      <div class=\"card\" style=\"padding:36px 36px\">\n        <div class=\"kl\">Governance Activity This Phase<\/div>\n        <div style=\"display:flex;flex-direction:column;gap:0\">\n          <div style=\"display:flex;gap:14px;padding:12px 0;border-bottom:1px solid #f6f7f7\"><div style=\"width:8px;height:8px;border-radius:50%;background:#0066FF;flex-shrink:0;margin-top:9px\"><\/div><div class=\"kb\" style=\"font-size:17px\">Monthly accuracy sampling: governance reviews a random sample of recommendations against outcomes<\/div><\/div>\n          <div style=\"display:flex;gap:14px;padding:12px 0;border-bottom:1px solid #f6f7f7\"><div style=\"width:8px;height:8px;border-radius:50%;background:#0066FF;flex-shrink:0;margin-top:9px\"><\/div><div class=\"kb\" style=\"font-size:17px\">Approval-fatigue audit: verify L2 approvals are substantive, not rubber-stamped<\/div><\/div>\n          <div style=\"display:flex;gap:14px;padding:12px 0;border-bottom:1px solid #f6f7f7\"><div style=\"width:8px;height:8px;border-radius:50%;background:#0066FF;flex-shrink:0;margin-top:9px\"><\/div><div class=\"kb\" style=\"font-size:17px\">Draft Phase 3 policy sets: volume caps, partner lists, change windows, written and reviewed while evidence accumulates<\/div><\/div>\n          <div style=\"display:flex;gap:14px;padding:12px 0\"><div style=\"width:8px;height:8px;border-radius:50%;background:#0066FF;flex-shrink:0;margin-top:9px\"><\/div><div class=\"kb\" style=\"font-size:17px\">Rollback drill: exercise the L2→L1 step-down once, on purpose, so reversion is a practiced motion<\/div><\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Controlled AI Rollout, Confidential<\/span><span>5 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 06 PHASE 3 DETAIL -->\n<section data-label=\"06 Phase 3, Policy Automation\">\n<div style=\"position:absolute;inset:0;background:#fff;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Phase 3, Policy Automation · Day 180+<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:24px\">Automation begins where evidence is overwhelming<\/div>\n    <div style=\"font:300 22px/1.55 'Inter',sans-serif;color:#3f4d62;max-width:1400px;margin-bottom:44px\">Phase 3 enables policy-bound automation for the narrow set of workflows where Phase 2 produced consistent, board-reviewed evidence, typically high-volume, low-variance operations.<\/div>\n    <div style=\"display:grid;grid-template-columns:1.2fr 1fr;gap:32px;max-width:1700px\">\n      <div class=\"card\" style=\"padding:36px 36px\">\n        <div class=\"kl\">Candidate Workflows, and Why<\/div>\n        <div style=\"display:flex;flex-direction:column;gap:0\">\n          <div style=\"display:flex;gap:18px;padding:14px 0;border-bottom:1px solid #f6f7f7\">\n            <div style=\"flex:1\"><div style=\"font:700 17px/1.4 'Inter',sans-serif;color:#101c2f;margin-bottom:4px\">Outage-window transaction recovery<\/div><div class=\"kb\" style=\"font-size:16px\">Deterministic trigger (declared outage), bounded action (queue and retry), volume-capped, fully reversible.<\/div><\/div>\n          <\/div>\n          <div style=\"display:flex;gap:18px;padding:14px 0;border-bottom:1px solid #f6f7f7\">\n            <div style=\"flex:1\"><div style=\"font:700 17px/1.4 'Inter',sans-serif;color:#101c2f;margin-bottom:4px\">Issue auto-triage and routing<\/div><div class=\"kb\" style=\"font-size:16px\">Misroutes self-correct through reassignment; routing accuracy was measured throughout Phase 2.<\/div><\/div>\n          <\/div>\n          <div style=\"display:flex;gap:18px;padding:14px 0\">\n            <div style=\"flex:1\"><div style=\"font:700 17px/1.4 'Inter',sans-serif;color:#101c2f;margin-bottom:4px\">Scheduled operational briefings<\/div><div class=\"kb\" style=\"font-size:16px\">Content-generation automation with no system mutation, distribution lists are the only policy surface.<\/div><\/div>\n          <\/div>\n        <\/div>\n        <div style=\"margin-top:20px;padding:18px 22px;background:#fdf6e8;border-radius:10px\">\n          <div style=\"font:300 16px/1.6 'Inter',sans-serif;color:#3f4d62\"><strong style=\"color:#8a5c00;font-weight:700\">Deliberately excluded from initial Phase 3:<\/strong> partner-facing communication, mapping changes, and any workflow where Phase 2 evidence showed variance. These wait for sustained L3 history, or stay human-gated permanently.<\/div>\n        <\/div>\n      <\/div>\n      <div style=\"display:flex;flex-direction:column;gap:20px\">\n        <div class=\"card\" style=\"padding:30px 32px\">\n          <div class=\"kl\">Every Automated Action Carries<\/div>\n          <div style=\"display:flex;flex-direction:column;gap:10px\">\n            <div class=\"li\" style=\"margin:0\"><span>→<\/span>Policy validation before execution, fail closed<\/div>\n            <div class=\"li\" style=\"margin:0\"><span>→<\/span>Prior-state snapshot for rollback<\/div>\n            <div class=\"li\" style=\"margin:0\"><span>→<\/span>Rate and volume limits per window<\/div>\n            <div class=\"li\" style=\"margin:0\"><span>→<\/span>Owner notification and audit record<\/div>\n            <div class=\"li\" style=\"margin:0\"><span>→<\/span>Exception escalation with stated reason<\/div>\n          <\/div>\n        <\/div>\n        <div class=\"card\" style=\"padding:30px 32px\">\n          <div class=\"kl\">Standing Oversight<\/div>\n          <div class=\"kb\" style=\"font-size:17px\">Exception-rate dashboards reviewed weekly by the workflow owner; quarterly governance board review of automated activity; annual re-attestation of policy sets. A rising exception rate triggers automatic step-down review.<\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>OpenText Business Network · Controlled AI Rollout, Confidential<\/span><span>6 / 12<\/span><\/div>\n<\/div>\n<\/section>\n\n<!-- 07 TIMELINE -->\n<section data-label=\"07 Timeline\">\n<div style=\"position:absolute;inset:0;background:#f6f7f7;overflow:hidden\">\n  <img class=\"logo\" src=\"__LOGO_POS__\" alt=\"opentext\">\n  <div style=\"position:absolute;top:96px;left:96px;right:96px;bottom:100px\">\n    <div class=\"ew\">Rollout Timeline<\/div>\n    <div class=\"ar\"><\/div>\n    <div class=\"h2\" style=\"margin-bottom:56px\">Twelve months, three phases, four governance gates<\/div>\n    <div style=\"max-width:1728px\">\n      <div style=\"display:grid;grid-template-columns:repeat(12,1fr);gap:6px;margin-bottom:10px\">\n        <div style=\"grid-column:1/4;background:#101c2f;border-radius:10px;padding:18px 22px\"><div style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#0066FF;margin-bottom:6px\">Phase 1 · L0<\/div><div style=\"font:800 19px/1.2 'Inter','Inter',sans-serif;color:#fff\">Visibility<\/div><\/div>\n        <div style=\"grid-column:4/9;background:#0066FF;border-radius:10px;padding:18px 22px\"><div style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.7);margin-bottom:6px\">Phase 2 · L1 to L2<\/div><div style=\"font:800 19px/1.2 'Inter','Inter',sans-serif;color:#fff\">Recommendations<\/div><\/div>\n        <div style=\"grid-column:9/13;background:#27364c;border-radius:10px;padding:18px 22px\"><div style=\"font:700 12px/1 'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:#0066FF;margin-bottom:6px\">Phase 3 · L3<\/div><div style=\"font:800 19px/1.2 'Inter','Inter',sans-serif;color:#fff\">Policy Automation<\/div><\/div>\n      <\/div>\n      <div style=\"display:grid;grid-template-columns:repeat(12,1fr);gap:6px;margin-bottom:36px\">\n        <div style=\"text-align:center;font:400 14px/1 'Inter',sans-serif;color:#3f4d62;padding-top:8px\">M1<\/div><div style=\"text-align:center;font:400 14px/1 'Inter',sans-serif;color:#3f4d62;padding-top:8px\">M2<\/div><div style=\"text-align:center;font:400 14px/1 'Inter',sans-serif;color:#3f4d62;padding-top:8px\">M3<\/div><div style=\"text-align:center;font:400 14px/1 'Inter',sans-serif;color:#3f4d62;padding-top:8px\">M4<\/div><div style=\"text-align:center;font:400 14px/1 'Inter',sans-serif;color:#3f4d62;padding-top:8px\">M5<\/div><div style=\"text-align:center;font:400 14px/1 'Inter',sans-serif;color:#3f4d62;padding-top:8px\">M6<\/div><div style=\"text-align:center;font:400 14px/1 'Inter',sans-serif;color:#3f4d62;padding-top:8px\">M7<\/div><div style=\"text-align:center;font:400 14px/1 'Inter',sans-serif;color:#3f4d62;padding-top:8px\">M8<\/div><div style=\"text-align:center;font:400 14px/1 'Inter',sans-serif;color:#3f4d62;padding-top:8px\">M9<\/div><div style=\"text-align:center;font:400 14px/1 'Inter',sans-serif;color:#3f4d62;padding-top:8px\">M10<\/div><div style=\"text-align:center;font:400 14px/1 'Inter',sans-serif;color:#3f4d62;padding-top:8px\">M11<\/div><div style=\"text-align:center;font:400 14px/1 'Inter',sans-serif;color:#3f4d62;padding-top:8px\">M12<\/div>\n      <\/div>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:24px\">\n        <div style=\"background:#fff;border:1px solid #e7eaef;border-radius:12px;padding:24px 26px\"><div style=\"font:700 13px/1 'Inter',sans-serif;letter-spa
